rules_ai_checkable:
- module: Visual Identity
  criterion: 可驗證規則包含最小尺寸、clear space、單一 wordmark、不可 lockup、不可拉伸、不可改色、不可低對比使用。
  chapter: ch-02
  chapter_title: Logo
- module: ''
  criterion: 可量化規則包含印刷 20-50 mm 使用 small、51-200 mm 使用 medium、201 mm 以上使用 large；螢幕最低 80 px；文案必須寫 LucidMotors。
  chapter: ch-02-02
  chapter_title: Wordmark Detail
- module: ''
  criterion: 可量化規則包含 minimum clear space = 1x o，optimal = 2x o，同一表面不超過一個 wordmark。
  chapter: ch-02-03
  chapter_title: Wordmark Clear Space
- module: Color System
  criterion: 可驗證規則包含不得用黑色而用 Charcoal、照片上必須有強對比、背景太忙時不可放 wordmark。
  chapter: ch-02-04
  chapter_title: Wordmark Color
- module: ''
  criterion: 可量化規則包含高度與長度至少 1x30，與 wordmark 同時出現時厚度不得弱於字元重量。
  chapter: ch-02-06
  chapter_title: Power Bar
- module: ''
  criterion: 可驗證規則包含不得與 wordmark lockup、不得大於 wordmark、需在 wordmark 下方或右側、1 色版不可用於 digital/broadcast。
  chapter: ch-02-08
  chapter_title: Power Loop
- module: Color System
  criterion: 可驗證規則包含紅色只用於警示、hero gradient 不可大面積完整使用、色彩應被中性色分隔。
  chapter: ch-03
  chapter_title: Color
- module: ''
  criterion: 可量化規則包含 Rich Blue 0%、Blue 20%、Green 70%、Hot Green 100%，只能 linear、不可 radial。
  chapter: ch-03-03
  chapter_title: Hero Gradient
- module: ''
  criterion: 可檢查規則包含漸層不可用於物件高光或形體塑造；色彩漸層可 linear 或 radial，但 hero gradient 不可 radial。
  chapter: ch-03-04
  chapter_title: Gradient Fields
- module: Typography System
  criterion: 可量化規則包含內文最小 12 pt、web 14 pt、retail 22 pt，標題比例至少 300% 或 800%。
  chapter: ch-04
  chapter_title: Type
- module: Typography System
  criterion: 可檢查規則包含主要左對齊、置中只作次要選項、copy 最小 12 pt/web 14 pt/retail 22 pt。
  chapter: ch-04-01
  chapter_title: Typography Overview
- module: ''
  criterion: 可量化規則包含 tracking -50 或 0、leading 80%、headline 至少 body 300%，大型 Attract 至少 800%。
  chapter: ch-04-02
  chapter_title: Headlines
- module: ''
  criterion: 可量化規則包含 body leading 150%、header leading 125%、subhead 115%、space after 200% body copy。
  chapter: ch-04-03
  chapter_title: Sub Heads and Body Text
- module: Color System
  criterion: 可檢查規則包含漸層文字每 topic/layout 只用一次，featured type 必須是頁面主訊息。
  chapter: ch-04-04
  chapter_title: Type Color
- module: Photography System
  criterion: 可檢查規則包含不可忙亂背景、不可假動作、不可髒產品、不可過度後製、人物不可搶走產品焦點。
  chapter: ch-05
  chapter_title: Imagery
- module: ''
  criterion: 可檢查規則包含背景不可太忙、人物不可搶焦點、動作不可假。
  chapter: ch-05-03
  chapter_title: In The World
- module: ''
  criterion: 可檢查規則包含人物不可太主導、穿著需現代實用、避免不適切或無聊形象。
  chapter: ch-05-04
  chapter_title: Riders
- module: ''
  criterion: 可檢查規則包含警示用紅色與 25 度線、功能說明用藍色輪廓或圓形。
  chapter: ch-05-06
  chapter_title: Technology
- module: ''
  criterion: 可檢查規則包含圖示 40px 圓、線寬 1.5px/1px、警示 25 度線、紅色只作警示。
  chapter: ch-06
  chapter_title: Graphics
- module: ''
  criterion: 可檢查規則包含 crosshatch 用 LucidMotors red，線條角度 +25 度；circle 為主要容器。
  chapter: ch-06-01
  chapter_title: Graphic Elements
- module: Iconography System
  criterion: 可量化規則包含 40px 圓、主要線寬 1.5px、小細節 1px、警示線 +25 度。
  chapter: ch-06-03
  chapter_title: Icon Style
- module: Iconography System
  criterion: 可量化規則包含 40px minimum、40-99px standard、100-199px hero、200px+ hero with light gradient container。
  chapter: ch-06-04
  chapter_title: Icon Use
- module: ''
  criterion: 可檢查規則較少，但可要求限定版不得覆寫核心 wordmark、色彩與基本識別階層。
  chapter: ch-06-06
  chapter_title: Limited Edition
- module: Voice and Tone
  criterion: 可檢查規則包含避免 tech-jargon、Attract 2-4 words、Engage 2-3 short sentences、Connect 提供細節。
  chapter: ch-07
  chapter_title: Voice
- module: ''
  criterion: 可檢查規則包含避免 tech-jargon、避免 try-too-hard、不得排外、應直接誠實。
  chapter: ch-07-03
  chapter_title: Our Personality
- module: ''
  criterion: 可量化規則包含 Attract 2-4 words，Engage 2-3 short sentences，Connect 提供產品特徵細節。
  chapter: ch-07-04
  chapter_title: Crafting The Message
