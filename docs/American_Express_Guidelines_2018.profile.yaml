rules_ai_checkable:
- module: ''
  criterion: Blue Box small scale 不得低於 .325 inch 或 40 px；Alternate logo 僅用於小型數位/社群/app/難讀空間且不得低於 .175 inch 或 22 px；Blue Box
    高度 .325-.45 inch/40-50 px 用 small，.45-1 inch/50-110 px 用 regular，1-4.25 inch/110-410 px 用 large，4.25 inch/410 px 以上用 extra
    large；logotype clearspace 至少 3X，Blue Box 與元素距離至少 1/3X，與 bank logo 距離至少 1.5X；tagline cap-height 不得低於 .05 inch 或 7 px；標誌與標語不得重繪、改色、改字體、加特效或違反留白。
  chapter: ch-01
  chapter_title: Essential Visual Identity Elements
- module: Visual Identity
  criterion: 若需要低於 40 px 的 Blue Box，僅可在 22-40 px 範圍改用 Alternate；B/W files 只能用於單色黑白印刷；註冊標記僅在指定國家與位置使用。
  chapter: ch-01-01
  chapter_title: Blue Box Logo and Alternate Logo
- module: ''
  criterion: promotional/offering/advertising 原則上使用 tagline；transactional/informational 或空間不足可免；horizontal configuration 優先；不可換色、換字體、放在繁忙影像上或與
    issuer logo 不當 lock-up。
  chapter: ch-01-02
  chapter_title: Taglines and Look Dos and Don’ts
- module: ''
  criterion: 影像應至少保留廣告元素可讀空間；避免黑白/濾鏡/過度擺拍/忙亂背景/極近特寫；RD 每件作品只能使用一次；RD 只能圍繞人的頭部，不得圍繞手、物件、多人頭部或兒童；American Express logotype、customer
    name、oval 與至少兩邊須保持可見。
  chapter: ch-02
  chapter_title: Photography and Relationship Device
- module: ''
  criterion: RD 只能出現一次；logotype 不可裁切；customer name、oval 與至少兩邊需可見；outer frame brush strokes 不可改；只可裁掉兩邊；不得套在手、物件、多個人頭或兒童上。
  chapter: ch-02-02
  chapter_title: Relationship Device Rules
- module: ''
  criterion: 卡面 artwork 不得縮小超過 50%；Blue Box 或 Centurion 必須可見；使用非有效帳號；若卡面有人名需取得 permission/release；mock card 必須標示 SAMPLE/VOID/非有效卡且不得含
    CID、expiration date、valid through date 或 magnetic stripe；不得旋轉、倒置、鏡像、加入文案/圖像、做成其他物件。
  chapter: ch-03
  chapter_title: Card Art in Marketing
- module: Governance
  criterion: 所有 marketing materials 必須送 American Express representative；ATL 非 TV/video 需在 brief、concept/creative proposals、final
    execution 三階段送審；TVC/video 需 brief、storyboard、rough cut、final execution；新素材 final layout 需 production 前送審；市面素材超過一年需重審；一般
    review SLA 為 3-5 business days，resubmission 通常 3 business days。
  chapter: ch-04
  chapter_title: Brand Review Governance
