rules_ai_checkable:
- module: Brand Strategy
  criterion: 品牌文案應優先表達 investor value、targets、expectations、support network；不得只用抽象國家美感或觀光式描述。
  chapter: ch-01
  chapter_title: Our Brand
- module: ''
  criterion: 背景優先使用明亮色；文字只能 black/white，說明小字可用 Dark Grey；icons/illustrations 不可用 Black、Dark Grey、Dark Blue；只能使用品牌色；不可使用 gradients、noise、textures
    或 effects；避免大面積 Dark Green。
  chapter: ch-04
  chapter_title: Colours
- module: Typography System
  criterion: Email/PowerPoint/Word 使用 Arial；tracking 0、leading auto；建議 12 欄 vertical grid；body text 不得右對齊；文字不得上色或加 effects；Demi
    Bold 或更寬字重不得用於 headers/body。
  chapter: ch-05
  chapter_title: Typography
- module: ''
  criterion: 避免 cliché、posed shots、studio background、snapshot quality、tight portrait crop、black and white；建築攝影需保持垂直線；同一 layout
    不可混用 regular 與 duotone images；duotone 用 Gradient Map，不用 Photoshop Duotone mode。
  chapter: ch-06
  chapter_title: Photography
- module: Iconography System
  criterion: 圖示盡量單色；必要時最多三色，白色不算；四色以上禁止；不得圓角、加細節、加線點圖樣、陰影、筆刷或 isometric；三色 icon 內不得寫文字；長標題不得置中於 icon 內。
  chapter: ch-07
  chapter_title: Icons
- module: ''
  criterion: 不要用非品牌色；不要用 gradients；不要用 3D charts 或 shadows/effects；始終保持 readable。
  chapter: ch-08
  chapter_title: Infographics and Maps
- module: ''
  criterion: business card 尺寸 90 x 50mm；document/Word/presentation font 使用 Arial；Word cover 應包含 image inside icon/pattern/illustration，不用
    plain icon；publication cover 的每個 rectangle 應承載不同資訊。
  chapter: ch-09
  chapter_title: Stationery
- module: ''
  criterion: 動畫應使用同一 logo、color、typography、composition 與 iconography 規則；不得新增非品牌色或 effects。
  chapter: ch-11
  chapter_title: Animation
