rules_ai_checkable:
- module: Visual Identity
  criterion: 可檢查規則：logo 必須使用正確 artwork；不得修改 stroke weights；open logo 不可用於 AXA's world；tagline 不可與 logo 自行 lock up；logo 在所有背景上必須保持
    legible。
  chapter: ch-02
  chapter_title: The Logo
- module: ''
  criterion: 可檢查規則：同一版面只使用一個 Switch；hero Switch 通常完整且紅色；至少半個 Switch 表面可見，最佳三到四角可見；headline 左對齊且至少為 Switch 寬度 50%；不可把 hero
    Switch 當 pattern 或導航元素。
  chapter: ch-03
  chapter_title: The Switch
- module: ''
  criterion: 可檢查規則：使用核准色值；文字與背景需符合清晰對比；Switch 色彩不得與背景混淆；不得使用未核准品牌色組合。
  chapter: ch-04
  chapter_title: Colour
- module: Typography System
  criterion: 可檢查規則：headline 應左對齊；hero headline 不得完全置於 Switch 內；headline 不應在 Switch 上投影；標題色彩需為 blue 或 white；不得使用未核准字體。
  chapter: ch-05
  chapter_title: Typography
- module: Voice and Tone
  criterion: 可檢查規則：文案應以顧客為主詞或受益者；需避免過度戲劇化；應表達 forward-looking 或 by your side；不可只列 AXA achievements 而不連到顧客生活。
  chapter: ch-06
  chapter_title: Tone of Voice
- module: ''
  criterion: 可檢查規則：插畫背景色需與 AXA red 相容；人物與 Switch 應有層次互動；不得使用不符合 style principles 的異質插畫；不得讓圖形搶過核心故事。
  chapter: ch-08
  chapter_title: Illustration
- module: Layout System
  criterion: 可檢查規則：元素需對齊 grid；hero Switch 在各格式需維持指定尺寸；identifier 不可任意移位；body copy 不應破壞閱讀順序；不得自行裁切出未授權 Switch 形態。
  chapter: ch-09
  chapter_title: Grid and Layout
- module: ''
  criterion: 可檢查規則：動畫中 logo 不可變形；Switch motion 應保持可辨識；最終畫面需回到清楚品牌狀態；動態不可成為純裝飾 pattern。
  chapter: ch-10
  chapter_title: Animation
- module: Brand Strategy
  criterion: 可檢查規則：素材需先判定合作主導權；logo 比例與位置需符合該模式；不得自創 lock-up；不得把 tagline 任意加入 logo lock-up。
  chapter: ch-11
  chapter_title: Brand Partnership
