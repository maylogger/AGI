rules_ai_checkable:
- module: ''
  criterion: AI 可檢查：logo 寬度不得小於 30 mm；logo 四周 margin 為 logo 寬度的 1/20；擾動背景使用白版或 cartouche；cartouche 顏色需來自 Musée Zadkine palette；禁用十項不可發生。
  chapter: ch-01
  chapter_title: Les éléments de base
- module: Visual Identity
  criterion: AI 可檢查：黑版僅用於黑白或極端 reproduction 條件；白版用於彩色、深色、深色攝影或複雜背景；不得任意改 logo 色。
  chapter: ch-01-01
  chapter_title: Le logotype
- module: ''
  criterion: AI 可檢查：logo 寬度 < 30 mm 為違規；margin 必須 ≥ logo width/20；cartouche padding 同 margin；cartouche color 必須屬於官方 palette。
  chapter: ch-01-02
  chapter_title: Taille, marge et cartouche
- module: ''
  criterion: AI 可檢查：多 logo 必須水平排列；基線對齊；左右間距 ≥ 2 倍 M 高；不得改比例、改色、拆分 logo、變形、使用 outline、使用漸層、放置在降低可讀性的背景、加陰影、分開兩個字。
  chapter: ch-01-03
  chapter_title: Cohabitation and Interdits
- module: Color System
  criterion: AI 可檢查：攝影應優先呈現材質/觸感或作品局部；色彩需取自 Granit、Ébène、Noyer、Orme、Marbre、Pierre；印刷使用 Helvetica Neue；bureau/internet 僅在 Helvetica
    Neue 不可用時使用 Arial。
  chapter: ch-01-04
  chapter_title: Iconography, Color and Typography
- module: ''
  criterion: AI 可檢查：名片建議使用 Conquéror Vergé 350g 或同級創作紙；名片正面色彩需從官方 palette 選擇；電子簽名需包含姓名、職稱、email、電話、地址與網站；印章尺寸為 59 x 23 mm。
  chapter: ch-02
  chapter_title: La papeterie
- module: ''
  criterion: AI 可檢查：badge 可有姓名或無姓名兩種版本；展覽 calicot 需包含展期/展名/網址等必要資訊；空間應用不得違反基礎 logo 尺寸與 margin。
  chapter: ch-03
  chapter_title: La signalétique
- module: ''
  criterion: AI 可檢查：指定格式應使用對應模板尺寸；參觀摺頁與 dépliant d’appel 需依巴黎市政府 charte 並使用 VistaSans；co-editions logo 水平排列、基線對齊、左右距離至少 2M。
  chapter: ch-04
  chapter_title: L’édition
- module: ''
  criterion: AI 可檢查：商品上的 logo/網址需符合最小尺寸與 margin；小物件不得使用導致可讀性不足的複雜版面；不得任意改色或拆分 logo。
  chapter: ch-06
  chapter_title: Produits dérivés
