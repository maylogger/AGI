# L3 決策卡 sidecar — Coldwell Banker Global Luxury
# schema：research/schemas/decision_pattern.schema.yaml
# 由 note.md 反向工程萃取；strict evidence 連回本檔 index.yaml 章節。
# 同一 dp- id 可出現在多份 sidecar，compile_knowledge_graph.py 會合併並累計信心。

brand_id: Coldwell_Banker_2020
decisions:
  - id: dp-platform-before-visual-rules
    title: 先定義企業策略與語氣，再建立視覺識別工具箱
    problem:
      statement: 大型技術企業若直接寫視覺規則，視覺系統會變成單純新風格，而非品牌平台的執行工具。
      signals: [no_strategic_foundation, enterprise, style_over_system, new_identity]
    solution:
      module: Brand Strategy
      move: 先建立 Who We Are → How We Communicate → Brand Platform，再進入 Visual System
      layer: strategy
    reason:
      - 視覺規則需有可回推的語義來源
      - 品牌不是單一標誌，而是組織如何行動與如何溝通
      - 品牌是決策系統，不是美術風格；每個視覺與文案選擇都應能回推到品牌支柱
      - 先建立判斷標準，後續視覺與語氣才有可回溯的語義來源
    applicable_when:
      industries: [industrial_materials_science, tech_software]
      brand_types: [category_creator, heritage_legacy, challenger, mission_driven]
      conditions: [new_identity, strategy_refresh]
      archetypes: [full_brand_system, brand_experience_guide]
    dependencies:
      requires: []
      enables: [Visual Identity, Color System, Typography System, Voice and Tone]
    anti_patterns:
      - guideline 從空白直接列章節、先寫 Logo 規格
    evidence:
      - brand_id: Coldwell_Banker_2020
        chapter: ch-01
        excerpt: "先把 luxury 連到母品牌的服務倫理，避免高端識別只剩黑金視覺符號；brand values -> expression standards -> application governance，先建立判斷標準再進入視覺、語氣或應用規格。"
    status: extracted

  - id: dp-restraint-as-luxury-signal
    title: 用克制與內隱表達奢華，而非高頻奢華詞堆疊
    problem:
      statement: 高端品牌若靠大量「奢華」字眼與華麗裝飾堆疊來證明自己高級，反而顯得用力、廉價，稀釋了真正的高端感。
      signals: [premium_perception, restraint, exclusivity, brand_overclaiming_risk]
    solution:
      module: Voice and Tone
      move: 以「X but not Y」二元語氣定義邊界，並用禁用／慎用詞清單讓奢華內隱於精準與克制
      layer: language
    reason:
      - 奢華應內隱，不靠高頻 luxury 詞堆疊
      - 精緻但不炫耀，自信但不傲慢，英式但外向，奢華但不硬賣
      - 高端品牌文案需檢查詞義準確與詞頻疲乏
    applicable_when:
      industries: [luxury_premium]
      brand_types: [premium_luxury, heritage_legacy]
      conditions: [premium_perception, mature_brand]
      archetypes: [brand_experience_guide, full_brand_system]
    dependencies:
      requires: [Brand Strategy]
      enables: [Content Design]
    anti_patterns:
      - 過度使用 luxury/luxurious 作描述詞
      - 用 exquisite、covetable、iconic、unique 等高風險詞堆疊撐場面
    evidence:
      - brand_id: Coldwell_Banker_2020
        chapter: ch-02-03
        excerpt: "避免 luxury 文案過度炫耀，建立從容、清楚、禮貌的高端語氣；copy 應清楚、禮貌、資訊充分，不得過度誇張、粗俗、硬銷或不必要地複雜。"
      - brand_id: Coldwell_Banker_2020
        chapter: ch-01
        excerpt: "不得只使用財富或排他性語彙定義 luxury；高端感應建立在服務證據與文化價值上。"
    status: extracted

  - id: dp-editorial-typography-for-premium
    title: 用具傳承感的編輯級襯線字體承載高端與精緻
    problem:
      statement: 高端品牌需要字體本身就傳達傳承、工藝與精緻，而不只是中性的資訊載體；錯用通用字體會讓品牌失去高級語感。
      signals: [premium_perception, heritage, craftsmanship, editorial_feel]
    solution:
      module: Typography System
      move: 以 heritage serif（Caslon 系列）建立層級與語氣，並為每個字重指定明確用途與最小字級
      layer: visual_core
    reason:
      - 用字體建立 Harrods 的傳統、精緻與現代實用性
      - 字體不是任選風格，而是通道、媒介與品牌層級的管理工具
      - 字體使用應讓層級與語氣自然呈現
    applicable_when:
      industries: [luxury_premium, media_entertainment]
      brand_types: [premium_luxury, heritage_legacy]
      conditions: [premium_perception, editorial_feel]
      archetypes: [brand_experience_guide, full_brand_system]
    dependencies:
      requires: [Typography System]
      enables: [Content Design]
    evidence:
      - brand_id: Coldwell_Banker_2020
        chapter: ch-03-02
        excerpt: "以 Adobe Garamond Pro 襯線字承載優雅；字體不是單一規格，而是 mood selector，讓品牌在優雅、力量、清晰與親近間調節聲音。"
    status: extracted

  - id: dp-asset-protection-for-legacy
    title: 把歷史品牌的核心識別當成不可妥協的資產來保護
    problem:
      statement: 歷史悠久的品牌，其 logo、色彩與材質是長期累積的資產；任何外部合作或內部輸出都可能在不經意間稀釋它。
      signals: [heritage, asset_protection, consistency_over_time, brand_dilution_risk]
    solution:
      module: Visual Identity
      move: 把 logo 版本、光學幾何、最小尺寸、清除區與色彩重製定為不可妥協的資產規則，並要求以 Pantone/CMYK 準確匹配
      layer: visual_core
    reason:
      - 保護歷史奢華零售品牌的核心識別，讓所有合作與內部輸出不削弱品牌資產
      - 奢侈品牌的顏色是資產，不是裝飾選項
      - 高端品牌規範應明確處理光學校正與印刷材質
    applicable_when:
      industries: [luxury_premium]
      brand_types: [heritage_legacy, premium_luxury]
      conditions: [heritage, asset_protection]
      archetypes: [brand_experience_guide, corporate_toolkit]
    dependencies:
      requires: [Visual Identity]
      enables: [Governance]
    anti_patterns:
      - 以螢幕或列印稿視覺匹配色彩，造成跨媒介色差
      - 允許合作方任意替換金屬色／foil 與核心色
    evidence:
      - brand_id: Coldwell_Banker_2020
        chapter: ch-02-01
        excerpt: "保護 Global Luxury 與母品牌 rebrand 的連續性；logo 必須使用核准黑白版本，不得用其他配色或字體、拉伸、傾斜。"
    status: extracted

  - id: dp-clearspace-from-logo-geometry
    title: 用標誌自身幾何定義留白，讓 spacing 隨縮放成立
    problem:
      statement: 用固定像素定義 clear space，在不同尺寸與媒介會失效。
      signals: [scaling_inconsistency, multi_media]
    solution:
      module: Visual Identity
      move: 以標誌幾何（logo height）作為相對留白與尺寸基準
      layer: visual_core
    reason:
      - 版面一致性來自比例關係，不只是絕對尺寸
      - 留白以標誌自身元素為單位，可隨縮放維持比例
      - 留白是識別權重與可讀性的保護機制，需隨標誌縮放
      - 相對單位可建立 scalable spacing token，不被固定像素綁死
    applicable_when:
      industries: []
      brand_types: []
      conditions: [multi_media]
      archetypes: [brand_experience_guide, full_brand_system, logo_asset_guidelines]
    dependencies:
      requires: [Visual Identity]
      enables: []
    examples:
      - minimum clear space = 1x o，optimal = 2x o
    evidence:
      - brand_id: Coldwell_Banker_2020
        chapter: ch-02
        excerpt: "safety distance 至少等於 logomark 高度的 1/2，以標誌自身幾何而非固定尺寸定義安全距離。"
    status: extracted

  - id: dp-palette-roles-and-usage-limits
    title: 用色彩角色與用途限制治理調色盤，而非只給色票清單
    problem:
      statement: 只提供一串色票時，設計者會把任何顏色當成可自由使用，導致主色被稀釋、輔助色被誤用為大面積背景，跨應用失去一致性。
      signals: [color_governance, palette_misuse, brand_color_equity, multi_application]
    solution:
      module: Color System
      move: 為每個顏色指定角色（主色／背景／文字／功能／輔助），並明訂「可作背景／不可作背景」與少量使用門檻
      layer: visual_core
    reason:
      - 主色承擔品牌記憶，輔助／功能色承擔資訊與插圖，角色混用會稀釋品牌資產
      - color token 需附用途限制（可作背景、不可作背景），才能被審稿與自動檢查
      - 把識別色與功能色分離並對後者加治理門檻，可避免資料視覺化隨意擴色
    applicable_when:
      industries: [finance, consumer_retail_hospitality, luxury_premium, nonprofit_social]
      brand_types: [mass_consumer, institutional_public_trust, premium_luxury]
      conditions: [color_governance, multi_application]
      archetypes: [brand_experience_guide, full_brand_system, corporate_toolkit]
    dependencies:
      requires: [Color System]
      enables: [Design Tokens, Accessibility]
    anti_patterns:
      - 只給一串色票，未說明每色角色與可否作背景
      - 讓輔助／功能色被當成大面積品牌背景
    evidence:
      - brand_id: Coldwell_Banker_2020
        chapter: ch-03-01
        excerpt: "以 primary surfaces 搭配 specialty functional accents；UI surface 應為 black 或 white，specialty colors 只能 sparingly 使用，讓攝影與材質承擔情緒。"
    status: extracted

  - id: dp-name-usage-governance
    title: 用名稱使用規則治理品牌正式稱謂與縮寫，避免權威被稀釋
    problem:
      statement: 品牌的正式名稱、縮寫與商標符號若放任各單位、媒體或文件自由書寫，會出現多種非正式簡稱與錯誤寫法，稀釋機構權威與商標權利。
      signals: [name_governance, trademark, abbreviation_misuse, authority_dilution]
    solution:
      module: Legal and Trademark
      move: 明訂首次提及用全名、後續用核准縮寫，並列出禁用變體與商標符號規則
      layer: governance
    reason:
      - 機構或商標型品牌的名稱本身是信任與法律資產，不能被隨意簡化
      - 用「首次提及／後續縮寫／禁用變體」三段式規則可直接轉成 copy lint
      - 名稱治理是品牌系統的一部分，與 logo 一樣維持識別一致
    applicable_when:
      industries: [finance, public_sector, luxury_premium]
      brand_types: [institutional_public_trust, heritage_legacy, premium_luxury]
      conditions: [trademark, name_governance]
      archetypes: [corporate_toolkit, brand_experience_guide, logo_asset_guidelines]
    dependencies:
      requires: [Governance]
      enables: [Content Design, Legal and Trademark]
    anti_patterns:
      - 只給 logo 規範卻不規範文字中的名稱與縮寫寫法
      - 放任媒體與內部文件自創簡稱
    evidence:
      - brand_id: Coldwell_Banker_2020
        chapter: ch-06
        excerpt: "Coldwell Banker Global Luxury® 首次出現需加 ®；不得縮寫為 CB Global Luxury、CBGL 或複數化；COLDWELLBANKERLUXURY.COM standalone 需 uppercase/no spaces。"
    status: extracted
