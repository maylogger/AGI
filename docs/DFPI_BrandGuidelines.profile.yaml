rules_ai_checkable:
- module: Visual Identity
  criterion: 不得套用效果、漸層、旋轉、扭曲、skew、置入形狀或放在同色背景；clear margin 應等於 logo icon 的 X。
  chapter: ch-02
  chapter_title: Brand Logo Design
- module: Typography System
  criterion: headline 應 sparingly 使用；body copy 使用 Segoe UI Regular 10pt / 14pt leading；heading 用於多頁文件或網站新段落。
  chapter: ch-03
  chapter_title: Brand Typography
- module: Color System
  criterion: 僅使用列出的 Hex / RGB；主色包含 `#AA8A00` 與 `#002D72`；新增色彩需被視為不符合規定。
  chapter: ch-04
  chapter_title: Brand Color System
- module: Brand Strategy
  criterion: 行銷材料使用的照片應屬於核准範圍；影像應能說明 diversity、equity、inclusion；不得使用與金融保護任務無關的通用 stock image。
  chapter: ch-05
  chapter_title: Brand Visuals
- module: Brand Strategy
  criterion: 輸出前應確認使用正確檔案格式；不得以壓縮失真或錯誤格式交付需印刷或向量的品牌資產。
  chapter: ch-07
  chapter_title: Brand Summary and Glossary
