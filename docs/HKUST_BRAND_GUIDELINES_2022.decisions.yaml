# L3 決策卡 sidecar — HKUST Brand Guidelines
# schema：research/schemas/decision_pattern.schema.yaml
# 由 note.md 反向工程萃取；strict evidence 連回本檔 index.yaml 章節。

brand_id: HKUST_BRAND_GUIDELINES_2022
decisions:
  - id: dp-platform-before-visual-rules
    title: 先定義企業策略與語氣，再建立視覺識別工具箱
    problem:
      statement: 大型技術企業若直接寫視覺規則，視覺系統會變成單純新風格，而非品牌平台的執行工具。
      signals: [no_strategic_foundation, enterprise, style_over_system, new_identity]
    solution:
      module: Brand Strategy
      move: 先建立 Who We Are → How We Communicate → Brand Platform，再進入 Visual System
      layer: strategy
    reason:
      - 視覺規則需有可回推的語義來源
      - 品牌不是單一標誌，而是組織如何行動與如何溝通
      - 大型機構可用「核心價值 + 品牌人格 + 資產成熟度」管理跨單位溝通
    applicable_when:
      industries: [industrial_materials_science, tech_software, education]
      brand_types: [category_creator, heritage_legacy, challenger, institutional_public_trust]
      conditions: [new_identity, strategy_refresh]
      archetypes: [full_brand_system, brand_experience_guide]
    dependencies:
      requires: []
      enables: [Visual Identity, Color System, Typography System, Voice and Tone]
    anti_patterns:
      - guideline 從空白直接列章節、先寫 Logo 規格
    evidence:
      - brand_id: HKUST_BRAND_GUIDELINES_2022
        chapter: ch-01
        excerpt: "先建立「為何要一致」的共同信念，用 mission → proposition → attributes → personalities → equity 階層作為後續 voice、logo、photography 的策略根源；溝通內容必須可回扣到核心價值。"
    status: extracted

  - id: dp-from-to-voice-translation
    title: 技術品牌語氣指南要給「轉譯規則」，不只是列形容詞
    problem:
      statement: 科學與技術公司容易陷入術語化，受眾停在「所以呢？」而非「原來如此」。
      signals: [technical_jargon_risk, expert_audience, b2b]
    solution:
      module: Voice and Tone
      move: 用 from/to 對照把語氣轉型具體化（術語→可親近、數據→人性利益）
      layer: language
    reason:
      - 提供轉譯規則比列 tone adjectives 更可執行
      - 品牌 voice 可用可觀察語言行為描述，而不只用人格形容詞描述
    applicable_when:
      industries: [industrial_materials_science, tech_software, finance, education]
      conditions: [expert_audience, technical_translation]
      archetypes: [full_brand_system, brand_experience_guide, corporate_toolkit]
    dependencies:
      requires: [Messaging]
      enables: [Content Design]
    anti_patterns:
      - 只列 tone adjectives 卻沒有轉譯方法
    evidence:
      - brand_id: HKUST_BRAND_GUIDELINES_2022
        chapter: ch-02-01
        excerpt: "把 passionate、confident、friendly、inspiring、intelligent 五種 voice qualities 對應五種寫作策略，並以 before/after 範例把抽象語氣轉成句法與敘事順序；語氣不是形容詞清單，而是可觀察的語言行為。"
    status: extracted

  - id: dp-clearspace-from-logo-geometry
    title: 用標誌自身幾何定義留白，讓 spacing 隨縮放成立
    problem:
      statement: 用固定像素定義 clear space，在不同尺寸與媒介會失效。
      signals: [scaling_inconsistency, multi_media]
    solution:
      module: Visual Identity
      move: 以標誌幾何（logo height）作為相對留白與尺寸基準
      layer: visual_core
    reason:
      - 版面一致性來自比例關係，不只是絕對尺寸
      - 留白以標誌自身元素為單位，可隨縮放維持比例
    applicable_when:
      conditions: [multi_media]
      archetypes: [brand_experience_guide, full_brand_system, logo_asset_guidelines]
    dependencies:
      requires: [Visual Identity]
    evidence:
      - brand_id: HKUST_BRAND_GUIDELINES_2022
        chapter: ch-03-01
        excerpt: "標誌 clear space 應符合 X-based rule，雙語主標誌印刷主版最小高度 10mm、線上 45px，logomark 印刷最小 8mm、線上 40px，使留白與尺寸可跨媒介一致。"
    status: extracted

  - id: dp-modular-manual-for-public-units
    title: 用「可辨識但不獨立」的層級框架治理多機構／多單位品牌
    problem:
      statement: 大型多機構、多單位組織，各單位都想要自己的識別，若無分層治理，品牌會裂解成互相競爭、削弱母品牌的子品牌。
      signals: [multi_unit_consistency, multi_entity, sub_unit_identity, brand_architecture_complexity]
    solution:
      module: Brand Architecture
      move: 先建立「誰在說話」的判斷層，再以 umbrella → member → VPU/GP → lockup → special case 的層級把組織結構視覺化
      layer: governance
    reason:
      - 局部單位可以被識別，但不能競爭或替代母品牌
      - 附屬單位可以被識別，但不能凌駕或稀釋母品牌
    applicable_when:
      industries: [public_sector, education]
      brand_types: [institutional_public_trust, platform_ecosystem]
      conditions: [multi_unit_consistency, multi_entity]
      archetypes: [multi_brand_architecture, brand_experience_guide]
    dependencies:
      requires: [Brand Strategy, Visual Identity]
      enables: [Governance]
    anti_patterns:
      - 各單位自行創造分支品牌與專屬 tagline
      - 只列 logo 圖檔卻不給「何時用 umbrella、何時用單一機構」的判斷規則
    evidence:
      - brand_id: HKUST_BRAND_GUIDELINES_2022
        chapter: ch-04-01
        excerpt: "附屬單位標誌需納入大學身份並遵守字體、間距與審核流程；附屬單位可以被識別，但不能凌駕或稀釋母品牌，用母品牌左側、附屬識別右側、共享 X-based spacing 管理多品牌關係。"
    status: extracted

  - id: dp-approval-gate-for-exceptions
    title: 例外不是漏洞，用審核閘門把差異收進可治理的模組
    problem:
      statement: 規則無法窮舉所有情境，現實組織總會有例外；若放任各單位自行決定，例外會逐步擴張成破壞系統的破口。
      signals: [exception_handling, multi_unit_consistency, governance, scaling_risk]
    solution:
      module: Governance
      move: 例外章節須明確寫出「為何例外／何時可用／不可擴張到哪裡」，並交由品牌管理單位審核
      layer: governance
    reason:
      - 例外章節應寫出「為何例外」「何時可用」「不可擴張到哪裡」
      - 品牌治理文件應同時包含設計規格與組織審批路徑，否則規範無法被執行
    applicable_when:
      industries: [public_sector, finance, education]
      brand_types: [institutional_public_trust, platform_ecosystem, heritage_legacy]
      conditions: [multi_unit_consistency, exception_handling]
      archetypes: [multi_brand_architecture, corporate_toolkit]
    dependencies:
      requires: [Governance]
      enables: []
    anti_patterns:
      - 例外只寫「可以這樣做」卻不寫適用邊界與審核者
      - 各單位把一次性例外當成通用替代方案沿用
    evidence:
      - brand_id: HKUST_BRAND_GUIDELINES_2022
        chapter: ch-04
        excerpt: "新標誌必須完成 confirmation → feasibility review → brand compliance review → approval → legal record → official listing 的治理流程，並由 senior management、MTPC、PAO、Vice-President 與 Legal Office 參與審核。"
    status: extracted

  - id: dp-cobranding-grid-governance
    title: 用 grid 與固定模距治理聯名 lockup
    problem:
      statement: 聯名情境若沒有空間規則，夥伴標誌的相對大小與距離會失控，混淆主從關係。
      signals: [cobranding, partner_governance, multi_brand]
    solution:
      module: Brand Architecture
      move: 以 grid、固定 module 距離與分隔線定義 master brand 與 partner brand 的 lockup
      layer: strategy
    reason:
      - 聯名需先界定空間與主從，才能維持品牌資產權重
      - 合作關係必須被視覺化為清楚的從屬或等距關係
    applicable_when:
      industries: [finance, tech_software, education]
      brand_types: [platform_ecosystem, institutional_public_trust]
      conditions: [cobranding]
      archetypes: [multi_brand_architecture, brand_experience_guide]
    dependencies:
      requires: [Brand Architecture, Visual Identity]
      enables: [Governance]
    evidence:
      - brand_id: HKUST_BRAND_GUIDELINES_2022
        chapter: ch-04-02
        excerpt: "合作方標誌不得超過大學標誌高度，大學標誌通常置左並需等高或依示例共用 X-based spacing，新標誌須經治理流程核准。"
    status: extracted
