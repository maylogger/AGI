rules_ai_checkable:
- module: ''
  criterion: AI 可檢查：流程不得過度複雜；文案需簡潔清楚；介面應使用 Visa 識別創造記憶點；關鍵步驟需預先處理使用者可能疑慮。
  chapter: ch-01
  chapter_title: Getting Started
- module: Brand Strategy
  criterion: AI 可檢查：若規則以 `*` 標示應視為 mandatory；任何 Visa credential display 必須能讓使用者辨識帳戶與 Visa 關係。
  chapter: ch-02
  chapter_title: Visa Digital Brand Elements
- module: Brand Strategy
  criterion: 'AI 可檢查：Visa Brand Mark 只能用 blue #15195A 或 white #FFFFFF；clear space 儘量為 V 高度 1X；文字寫法為 `Visa`，不得全大寫 `VISA`；品牌標誌不可與周圍內容比例失衡；monochrome
    screen 用深色背景加白色 mark。'
  chapter: ch-02-01
  chapter_title: Visa Brand Mark
- module: Brand Strategy
  criterion: AI 可檢查：Visa sensory elements 應出現在 Visa product/capability 的品牌事件中；Brand Mark 最大寬度不得超過螢幕寬 40%；動畫應水平垂直置中；無法顯示動畫時使用
    static graphic、sound 或 haptic；custom dark color rule set 用於 monochrome/dark background。
  chapter: ch-02-02
  chapter_title: Visa Sensory Branding
- module: ''
  criterion: AI 可檢查：付款確認、交易紀錄、enrolled card listing 需顯示 Visa credentials；Token Service 錢包 in-store payment 必須有 card art；使用者需能看到
    token/digital account number last 4 與解釋；不得使用 `token` 描述 token number；digital card art 不得包含 cardholder name、PAN、BIN、expiry、EMV
    chip contacts、hologram 靜態圖；card art 比例應符合 ISO ID-1 1536x969；Contactless Symbol 不得出現在 card art。
  chapter: ch-02-03
  chapter_title: Visa Credentials and Card Art
