rules_ai_checkable:
- module: Visual Identity
  criterion: AI 可檢查：logo 不得重新繪製或改變；高度不得低於 0.25 inch 或 17px；寬度不得低於 0.8 inch；clear space 至少為 S cap height 的 1/2；tagline logo
    高度不得低於 0.4 inch；division name 不得低於 8pt。
  chapter: ch-01
  chapter_title: Our Logo
- module: Visual Identity
  criterion: AI 可檢查：數位與彩色印刷優先使用 Stifel Blue 或 white；黑版只用於黑白印刷或單色 imprints；影像背景不得干擾 logo；clear space 必須至少為 S 高度的 1/2。
  chapter: ch-01-01
  chapter_title: Logo Colors, Backgrounds and Spacing
- module: ''
  criterion: AI 可檢查：group name 不得比 Stifel logo 更 prominent；未列明的 division/department name 需 Marketing, Advertising & Graphics
    特別許可；group name capital letters 高度需依規格為 logo 參照字高的 1/2 或 1/3。
  chapter: ch-01-02
  chapter_title: Unacceptable Usage and Name Extensions
- module: Color System
  criterion: AI 可檢查：Stifel Blue 必須為 Pantone 540 / RGB 0 48 87 / HEX `#003057`；黑色為 `#000000`；Level III 色彩僅用於 charts、graphs、diagrams；建立
    asset class chart 時必須使用預先指定的資產類別色。
  chapter: ch-02
  chapter_title: Color Palette
- module: Typography System
  criterion: AI 可檢查：print communication 使用 Meta Office；digital formatting 使用 Arial；disclosure 通常為 8pt Meta Light Italic；任何
    type 不得低於 8pt；digital type 不得低於 10pt；body copy 不得 justify；不得 hyphenate。
  chapter: ch-03
  chapter_title: Our Typography
- module: ''
  criterion: AI 可檢查：不得使用 bags of money、nest eggs、money growing on trees、upward-trending charts 或不符合實際資料的誇張表情；印刷影像需 300dpi；數位需
    72dpi；使用任何圖像需保留 permission record。
  chapter: ch-04
  chapter_title: Visual Guidelines
- module: ''
  criterion: AI 可檢查：business cards 不得加入 custom group logos 或 special colors；正面不得列超過兩個名字；三個以上名字應一到兩名在正面、全部在背面；website 必須先通過
    Marketing, Advertising & Graphics public communications review。
  chapter: ch-05
  chapter_title: Stationery Guidelines
- module: Brand Strategy
  criterion: AI 可檢查：正式名稱須為 `Stifel, Nicolaus & Company, Incorporated`；母公司為 `Stifel Financial Corp.`；不得使用 `Stifel Nicolaus`、`Stifel
    Financial`、`Stifel, Nicolaus & Company, Inc.` 等列明變體；句號後與冒號後使用兩個空格；一到九拼字，10 以上用數字；4 位以上整數加逗號。
  chapter: ch-06
  chapter_title: Brand Grammar
- module: Brand Strategy
  criterion: AI 可檢查：advertisement 必須透過 imagery、color、typography、messaging 呈現品牌；brochure cover 影像使用需符合允許配置；advisor websites
    可在 Stifel brand 內客製。
  chapter: ch-07
  chapter_title: Brand Examples
