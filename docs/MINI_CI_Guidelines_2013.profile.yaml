rules_ai_checkable:
- module: Typography System
  criterion: AI 可檢查：文字不得置中；text block 僅 flush left/ragged 或 flush right/ragged；body copy 只能黑白；MINI publications 不使用 italics；bullet
    使用 carat/chevron，不使用標準圓點。
  chapter: ch-01
  chapter_title: Typography and Position
- module: Visual Identity
  criterion: AI 可檢查：`MINI` 必須全大寫；MINI 不得 italic；每則 ad 僅一個 logo；logo 不得置於 body copy 或替代 wordmark；不得與 claim/URL 合併；不得有其他 logotype/symbol
    與 MINI wordmark 混合。
  chapter: ch-02
  chapter_title: Logo and Wordmark
- module: Visual Identity
  criterion: AI 可檢查：logo 周圍應至少保留指定比例空間；非 OOH/特定印刷不得任意使用 2-D logo；單色版本只用於單色應用。
  chapter: ch-02-01
  chapter_title: Clear Space and Logo Versions
- module: ''
  criterion: AI 可檢查：除 classic Mini 外，一律使用 `MINI`；不得寫作 `Mini`、`mini` 或混合大小寫；不得使用 `MINI-Service` 類 hyphenation；logo 應非置中、可與
    headline 上緣對齊。
  chapter: ch-02-02
  chapter_title: Wordmark and Placement
- module: Brand Strategy
  criterion: AI 可檢查：複數仍為 MINI，不用 MINIs/MINI's；使用 `MPG` 而非 `mpg`；使用 `hwy` 而非 `HWY`；車型順序如 `MINI Cooper S Countryman ALL4`；URL
    需 all caps 且 MINI bold；tagline 使用 `Let's Motor.®` 或 `LET'S MOTOR.®`。
  chapter: ch-03
  chapter_title: MINI Style Guide and Brand Quick Hits
- module: ''
  criterion: AI 可檢查：每頁不超過 3 個 frame；frame 不能空；frame 至少 bleed off 1 edge；相接 frame 必須不同色；2-3 個 frame 至少一側相接、不得重疊、不得留縫；每頁最多 2
    種 frame color。
  chapter: ch-04
  chapter_title: Frames
- module: ''
  criterion: AI 可檢查：email body 使用 10 或 11 pt Arial black；signature info 10 pt Arial black、line spacing 11 pt；email 地址使用 all
    caps；signature graphic 不得改尺寸；名片按指定尺寸與核准訂購流程處理。
  chapter: ch-06
  chapter_title: Email Communications and Business Cards
- module: ''
  criterion: AI 可檢查：新素材應來自核准資源入口；不得使用未核准網路下載 logo 或影像；需登入資源不得把敏感存取資訊散佈到公開文件。
  chapter: ch-07
  chapter_title: Resources
