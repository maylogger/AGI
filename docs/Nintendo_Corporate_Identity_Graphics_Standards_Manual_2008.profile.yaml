rules_ai_checkable:
- module: Governance
  criterion: AI-checkable：首次或主要使用需帶 TM/SM/® 等符號；商標不得複數化、所有格化或任意縮寫；包裝與行銷材料需包含正確 copyright notice。
  chapter: ch-01
  chapter_title: Introduction and Trademark Governance
- module: ''
  criterion: AI-checkable：檢查輸入是否使用指定元素、是否符合頁面標示的尺寸/比例/色彩/留白，且不得出現章節列出的禁用組合。
  chapter: ch-01-01
  chapter_title: Purpose of Manual
- module: ''
  criterion: AI-checkable：檢查輸入是否使用指定元素、是否符合頁面標示的尺寸/比例/色彩/留白，且不得出現章節列出的禁用組合。
  chapter: ch-01-02
  chapter_title: Trademark and Copyright Rules
- module: Visual Identity
  criterion: AI-checkable：正式法律文件需使用 Nintendo of Europe GmbH；一般或第二次提及可用 Nintendo；必須使用 2008 後最新 corporate logo。
  chapter: ch-02
  chapter_title: Logo History and Corporate Name
- module: ''
  criterion: AI-checkable：logotype 必須與 racetrack 一起使用；左右保護區各為 logo 寬度 10%；上下保護區各為 logo 高度 35%；保護區內不得放文字、logo 或圖形。
  chapter: ch-03
  chapter_title: Proportion and Protective Area
- module: Visual Identity
  criterion: AI-checkable：白底優先使用 gray RGB 140/140/140 或 Pantone Cool Gray 8c；彩色背景灰色可見度不足時使用 white；white 可見度不足時才使用 black；不得新增其他
    logo 顏色。
  chapter: ch-04
  chapter_title: Logo Color and Backgrounds
- module: Color System
  criterion: AI-checkable：檢查輸入是否使用指定元素、是否符合頁面標示的尺寸/比例/色彩/留白，且不得出現章節列出的禁用組合。
  chapter: ch-04-01
  chapter_title: Grayscale and Color Backgrounds
- module: ''
  criterion: AI-checkable：不得拉伸、壓縮、旋轉或重繪 logo；不得改變 racetrack/logotype 關係；不得套用未授權陰影、外框、漸層或顏色；不得放在可讀性不足背景。
  chapter: ch-05
  chapter_title: Prohibited Use
- module: ''
  criterion: AI-checkable：packshot 應使用核准 logo 檔與指定位置；TV/promotional/event 應遵守同一 logo 色彩與留白規則；不得讓產品圖資自行定義替代 logo。
  chapter: ch-06
  chapter_title: Applications and Product Graphic Standards
