rules_ai_checkable:
- module: ''
  criterion: AI 可檢查文案是否包含 playspace equity、community、kids、collaboration 等核心概念；語氣不得顯得 showy、overwhelming、zany、rigid、arrogant、sappy、frantic
    或 flippant；正式提及品牌時應使用全大寫 `KABOOM!`。
  chapter: ch-01
  chapter_title: Verbal Identity
- module: Voice and Tone
  criterion: 文案應使用主動、邀請式、社群導向語句；若語句只凸顯組織英雄主義、缺少 community agency，應標記為風險。
  chapter: ch-01-01
  chapter_title: Voice & Tone
- module: ''
  criterion: 外部簡介應明確包含 national nonprofit、playspace equity、communities、every kid；不得只把 KABOOM! 描述為 playground builder。
  chapter: ch-01-02
  chapter_title: Mission, Tagline, What We Do, Why We Do It, About Us
- module: ''
  criterion: logo 不得扭曲、換字體、加特效、改非指定色、放在低對比或混亂背景上；色彩、字體與攝影需符合指定清單與比例。
  chapter: ch-02
  chapter_title: Visual Identity
- module: Visual Identity
  criterion: co-branding 時雙方 logo 應視覺等重；每個 logo 至少保留其 clearspace；社群 avatar 切換到 mark 時需同步更新所有渠道。
  chapter: ch-02-01
  chapter_title: Logo, Mark, and Co-Branding
- module: Brand Strategy
  criterion: 應用物不得引入未定義色彩、任意 logo 位置或不符合攝影公平規則的素材。
  chapter: ch-03
  chapter_title: Brand in Use
