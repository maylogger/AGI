rules_ai_checkable:
- module: Brand Strategy
  criterion: AI 可檢查：任何素材需能說明其如何支持 cohesive brand presentation；不得與 trustworthy、professional、reliable 的方向衝突。
  chapter: ch-01
  chapter_title: Brand Guidelines
- module: Brand Strategy
  criterion: AI 可檢查：視覺素材應避免廉價、混亂或不可信；需呈現智慧、洞察或行動可能性。
  chapter: ch-01-02
  chapter_title: Brand Promise and Visual Direction
- module: Visual Identity
  criterion: AI 可檢查：不得 recolor、drop shadow、重建 logotype、改比例、加 subproduct name、放在降低可讀性的背景；partner logo 需用 neutral divider 分隔。
  chapter: ch-02
  chapter_title: Brand Logo Lockups and Color Applications
- module: Visual Identity
  criterion: AI 可檢查：若背景太暗，使用 reverse；若背景降低可讀性，需改背景或 logo 版本；不得手動打字重建 signature。
  chapter: ch-02-01
  chapter_title: Logo Variants and Usage
- module: ''
  criterion: AI 可檢查：free product marketing assets 必須同一 canvas 同時出現 Google(A) 與 product lockup(F)；禁止使用表格中標示 do not use 的組合。
  chapter: ch-02-02
  chapter_title: Usage Matrix and Product Rules
- module: Photography System
  criterion: AI 可檢查：影像需有單一焦點、背景少雜訊、呈現多元使用者；不得出現競品產品或不可移除的外部品牌。
  chapter: ch-04
  chapter_title: Imagery
- module: ''
  criterion: AI 可檢查：online slide 解析度至少 72 dpi；可能印刷的長 PDF 至少 300 dpi；不得 pixelated/blurred；不得包含 competitor products。
  chapter: ch-04-01
  chapter_title: Photography
- module: Iconography System
  criterion: AI 可檢查：插畫若超過一秒才可理解即過度複雜；符號不得依賴地方節日或文化梗；同組插畫光源需一致。
  chapter: ch-04-02
  chapter_title: Illustration and Iconography
- module: Typography System
  criterion: AI 可檢查：Google Sans/Display 不得用於 all caps；Google Sans 不得用於 body 或超過一句的 callout；bold sparingly；Product Sans 不得用於非
    lockup。
  chapter: ch-05
  chapter_title: Typography
