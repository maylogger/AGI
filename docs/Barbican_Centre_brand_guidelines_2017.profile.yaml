rules_ai_checkable:
- module: ''
  criterion: 可檢查規則：文件需能將每個應用追溯到 logo、lock-up、grid、typeface 或 typography；不得把單一 logo 使用視為完整 identity。
  chapter: ch-01
  chapter_title: Core Elements Introduction
- module: Visual Identity
  criterion: 可檢查規則：logo 應使用完整圓形 artwork；最終稿不得保留 crop marks；logo full-circle 必須與背景形成對比；Barbican word 必須與半圓形成黑/白或設計色對比；特殊例外需聯絡
    printdesign。
  chapter: ch-02
  chapter_title: Logo
- module: ''
  criterion: 可檢查規則：lock-up relationship 不得改變；Futura Book 可在 legibility issue 時改 Futura Bold；tracking/leading 不得調整；合作 lock-up
    優先黑或反白並固定位置。
  chapter: ch-03
  chapter_title: Lock-up
- module: ''
  criterion: 可檢查規則：所有元素應對齊 grid；格式應使用核准 grid set；文字、圖片與 logo/lock-up 需保持平衡與比例；不得任意偏離欄位造成不專業版面。
  chapter: ch-04
  chapter_title: Grid
- module: Typography System
  criterion: 可檢查規則：Barbican identity 使用 Scangraphic Futura；Futura Bold 是主要行銷字重；Futura SB Bold 或 SH Bold 依既有模板使用；不得混用未核准 Futura
    版本。
  chapter: ch-05
  chapter_title: Typeface
- module: Typography System
  criterion: 可檢查規則：Barbican typography always ranged left；句子不得 solely in capitals；ragged edge 應平衡；typographic elements 需共同支援
    hierarchy。
  chapter: ch-06
  chapter_title: Typography
- module: ''
  criterion: 可檢查規則：每個 art form 應仍使用 Barbican core elements；不得建立與核心字體/grid/logo 無關的獨立視覺；分支差異應主要來自內容、圖像與版面節奏。
  chapter: ch-07
  chapter_title: Art Forms
- module: ''
  criterion: 可檢查規則：案例應可辨識 logo/lock-up/grid/typeface 的使用；範例不得被當成任意偏離核心規則的授權；特殊案例需能說明例外理由。
  chapter: ch-08
  chapter_title: Design Examples
