rules_ai_checkable:
- module: ''
  criterion: NOC 使用限非商業目的；Tokyo 2020 Emblem 或 Wordmark 每件 clothing 只能使用一次，最大 30 cm2 或 44mm width；不得用於 licensed / replica merchandise；wordmark
    不得與 manufacturer identification 關聯；emblem 與其他 authorized identification 不得並置。
  chapter: ch-01
  chapter_title: Introduction and NOC Usage Conditions
- module: ''
  criterion: Games Distinctive Element、wordmark、Olympic symbol 不得分離，除非特別授權；一般應包含 TM；emblem 寬度小於 30mm 時可省略 TM；full-colour 與
    monochrome emblem 最小不得低於 12mm / 35px；必須使用原始資料。
  chapter: ch-02
  chapter_title: Emblem System
- module: ''
  criterion: 不得單獨使用 Games Distinctive Element；wordmark 必須保持官方 city name + year 組成；Olympic symbol 不得與 emblem 拆分；TM 預設應包含。
  chapter: ch-02-01
  chapter_title: Emblem Components
- module: ''
  criterion: clear space 應至少 0.7X；print 最小 12mm，digital 最小 35px；full-colour emblem 應用白底；photo 或 colour background 應使用 boxed
    emblem；不得在色底上直接使用 full-colour emblem；不得加邊框。
  chapter: ch-02-02
  chapter_title: Clear Space, Size, Colour and Background
- module: ''
  criterion: 不得 outline、金銀燙、改色、變形、傾斜、旋轉、替換 wordmark font、改變元件順序、創建 contour area、改比例、3D、陰影、翻轉、與其他元素組合或單獨使用 distinctive element。
  chapter: ch-02-03
  chapter_title: Incorrect Usage
- module: ''
  criterion: 非競賽服可使用 wordmark，但不得直接與 manufacturer logo 關聯；競賽服與訓練服若與 NOC emblem 一起使用，wordmark 必須在 NOC emblem 下方且有清楚 separation；使用需送
    IOC approval；minimum size print 12mm、digital 35px；clear space 0.5X。
  chapter: ch-03
  chapter_title: Tokyo 2020 Wordmark
- module: ''
  criterion: Tokyo 2020 相關溝通材料應優先使用 DIN Light、Regular、Bold 或 Black；若廣告、網站或印刷情境有更適合字體，可在合理情況下使用其他字體。
  chapter: ch-04
  chapter_title: Text Fonts
- module: ''
  criterion: printed materials / publications 不得用於 commercial or promotional purposes；business card 僅限參與 Tokyo 2020 Games
    的 NOC management staff，且 Tokyo 2020 emblem 必須小於 NOC emblem；envelopes、postcards 與含第三方品牌材料不得使用；website 上 Tokyo 2020 emblem
    必須與 commercial contents 明確分離，僅 Worldwide Olympic Partners 可作為商業品牌例外。
  chapter: ch-05
  chapter_title: Application Examples
