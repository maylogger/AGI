      - id: "ch-11-02"
        title: "Equal"
        level: 2
        order: 2
        pages: "119"
        summary: "雙方平等時的共同露出。"
      - id: "ch-11-03"
        title: "Partner-led"
        level: 2
        order: 3
        pages: "120"
        summary: "合作方主導時 AXA 的品牌位置。"
