patterns:
- name: 城市品牌可把一句 motto 作為可授權的關係標記，連接不同活動與故事。
  chapter: ch-01
  chapter_title: I amsterdam
- name: 品牌持有者與品牌管理者分離時，guideline 需明示 ownership/license 關係。
  chapter: ch-02
  chapter_title: amsterdam&partners
- name: 可轉移性
  chapter: ch-03
  chapter_title: Core Values
- name: 以媒介短長邊比例決定 label 尺寸，是 responsive brand mark 的高價值 pattern。
  chapter: ch-04
  chapter_title: The Label
- name: 以多版型 examples 驗證同一公式，是 design rule education pattern。
  chapter: ch-05
  chapter_title: Examples of Advertisement Formats
- name: 將品牌標記連到內容相關頁，而非只作裝飾，是 digital brand governance pattern。
  chapter: ch-06
  chapter_title: Online Use
- name: 用字母本身定義 clear space，是 wordmark governance 的可複用模式。
  chapter: ch-07
  chapter_title: Pure Motto Use
- name: 指定一個主字體與常用 2-3 個字重，是保持彈性又避免混亂的 typography pattern。
  chapter: ch-08
  chapter_title: Font
- name: 大量展示跨媒介案例，是讓外部合作方理解規則彈性的方式。
  chapter: ch-09
  chapter_title: Examples of Use
- name: 在手冊最後放明確審批時間，是品牌治理與專案管理的交會 pattern。
  chapter: ch-10
  chapter_title: Contact
rules_ai_checkable:
- module: ''
  criterion: 使用 I amsterdam 時應連結到與 Amsterdam Metropolitan Area 相關的人、故事、事件、活動或象徵；不得假設 motto 可自由商業使用，因其為註冊品牌。
  chapter: ch-01
  chapter_title: I amsterdam
- module: ''
  criterion: 使用 I amsterdam 的內容應至少能對應 creativity、innovation、entrepreneurship 之一；若素材無法連結城市價值，應避免使用 label。
  chapter: ch-03
  chapter_title: Core Values
- module: ''
  criterion: standard form 為黑白 motto 置於 red label；white label 僅用於紅底；grey label 用於黑白廣告；motto 不得放在其他 label；label 只能放左、右或上方，不得放底部或角落；左右放置時閱讀方向需由上至下，上方放置時由左至右；與文字或影像至少保留
    1/4 label height；不得放在 sponsor logos 中間或與 sponsor logos 形成視覺整體；最低 label size 為 L 20mm、H 5.702mm。
  chapter: ch-04
  chapter_title: The Label
- module: ''
  criterion: X 為 1-1.99 時 label 為短邊 30%；2-2.49 為 40%；2.5-2.99 為 50%；3-3.49 為 60%；3.5-3.99 為 70%；4-4.49 為 80%；4.5-4.99 為 90%；5-5.49
    為 100%；5.5-5.99 為 110%；6-6.49 為 120%；6.5-6.99 為 130%；7-7.49 為 140%；7.5 以上固定為 150%，不再同比增加。
  chapter: ch-05
  chapter_title: Examples of Advertisement Formats
- module: ''
  criterion: pure motto 必須置中；左右最小 margin 為字母 I 的高度；右側測量以 m 為基準，不包含 ®；僅用於 film、online banners、flags，且當 I amsterdam 是 unique
    sender 或被如此呈現；螢幕使用最小 motto height 為 20px。
  chapter: ch-07
  chapter_title: Pure Motto Use
- module: ''
  criterion: 使用 label 或 pure motto 需與 amsterdam&partners 諮詢並取得 approval；廣告製作前需將設計寄至 `brand@iamsterdam.com`；排程應預留通常 3 個工作日回覆與可能修改時間。
  chapter: ch-10
  chapter_title: Contact
