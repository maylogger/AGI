rules_ai_checkable:
- module: ''
  criterion: AI-checkable criteria：logo bounding box aspect ratio 不得改變；logo rotation angle 應為 0；logo color values 必須來自本文件；logo
    element order 不得變更；不得使用 coloured background 放置 logo。
  chapter: ch-02
  chapter_title: Improper Usage
- module: ''
  criterion: AI-checkable criteria：文件第一次提及應為 `Central Bank of Bahrain`；第二次以後可用 `CBB`；不得出現 `Bahrain’s Central Bank`、`Central
    Bank`、`CB of Bahrain`、`CB` 作為品牌稱謂。
  chapter: ch-03
  chapter_title: Our Name
- module: ''
  criterion: AI-checkable criteria：digital color 應符合指定 HEX/RGB；print artwork 應使用指定 CMYK；不得使用文件外色彩替代 primary/secondary palette。
  chapter: ch-04
  chapter_title: Colours
- module: Typography System
  criterion: AI-checkable criteria：English main headings 使用 Zona Pro Bold；English subheadings/body 使用 Maven Pro family；Arabic
    headings/body 使用 Cairo；不得以未指定字體替代正式品牌排版。
  chapter: ch-05
  chapter_title: Typeface
- module: ''
  criterion: AI-checkable criteria：若使用情境未被本指南涵蓋，應向 External Communications Unit 確認；公開資料中的 contact email 應使用 `ecu@cbb.gov.bh`。
  chapter: ch-06
  chapter_title: Contact Us
