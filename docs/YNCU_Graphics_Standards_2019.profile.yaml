rules_ai_checkable:
- module: ''
  criterion: AI 可檢查：logo files 不得被任何方式改動；任何 stationery、business card、publication、newsletter、ad、website、flyer 或 sign 都應被視為品牌應用物。
  chapter: ch-01
  chapter_title: Introduction
- module: Visual Identity
  criterion: AI 可檢查：standard logo 寬度不得低於 1.125 inch；full version 寬度不得低於 2.625 inch；emblem 寬度不得低於 0.3 inch；logo 與 emblem 必須等比縮放，不得改變個別元件比例、尺寸或位置。
  chapter: ch-02
  chapter_title: YNCU Logo
- module: ''
  criterion: AI 可檢查：在綠色品牌色底應使用專用 green background 版本；灰底版本不得泛用於所有深色背景；全彩可行時優先使用 primary colour version。
  chapter: ch-03-01
  chapter_title: Primary and Secondary Colours
- module: Visual Identity
  criterion: AI 可檢查：Community First standard logo 寬度不得低於 1.6875 inch；emblem 不得低於 0.3 inch；logo 必須作為單一單位等比縮放；周圍不得有 artwork、type
    或 panel edges 侵入 clear space。
  chapter: ch-03
  chapter_title: Community First Logo
- module: ''
  criterion: AI 可檢查：任何文字、圖像、panel edge 不得落入指定 bounding area；clearance distance 應與 logo 尺寸同步縮放。
  chapter: ch-03-03
  chapter_title: Area of Isolation
- module: Brand Strategy
  criterion: 'AI 可檢查：green 應為 RGB 40/182/122、HEX #28B67A、CMYK 75/0/71/0；dark grey 應為 RGB 67/67/69、HEX #434345、CMYK 68/61/57/43；10%
    black 或更淺背景使用 full colour；30% black 背景使用 100% black；50% black 或更深背景使用 reverse；textured background 需人工確認 legibility。'
  chapter: ch-04
  chapter_title: Brand Specifications
- module: ''
  criterion: AI 可檢查：stacked 與 justified logo treatments 僅可用於 signage；Community First branch unique applications 不得在其他處重新建立；CityScape
    line 或文字不得改動；URL 可與 line graphic 一起使用。
  chapter: ch-04-03
  chapter_title: Signage and CityScape Graphic
- module: ''
  criterion: AI 可檢查：輸出物若使用 YNCU 或 CF logo，檔名應對應 directory 中列出的官方資產；不得使用拼錯或未列出的派生檔作為正式品牌檔。
  chapter: ch-05
  chapter_title: File Directory
