rules_ai_checkable:
- module: ''
  criterion: AI 可檢查文案是否顯示 curiosity、purposeful sharing、optimism，並避免過度封閉或純技術炫耀。
  chapter: ch-01-02
  chapter_title: Personality
- module: ''
  criterion: AI 可檢查產出是否使用 3M lockup/logo、3M Circular、one color set、3x3 grid、triangle/mesh/photography 中合適元素。
  chapter: ch-02
  chapter_title: Our New Visual Identity
- module: ''
  criterion: AI 可檢查設計是否至少選用必要核心元素，並避免一次使用所有元素造成過載。
  chapter: ch-02-01
  chapter_title: System Overview
- module: Visual Identity
  criterion: AI 可檢查 lockup 是否含 TM、tagline 是否未單獨出現、lockup minimum height 是否 >= 0.27 in / 7 mm / 19 px、logo minimum height 是否
    >= 0.2 in / 5 mm / 13 px、同一視窗是否只有一個 3M logo。
  chapter: ch-02-02
  chapter_title: Lockup and Logo
- module: Typography System
  criterion: AI 可檢查 headlines 是否 sentence case、leading 是否約 1:1.1、body leading 是否約 1:1.25、文字是否只使用黑或白、同一 viewing page 是否只用黑或白一種文字色。
  chapter: ch-02-04
  chapter_title: Typography
- module: ''
  criterion: AI 可檢查主要資訊是否對齊 3x3 grid，複雜內容是否使用 6x6 或 3 的倍數延展。
  chapter: ch-02-06
  chapter_title: Grids
- module: ''
  criterion: AI 可檢查高階溝通是否使用 grid、3M Circular、single triangle / three triangles / mesh 之一，並每份 document 只用一組 color set 或 greyscale。
  chapter: ch-03
  chapter_title: Putting It All Together
- module: ''
  criterion: AI 可檢查是否先有 grid 與 3M Circular，是否只選一個主要視覺策略，是否只用一組色彩。
  chapter: ch-03-01
  chapter_title: Simple System Options
- module: Layout System
  criterion: AI 可檢查標準格式 logo height 是否等於 margin；typography 是否盡量不超過三種尺寸；gutters 是否為 x、x/2 或 x/4。
  chapter: ch-03-02
  chapter_title: Grid-Based Layout Rules
- module: ''
  criterion: AI 可檢查 mesh 是否使用 approved format、是否最多放大 5-10% 作 bleed、是否未拉伸/壓縮/重建/套 stroke/多組漸層混用。
  chapter: ch-03-04
  chapter_title: Mesh Assets and Rules
- module: ''
  criterion: AI 可檢查檔名是否包含 asset type、format、color/color set、color space 與副檔名，例如 `3M_Lockup_CMYK_Pos.eps` 或 `3M_Mesh_Ltr_LtOrng_Orng_RGB.ai`。
  chapter: ch-03-06
  chapter_title: Filenaming and Source Files
- module: ''
  criterion: AI 可檢查特殊或未涵蓋情境是否標記需要向 brandcentral 或 id@mmm.com 詢問。
  chapter: ch-04
  chapter_title: Contact
- module: Color System
  criterion: 'AI 可檢查灰階是否使用 #000000、#595959、#A8A8A8、#D2D2D2、#FFFFFF 等核准值。'
  chapter: ch-05-03
  chapter_title: Greyscale Color Set
