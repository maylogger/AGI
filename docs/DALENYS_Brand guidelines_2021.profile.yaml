rules_ai_checkable:
- module: Brand Strategy
  criterion: AI 可檢查：必須使用 master logo artwork；logo 不得改比例、修改 monogram/logotype lockup、改 logotype 字體、拆開重上色、放在雙色背景上，或使用 By Natixis
    Payment endorsement。
  chapter: ch-03
  chapter_title: Brand elements
- module: Visual Identity
  criterion: AI 可檢查：使用 logo 時需確認 monogram 與 logotype 版本符合官方 artwork；不可自行重新繪製。
  chapter: ch-03-01
  chapter_title: Our logo
- module: Visual Identity
  criterion: AI 可檢查：logo 四周需至少保留以 logotype D 高度定義的 x 空間；照片背景上必須有足夠對比；小於建議尺寸時必須做 print/screen tests。
  chapter: ch-03-02
  chapter_title: Logo clearspace and minimum sizes
- module: Visual Identity
  criterion: AI 可檢查：不得 alter proportions、edit monogram/logotype lockup、change logotype typeface、separately recolour monogram、place
    logo over two colours、use By Natixis Payment endorsement。
  chapter: ch-03-03
  chapter_title: Logo restrictions
- module: ''
  criterion: AI 可檢查：yellow 應主導 applications；white/silver 可作背景；text navy 僅作文字；secondary colors 不得作 flood backgrounds，只用於 charts、illustrations、infographics。
  chapter: ch-03-04
  chapter_title: Colour palette
- module: ''
  criterion: AI 可檢查：遇到未定義或抽取不完整的規範時，不應自行推論，應升級至 communication contact。
  chapter: ch-04
  chapter_title: Get in touch
