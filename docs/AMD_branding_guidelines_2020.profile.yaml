rules_ai_checkable:
- module: ''
  criterion: 可檢查規則是文件必須列出核心資產項目，且每個項目應能對應到後續章節或資產庫。
  chapter: ch-01-01
  chapter_title: Overview of Toolkit
- module: Voice and Tone
  criterion: 可驗證規則包含避免 arrogant tone、文案需說明 benefit、不可只列產品功能、語氣應直接清楚。AI 可檢查文案是否包含客戶利益與未來意義。
  chapter: ch-01-02
  chapter_title: Tone of Voice
- module: Visual Identity
  criterion: 可量化規則包含最小寬度 0.675 inch、建議寬高 20%、最低 10%、標誌應置於右上角、不得使用綠色箭頭、不得改色、不得置於 busy photography。
  chapter: ch-01-03
  chapter_title: Logo
- module: ''
  criterion: 可量化規則包含 Logo centered、Logo 約 20% screen height、白色 Logo on black background、不得修改 Logo。
  chapter: ch-01-08
  chapter_title: Tagging Video Content
