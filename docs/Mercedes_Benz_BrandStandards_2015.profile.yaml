rules_ai_checkable:
- module: ''
  criterion: 任何 Tier 3 新車或服務行銷都應可追溯到 approved standards；法律、lease、APR 與 finance 訊息需由 dealer legal counsel 檢查；MBCCS consult
    approval 僅在指定期間內有效。
  chapter: ch-01
  chapter_title: Introduction and Legal Summary
- module: ''
  criterion: consult approval 有效期 60 天；Sales Operations monthly offers 只在該月有效；website review 需保留七日 turnaround；superlative
    claims 需由 dealer 提供佐證。
  chapter: ch-01-02
  chapter_title: Legal and Consultation
- module: ''
  criterion: 不得使用 discount、clearance、liquidation、blowout、overstocked、save $X off MSRP 等 distress language；新車價格必須以 MSRP 或 Monthly
    Sales Program Guide 為基準；未清楚標示 used/CPO 時視為 new vehicle。
  chapter: ch-02
  chapter_title: 'Section I: Category I Infractions'
- module: ''
  criterion: 文案不得含有 dealer cost、invoice、rebate、cash back、low prices 等價格削弱詞；superlative claims 必須可文件化；starting at price 若搭配非代表車款圖片需揭露。
  chapter: ch-02-01
  chapter_title: Language Usage
- module: Compliance
  criterion: Lease/APR 數字、期限與資格必須與當月指南一致；過期方案不可延用；必要 disclaimer 不可省略或放到不可讀位置。
  chapter: ch-02-02
  chapter_title: Monthly Sales Program Guide Compliance
- module: ''
  criterion: Fleet/USAA 溝通不可被一般消費者折扣化理解；AOI 問題應交由 Regional Marketing Manager；不得以跨區促銷掠奪其他經銷商市場。
  chapter: ch-02-03
  chapter_title: Fleet and AOI
- module: ''
  criterion: 素材不得暗示 Mercedes-Benz 是 economy、discount 或 distressed goods；服務行銷需維持 premium service expectation；媒體環境不得與品牌價值衝突。
  chapter: ch-02-04
  chapter_title: Strategy Compatibility and Service Marketing
- module: Brand Strategy
  criterion: Mercedes-Benz Star、word mark 與 claim 不得任意變形、重組或與其他品牌混淆；合作夥伴與 pre-owned 溝通需明確分離；版面應遵循指定 typography 與 Panorama
    結構。
  chapter: ch-03
  chapter_title: 'Section II: Category II Brand Standards'
- module: Brand Strategy
  criterion: 不得把 Star、word mark 或 claim 與非核准品牌鎖定；pre-owned 與新車訊息需清楚區分；不得讓合作夥伴視覺高於 Mercedes-Benz 品牌層級。
  chapter: ch-03-01
  chapter_title: Brand Separation and Marks
- module: Typography System
  criterion: 標題、副標與 disclaimer 應遵循指定層級；不得用擁擠折扣版面破壞 panorama 空間；版面需保留品牌標誌可讀性與資訊清楚度。
  chapter: ch-03-02
  chapter_title: Typography and Panorama Layout
- module: Typography System
  criterion: 合作素材不得暗示未授權 endorsement；corporate typeface 應用在指定品牌文字層級；partner mark 不應壓過 Mercedes-Benz mark。
  chapter: ch-03-03
  chapter_title: Co-Branding and Corporate Typeface
- module: ''
  criterion: 車型命名需符合 Mercedes-Benz nomenclature；未授權 art、photo、video 不可替代官方素材；dealer trade name 應遵循指定格式。
  chapter: ch-03-04
  chapter_title: Names, Nomenclature and Assets
- module: ''
  criterion: 含 airbag、radio、print offer 或 prepaid maintenance claims 的素材需使用對應 disclaimer；disclaimer 不得缺漏、過期或小到不可讀；金融與服務條款需與主張一致。
  chapter: ch-04
  chapter_title: Legal Disclaimer Language
