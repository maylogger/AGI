rules_ai_checkable:
- module: ''
  criterion: 可檢查規則包含 statement 寬度不得超過 logo、logo 必須置中、保護區不可放其他元素、dark blue/honey/white 為主色、輔助色只作節奏或 highlight。
  chapter: ch-02
  chapter_title: Fundamentals
- module: Visual Identity
  criterion: AI 可檢查保護區內無其他圖形，logo with tagline 最小 22 mm / 62 px，without tagline 最小 13 mm / 36 px，logo 是否置中且不左/右對齊。
  chapter: ch-02-04
  chapter_title: Logo Protection Area, Minimum Sizes and Positioning
- module: Color System
  criterion: 'AI 可檢查是否使用 #002b41、#e6a500、#ffffff 等品牌色；frost grey、nacarat red、tapenade green 是否只用於允許用途。'
  chapter: ch-02-07
  chapter_title: The Color Palette
- module: ''
  criterion: AI 可檢查文件是否使用指定尺寸、Pantone 7546 C + 7550 C、指定紙張、Gotham/Trebuchet/Georgia 字體與對應模板版本。
  chapter: ch-03
  chapter_title: Stationery & Office Applications
- module: ''
  criterion: AI 可檢查尺寸是否 90 x 55 mm、印刷是否 Pantone 7546 C + 7550 C、紙張是否 350g white card、第一行職稱是否可選語言且第二行英文。
  chapter: ch-03-02
  chapter_title: Business Cards
- module: ''
  criterion: AI 可檢查 A4 尺寸、紙張、Gotham 印刷模板與 Trebuchet 內文是否正確使用。
  chapter: ch-03-04
  chapter_title: Letterhead and Following Page
- module: ''
  criterion: AI 可檢查 PowerPoint 是否使用 4:3 或 16:9 核准模板、字體是否 Georgia/Trebuchet、separator 色彩是否來自 AccorHotels palette。
  chapter: ch-03-05
  chapter_title: Internal PowerPoint Presentation
- module: ''
  criterion: AI 可檢查 press release 是否 A4、使用 Trebuchet、可用 CMYK 或 PDF、敏感情境是否選 without Feel Welcome tagline。
  chapter: ch-03-06
  chapter_title: Press Releases
