rules_ai_checkable:
- module: ''
  criterion: 品牌語氣應 smart、clever、warm 且帶 edge；bridgeline 不是 tagline/headline，不能單獨使用；logo 不能修改；legal line 必須出現在含 logo 的行銷素材。
  chapter: ch-02
  chapter_title: 'Part 1: Our Story'
- module: Voice and Tone
  criterion: '`Another reason,` 必須 A 大寫、r 小寫，後方有逗號；它不得單獨出現；前置理由應簡短、聰明、美、有 New York-ness，且不能平庸或可套用到其他地方。'
  chapter: ch-02-02
  chapter_title: Manifesto, Campaign Concept, Voice and Bridgeline
- module: Typography System
  criterion: print ad 的 top copy 需左右對齊；第一句大於其餘 copy；bridgeline 必須出現；heart symbol 可取代 love；legal 必須包含；攝影至少 300 dpi、不可明顯過時、需是
    New York State、需可造訪。
  chapter: ch-02-03
  chapter_title: Typefaces, Advertising, Photography and Song
- module: Visual Identity
  criterion: logo 必須原樣使用，不得修改；stacked/horizontal logo 使用 ®；thematic/seasonal logos 使用 ™；clearspace 等於 heart icon 高度；不得重建、刪除、裁切、重組、非等比縮放、旋轉、放在忙亂照片上、改色、加效果或白框。
  chapter: ch-02-04
  chapter_title: Logo System and Legal Requirements
- module: ''
  criterion: 任何形式、任何地方使用 I LOVE NEW YORK logo 均需 I LOVE NEW YORK office 核准；不存在 blanket policy；TPA 應使用提供的 logo/lockup，不得自行重建。
  chapter: ch-03
  chapter_title: 'Part 2: Our Vision for TPAs'
- module: Visual Identity
  criterion: seasonal logos 可用於 approved seasonal advertising/projects；不可用於 Travel Guide covers；只能使用提供的 scalable art；只能用 black/red，不能黑白或其他色彩。
  chapter: ch-03-01
  chapter_title: Alignment, Permissions and Seasonal Logos
- module: ''
  criterion: 全頁、1/2、1/4 廣告 logo 不得小於 1 英吋寬；標準 web banner logo 不得小於 60px；若前置理由可輕易描述其他地方，應判定不合格。
  chapter: ch-03-02
  chapter_title: Bridgeline and Advertising
- module: ''
  criterion: Travel Guide cover 只能使用 supplied logo with Another reason lock-up；I LOVE NEW YORK logo 放右上；county/region logo
    或名稱放左側或左上；兩者之間不得出現圖形元素；website homepage 必須有連到 iloveny.com 的 logo hyperlink，preferred placement 為右上。
  chapter: ch-03-03
  chapter_title: Travel Guides, Collateral and Websites
- module: Brand Strategy
  criterion: radio spot 旁白需在結尾 call-to-action 前讀出 `Another reason` 再讀 `I LOVE NEW YORK`；TV spot 結尾需出現 supplied logo file with
    Another reason lock-up；TV logo 至少 230 x 100px 且不得超出 safe area；video logo 至少 480 x 295px。
  chapter: ch-03-04
  chapter_title: Radio, TV, Signage and Brand Creative
