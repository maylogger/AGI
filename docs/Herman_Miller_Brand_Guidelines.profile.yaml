patterns:
- name: join us
  chapter: ch-01
  chapter_title: Advocating for the Herman Miller Brand
- name: 用兩個性格詞濃縮品牌定位，再用承諾句擴寫。
  chapter: ch-02
  chapter_title: Brand Introduction
- name: 新符號先與名稱一起出現，逐步建立獨立識別。
  chapter: ch-03
  chapter_title: Logomark Evolution
- name: 將低創意、高頻率 touchpoint 模板化。
  chapter: ch-04
  chapter_title: Business Communications
- name: 不同媒介使用不同精細度的 mark file。
  chapter: ch-05
  chapter_title: The Visual Use of the Brand
- name: 大版面不必放大 logo；應讓空間提升品牌感。
  chapter: ch-05-01
  chapter_title: Space, Scale and Color
- name: 為 pixel/small/large sizes 準備不同 mark font file。
  chapter: ch-05-02
  chapter_title: Type, Media and Trademarks
- name: 長度依場景縮放，但承諾句意與人本焦點不變。
  chapter: ch-06
  chapter_title: The Written Use of the Brand
- name: 品牌名 + product/service/program + trademark + noun。
  chapter: ch-07
  chapter_title: Authorship of the Brand
- name: 每個範例標註使用了哪些 guideposts，讓評估可學習。
  chapter: ch-08
  chapter_title: Making Brand Decisions
- name: 讓使用者知道何時不自行判斷。
  chapter: ch-09
  chapter_title: Resources
- name: 以 Neumeier、Wheeler、Arden、Adamson 等品牌設計參考建立共同語言。
  chapter: ch-10
  chapter_title: Bibliography
rules_ai_checkable:
- module: Brand Strategy
  criterion: AI 可檢查：品牌素材應至少遵守 logomark 與 brand promise 兩類規範；不得把 guideline 視為只管 logo。
  chapter: ch-01
  chapter_title: Advocating for the Herman Miller Brand
- module: Brand Strategy
  criterion: AI 可檢查：品牌說明需同時反映 pioneer 與 advocate；不得只說 furniture company。
  chapter: ch-02
  chapter_title: Brand Introduction
- module: Visual Identity
  criterion: AI 可檢查：過渡期素材需以 logotype、web address 或文案第一次提及建立 Herman Miller authorship；不得讓 standalone mark 失去語境。
  chapter: ch-03
  chapter_title: Logomark Evolution
- module: ''
  criterion: AI 可檢查：標準商務通信應使用 Brand Marketing 提供模板；不得自行重建 letterhead 或 presentation structure。
  chapter: ch-04
  chapter_title: Business Communications
- module: Brand Strategy
  criterion: AI 可檢查：logomark clear space 至少為 mark size 的 50%；logotype clear space 至少為 capital H 高；商標名稱首次出現需加 trademark symbol
    且作 adjective modifying noun。
  chapter: ch-05
  chapter_title: The Visual Use of the Brand
- module: Color System
  criterion: AI 可檢查：logomark 至少指定最小直徑；白底上 stylized M 內部為白；深色/影像/複雜圖案上 stylized M 應為白以確保可見。
  chapter: ch-05-01
  chapter_title: Space, Scale and Color
- module: Typography System
  criterion: AI 可檢查：影像檔縮放不得超過實際需要尺寸上下 10%；Micro 用於 below 16pt，Normal 16-72pt，Display above 72pt；印刷品需包含 copyright line。
  chapter: ch-05-02
  chapter_title: Type, Media and Trademarks
- module: Brand Strategy
  criterion: AI 可檢查：不可把「for a better world around you」作 headline 或 tagline；phrase 必須保持完整；可與 work/create/make/design/build
    等 action verb 結合。
  chapter: ch-06
  chapter_title: The Written Use of the Brand
- module: Brand Strategy
  criterion: AI 可檢查：素材需至少能對應一個 guidepost；基本 ingredients 應包含 product name/trademark、copy message、logomark、image、CTA website、copyright
    protection；不得加 drop shadow、bevel、拉伸、錯色、outline、填入影像或混合 logomark/logotype。
  chapter: ch-08
  chapter_title: Making Brand Decisions
