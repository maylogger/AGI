rules_ai_checkable:
- module: ''
  criterion: 所有對外 mass production/dissemination 素材需在最早 proof stage 交由行銷支援人員審核；送審需盡可能提供全彩硬拷貝或 PDF；審核至少預留兩個工作天。
  chapter: ch-01
  chapter_title: Introduction
- module: Brand Strategy
  criterion: Boilerplate 應使用最新來源；首次提及 Independent Community Bankers of America 應保留 ®；不得改變 mission「create and promote an environment
    where community banks flourish」的核心語意。
  chapter: ch-02
  chapter_title: Our Brand
- module: Visual Identity
  criterion: 外部溝通必須出現 ICBA logo；完整 logo 不得小於 1.5 英吋或 110px；swoosh logo 不得小於 0.5 英吋或 35px；不得拉伸、壓縮、傾斜、旋轉、重新上色、加陰影或更改元素位置。
  chapter: ch-03
  chapter_title: Logo
- module: ''
  criterion: '`The Nation’s Voice for Community Banks®` 是主要 tagline；`One Mission. Community Banks.®` 用於 promotional materials
    並可供 state associations 使用；兩個 tagline 不應彼此接近；商標或註冊標記僅在文案首次提及加上。'
  chapter: ch-03-03
  chapter_title: Tagline and Trademarks
- module: Color System
  criterion: Primary palette 應用於所有 ICBA branding；secondary colors 只能作為 ICBA blue 旁的 accent；不得用 secondary color 取代 ICBA blue
    的主導地位。
  chapter: ch-04
  chapter_title: Color
- module: Iconography System
  criterion: 圖示需維持視覺上的 stroke weight；accent 只能使用 ICBA blue 加一個 Services Network Subsidiary color 或 ICBA light blue；縮放時不得改變線條視覺重量。
  chapter: ch-06
  chapter_title: Iconography
