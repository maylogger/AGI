patterns:
- name: 先界定適用對象與強制性，避免 guideline 被視為 optional inspiration。
  chapter: ch-01
  chapter_title: What You Will Learn
- name: 母品牌固定 + club signet 可差異
  chapter: ch-02
  chapter_title: Basics
- name: 將多語命名問題轉換為第一行必含 BMW Club/BMW Clubs/BMW [xyz] Club 的結構。
  chapter: ch-03
  chapter_title: Guideline
- name: 好看
  chapter: ch-04
  chapter_title: Visual World
- name: 在多種複製技術可選時，優先選擇最高品質而非最低成本或最大尺寸。
  chapter: ch-05
  chapter_title: Merchandising Articles
- name: 將實體 logo 規則延伸到圓形與矩形 avatar，明確定義 safe area。
  chapter: ch-06
  chapter_title: Digital Media
- name: 先用 design suggestions 引導，必要時再提供模板。
  chapter: ch-07
  chapter_title: Print Media
- name: 把可變郵政限制獨立成 `1a/2a` 類參數，而非硬編所有國家版本。
  chapter: ch-08
  chapter_title: Correspondence
- name: 把 stitching 視為新的有效邊界，而非使用物件外緣量測。
  chapter: ch-09
  chapter_title: Badges, Pins and Membership Card
- name: 在文件結尾放入治理者資訊，讓例外處理具備制度性。
  chapter: ch-10
  chapter_title: Contact & Support
rules_ai_checkable:
- module: ''
  criterion: 只有 official BMW Clubs 可使用本指南；文件規則 mandatory worldwide；club 必須可被辨識為 sender。
  chapter: ch-01
  chapter_title: What You Will Learn
- module: ''
  criterion: 2022-01-01 起只允許新 BMW Club logo；BMW symbol 只能在 club logo 內使用；不得改 form/color、不得當裝飾/功能元素、不得在正文替代 BMW 名稱；BMW 一律大寫。
  chapter: ch-02
  chapter_title: Basics
- module: ''
  criterion: logo signet 固定 10:4；signet 大小 5x × 2x；line thickness 0.05x；elements spacing 1/2x；clear space 至少 1.5 symbol diameters；fallback
    white box 四邊外擴 1/2x；paired logos 需 BCCM 個案許可；identifier 不用於 merchandise、give-aways、badges/pins、flags。
  chapter: ch-03
  chapter_title: Guideline
- module: ''
  criterion: domain 必須包含 `bmw-club` 或等價詞；空格以 dash 替代；不得用 subdomain/domain 組合或 subdirectory 替代；profile logo 與邊界至少 1/2x 或 1x；title
    image 不得 restless 且須與 logo 有足夠對比。
  chapter: ch-06
  chapter_title: Digital Media
- module: ''
  criterion: letterhead 右/下/上邊至少 3x；business card 邊界至少一個 BMW symbol diameter；名片尺寸 85 × 55 mm；字距 0；指定 Arial 字級與行距。
  chapter: ch-08
  chapter_title: Correspondence
- module: ''
  criterion: badge logo full picture 需至少 1/2x wraparound edge；visible stitching 時從縫線量測；有色背景使用 fallback logo；會員卡需清楚顯示 club
    name、member data 與 official identity。
  chapter: ch-09
  chapter_title: Badges, Pins and Membership Card
