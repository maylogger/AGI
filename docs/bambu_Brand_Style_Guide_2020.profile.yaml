rules_ai_checkable:
- module: ''
  criterion: 可檢查規則：產品 mark 必須次於主 logo；clear space/exclusion zone 不得被侵入；2-tone vector 通常用於黑白背景，其他背景使用 monochrome；不得加陰影、旋轉、重製或以圖形包圍
    logo；字體需使用 Gilroy/Lato 指定階層。
  chapter: ch-01
  chapter_title: Visuals Section
- module: Governance
  criterion: 可檢查規則：應用素材需使用核准 logo、色彩與字體；聯絡資訊格式需完整；行銷素材不可讓產品 logo 高於主品牌；需要提供品牌查詢信箱或網站。
  chapter: ch-03
  chapter_title: Applications and Governance
