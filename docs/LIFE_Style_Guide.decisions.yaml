# L3 決策卡 sidecar — LIFE（歷史影像典藏授權品牌）
# schema：research/schemas/decision_pattern.schema.yaml
# 由 note.md 反向工程萃取；strict evidence 連回本檔 index.yaml 章節。

brand_id: LIFE_Style_Guide
decisions:
  - id: dp-content-forward-flexible-identity
    title: 讓識別當承載內容的框架，並以可調品牌音量平衡影像與品牌
    problem:
      statement: 內容導向品牌（媒體、出版、頻道）若讓識別搶走影像注意力，會削弱真正的內容資產；但完全沒有品牌又失去辨識。
      signals: [content_forward_identity, brand_recognition_vs_content]
    solution:
      module: Visual Language
      move: 確立「影像主導、品牌清楚、資訊克制」原則，讓 logo/紅框服務影像敘事而非搶過照片
      layer: strategy
    reason:
      - 授權商品應服務故事，而非只複製紅框 logo
      - 包裝應像一本被縮小的 LIFE magazine：影像主導、品牌清楚、資訊克制
      - 文字不可 overpower photographs
    applicable_when:
      industries: [media_entertainment]
      brand_types: [category_creator, challenger]
      conditions: [content_forward_identity]
      archetypes: [brand_experience_guide, product_design_system, campaign_touchpoint]
    dependencies:
      requires: [Brand Strategy]
      enables: [Layout System]
    anti_patterns:
      - 影像優先情境仍讓文字或裝飾壓過照片
      - 把品牌只當紅色標籤而失去影像敘事
    evidence:
      - brand_id: LIFE_Style_Guide
        chapter: ch-01
        excerpt: "品牌價值來自真實性、文化記憶、影像敘事與編輯眼光；授權商品應服務故事，而非只複製紅框 logo。"
      - brand_id: LIFE_Style_Guide
        chapter: ch-04
        excerpt: "包裝應像一本被縮小的 LIFE magazine：影像主導、品牌清楚、資訊克制；文字不可 overpower photographs。"
    status: extracted

  - id: dp-platform-before-visual-rules
    title: 先定義企業策略與語氣，再建立視覺識別工具箱
    problem:
      statement: 大型技術企業若直接寫視覺規則，視覺系統會變成單純新風格，而非品牌平台的執行工具。
      signals: [no_strategic_foundation, style_over_system]
    solution:
      module: Brand Strategy
      move: 先以 Archive Equity → Brand Story 證明資產與品牌來源，再提供可授權的視覺轉譯規則
      layer: strategy
    reason:
      - 視覺規則需有可回推的語義來源
      - 影像型品牌 guideline 可先建立 archive narrative，再設計可授權的視覺模組
      - 用品牌歷史作為 guideline 開場，可降低後續規範看似任意的風險
    applicable_when:
      industries: [industrial_materials_science, tech_software]
      brand_types: [category_creator, heritage_legacy, challenger, mission_driven]
      conditions: [new_identity, strategy_refresh]
      archetypes: [full_brand_system, brand_experience_guide]
    dependencies:
      requires: []
      enables: [Visual Identity, Color System, Typography System]
    anti_patterns:
      - guideline 從空白直接列章節、先寫 Logo 規格
    evidence:
      - brand_id: LIFE_Style_Guide
        chapter: ch-01
        excerpt: "Archive Equity → Brand Story → Product Licensing：先證明資產，再提供轉譯規則；影像型品牌 guideline 可先建立 archive narrative，再設計可授權的視覺模組。"
    status: extracted

  - id: dp-clearspace-from-logo-geometry
    title: 用標誌自身幾何定義留白，讓 spacing 隨縮放成立
    problem:
      statement: 用固定像素定義 clear space，在不同尺寸與媒介會失效。
      signals: [scaling_inconsistency, multi_media]
    solution:
      module: Visual Identity
      move: 以標誌內部字母（I 的寬度）作為保護區單位，讓不同尺寸可重算
      layer: visual_core
    reason:
      - 版面一致性來自比例關係，不只是絕對尺寸
      - 用品牌字母局部作為測量單位，是常見且可複用的 clear-space pattern
      - 可變的是應用媒介，不可變的是 logo 形狀、比例、顏色與辨識位置
    applicable_when:
      industries: []
      brand_types: []
      conditions: [multi_media]
      archetypes: [brand_experience_guide, full_brand_system, logo_asset_guidelines]
    dependencies:
      requires: [Visual Identity]
      enables: []
    examples:
      - 以字母 I 的寬度作為 X，protected area 內不得有任何圖形元素
    evidence:
      - brand_id: LIFE_Style_Guide
        chapter: ch-02-01
        excerpt: "以字母 I 的寬度作為保護區單位，讓設計師可在不同尺寸中重算；protected area 內不得有任何圖形元素。"
    status: extracted
