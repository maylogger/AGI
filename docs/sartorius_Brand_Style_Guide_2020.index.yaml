title: "Sartorius Brand Style Guide"
source: "sources/sartorius_Brand_Style_Guide_2020.pdf"
version: "February 2020"
date: "2020-02"
language: "en"
summary: "Sartorius Brand Style Guide 將企業識別拆成 logo、signet、claim/layout、色彩、字體、影像、icon 與插畫系統，並以可量測比例、禁用範例與平台下載治理控制一致性。"
chapters:
  - id: "ch-01"
    title: "Logo"
    level: 1
    order: 1
    pages: "4-11"
    summary: "定義 Sartorius logo 的角色、clear space、最小尺寸、方向、黑白版本與禁用情境。"
    children:
      - id: "ch-01-01"
        title: "Clear Space, Size, Orientation and Variants"
        level: 2
        order: 1
        pages: "5-8"
        summary: "規定 logo 下載來源、S 高度 clear space、15 mm / 120 px 最小寬度、水平優先與黃色背景優先。"
      - id: "ch-01-02"
        title: "Logo Don’ts"
        level: 2
        order: 2
        pages: "10-11"
        summary: "列出舊 logo、效果、顏色、照片放置、裁切、lock-up 與忽略 clear space 等禁用方式。"
  - id: "ch-02"
    title: "Signet"
    level: 1
    order: 2
    pages: "12-16"
    summary: "將 signet 定義為空間不足時的例外識別，且需 Corporate Branding & Design 核准。"
    children:
      - id: "ch-02-01"
        title: "Signet Rules"
        level: 2
        order: 1
        pages: "13-15"
        summary: "規定 signet 僅於 full logo 不可用時使用，clear space 由 S 厚度決定，最小 2.7 mm / 14 px。"
      - id: "ch-02-02"
        title: "Signet Don’ts"
        level: 2
        order: 2
        pages: "16"
        summary: "禁止把 signet 當 pattern、改色、旋轉、加效果或與 logo 任意組合。"
  - id: "ch-03"
    title: "Claim & Layout System"
    level: 1
    order: 3
    pages: "17-38"
    summary: "以彈性分割網格、logo 尺寸、claim 黑色 tile 與應用版型建立品牌版面語法。"
    children:
      - id: "ch-03-01"
        title: "Grid and Logo Placement"
        level: 2
        order: 1
        pages: "18-21"
        summary: "以 1/4、1/3、1/2 與 full-format 分割建立格式彈性，並限制 logo 位置。"
      - id: "ch-03-02"
        title: "Claim Basics and Proportion"
        level: 2
        order: 2
        pages: "22-24"
        summary: "claim 必須為白字黑 tile，寬度由 logo 衍生，最小 30 mm / 180 px。"
      - id: "ch-03-03"
        title: "Applications and Don’ts"
        level: 2
        order: 3
        pages: "25-38"
        summary: "定義 backdrop、roll-up、side-by-side、without-claim 黑 tile 等應用與錯誤示例。"
  - id: "ch-04"
    title: "Colors"
    level: 1
    order: 4
    pages: "39-60"
    summary: "建立 yellow/black/white 主色、灰階、副色、teal highlight、tertiary colors 與 traffic-light 功能色。"
    children:
      - id: "ch-04-01"
        title: "Primary, Secondary and Highlight Colors"
        level: 2
        order: 1
        pages: "42-52"
        summary: "規定主色比例、媒介色值、灰階資料用途與 teal 作為必要亮色。"
      - id: "ch-04-02"
        title: "Tertiary and Traffic Light Colors"
        level: 2
        order: 2
        pages: "53-59"
        summary: "tertiary colors 僅用於複雜 graphics，traffic-light colors 僅用於狀態、警示與決策。"
      - id: "ch-04-03"
        title: "Color Don’ts"
        level: 2
        order: 3
        pages: "60"
        summary: "禁止錯誤黃、透明、漸層、把 tertiary 當版面 tile 或把 highlight 取代主色。"
  - id: "ch-05"
    title: "Typography"
    level: 1
    order: 5
    pages: "61-71"
    summary: "規範 TT Norms Pro、Noto Sans、Arial fallback、字重、字色、tracking、APA title case、quotation marks 與 bullet。"
    children:
      - id: "ch-05-01"
        title: "Typeface and Font Usage"
        level: 2
        order: 1
        pages: "62-66"
        summary: "建立品牌字體、授權、fallback 與字重角色。"
      - id: "ch-05-02"
        title: "Typesetting and Writing Rules"
        level: 2
        order: 2
        pages: "67-70"
        summary: "規定左對齊、default tracking、APA headline、URL、pipe、引號與方形 bullet。"
      - id: "ch-05-03"
        title: "Typography Don’ts"
        level: 2
        order: 3
        pages: "71"
        summary: "禁止黃色字、過寬 tracking、右對齊、過大行距、圓點 bullet 與 playful type。"
  - id: "ch-06"
    title: "Imagery"
    level: 1
    order: 6
    pages: "72-98"
    summary: "以產品、人物、建築與科學影像四類，將攝影從美感變成可審核的內容規則。"
    children:
      - id: "ch-06-01"
        title: "Products"
        level: 2
        order: 1
        pages: "73-84"
        summary: "產品以清楚、技術感、全焦、可比較為核心，依用途選擇 yellow/white/black 背景。"
      - id: "ch-06-02"
        title: "People"
        level: 2
        order: 2
        pages: "85-92"
        summary: "人物需專業、依場域穿著，產品互動不可喧賓奪主，portrait 與 workplace 各有焦點規則。"
      - id: "ch-06-03"
        title: "Architecture and Scientific"
        level: 2
        order: 3
        pages: "93-98"
        summary: "建築以乾淨直線與自然光呈現；科學影像不得 retouch，因顏色承載資訊。"
  - id: "ch-07"
    title: "Icons"
    level: 1
    order: 7
    pages: "99-107"
    summary: "以 16x16 grid、直邊、錨點、角度與 gap 系統建立可延展 icon library。"
    children:
      - id: "ch-07-01"
        title: "Icon Mechanics"
        level: 2
        order: 1
        pages: "100-105"
        summary: "icons 以 16x16 grid、可細分方格、直邊與 1/1.5/2 square gap 建構。"
      - id: "ch-07-02"
        title: "Icon Library and Don’ts"
        level: 2
        order: 2
        pages: "106-107"
        summary: "僅能使用 brand platform / DAM icon library，新增需求需向 Corporate Branding & Design 提出。"
  - id: "ch-08"
    title: "Illustration"
    level: 1
    order: 8
    pages: "108-134"
    summary: "建立黑灰主導、黃色 highlight、角色、場景、環境物件與等角技術圖的插畫系統。"
    children:
      - id: "ch-08-01"
        title: "Color and Rebrush"
        level: 2
        order: 1
        pages: "109-114"
        summary: "既有插畫需重刷為黑灰與黃色 highlight 階層，必要時才用 teal/tertiary。"
      - id: "ch-08-02"
        title: "Characters and Scenarios"
        level: 2
        order: 2
        pages: "115-128"
        summary: "角色以自然比例、臉部表情、膚色與簡化 secondary character 表現人際與流程。"
      - id: "ch-08-03"
        title: "Technical Illustrations"
        level: 2
        order: 3
        pages: "129-134"
        summary: "技術物件用 isometric grid、統一線寬與避免平面色塊確保一致。"
  - id: "ch-09"
    title: "Governance"
    level: 1
    order: 9
    pages: "135"
    summary: "提供 Brand Platform 與 branding contact，並限制內部與供應商使用。"
