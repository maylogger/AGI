# L3 決策卡 sidecar — BNP Paribas Brand Passport
# schema：research/schemas/decision_pattern.schema.yaml
# 由 note.md 反向工程萃取；strict evidence 連回本檔 index.yaml 章節。

brand_id: BNP_Brand_Pass_BD_2012
decisions:
  - id: dp-platform-before-visual-rules
    title: 先定義企業策略與語氣，再建立視覺識別工具箱
    problem:
      statement: 大型技術企業若直接寫視覺規則，視覺系統會變成單純新風格，而非品牌平台的執行工具。
      signals: [no_strategic_foundation, enterprise, style_over_system]
    solution:
      module: Brand Strategy
      move: 先建立 history → personality → brand dynamic 的語義層，再進入識別工具與媒介應用
      layer: strategy
    reason:
      - 視覺規則需有可回推的語義來源
      - 品牌 guideline 應先建立策略與人格層，否則視覺規範難以在新媒介中自行延展
    applicable_when:
      industries: [finance, industrial_materials_science, tech_software]
      brand_types: [institutional_public_trust, heritage_legacy]
      conditions: [new_identity, strategy_refresh]
      archetypes: [full_brand_system, brand_experience_guide]
    dependencies:
      requires: []
      enables: [Visual Identity, Voice and Tone, Messaging]
    anti_patterns:
      - 後續規則像樣式清單，無法說服各市場遵守
    evidence:
      - brand_id: BNP_Brand_Pass_BD_2012
        chapter: ch-01
        excerpt: "history → personality → brand dynamic 是所有識別工具與媒體應用的前置語義層，讓 emblem、signature、色彩、影像與文案都能回到同一套 personality 判斷。"
    status: extracted

  - id: dp-personality-words-as-evaluation-criteria
    title: 把人格詞做成創意評估準則
    problem:
      statement: 抽象企業價值無法指導產出，設計與文案缺乏共同判斷語彙。
      signals: [abstract_values, needs_evaluation_criteria, inconsistent_outputs]
    solution:
      module: Brand Strategy
      move: 把每個品牌人格特質用「是／不是」語句轉譯成創意篩選器
      layer: strategy
    reason:
      - 人格詞應能成為產出評估標準，而不是僅作品牌牆口號
      - 好的人格系統需要能排除錯誤風格，而不是只列出理想形容詞
    applicable_when:
      industries: [finance, industrial_materials_science, nonprofit_social]
      brand_types: [institutional_public_trust, challenger, mission_driven]
      conditions: [needs_evaluation_criteria]
      archetypes: [full_brand_system, brand_experience_guide]
    dependencies:
      requires: [Brand Strategy]
      enables: [Voice and Tone, Content Design]
    evidence:
      - brand_id: BNP_Brand_Pass_BD_2012
        chapter: ch-01-02
        excerpt: "Humain、Responsable、Innovant、Enthousiaste 各以『是／不是』語句轉譯，形成可訓練的 content rule set，文案不得只描述產品功能、應指出受眾利益或改變。"
    status: extracted

  - id: dp-logo-vs-lockup-distinction
    title: 區分 public-facing lockup 與 corporate logo 的使用場景
    problem:
      statement: 單一標誌資產被套用到所有情境，混淆對外溝通與企業署名，且難以同時治理法律與一致性。
      signals: [multiple_logo_contexts, trademark, legal_governance]
    solution:
      module: Visual Identity
      move: 用 lockup hierarchy 與 signature pairing 定義何時用單一標誌、何時用品牌區塊或完整 lockup
      layer: visual_core
    reason:
      - 標誌資產不可重建、不可任意改比例
      - 識別工具章應同時處理核心標誌與延伸語言，避免只保護 logo 而忽略實際接觸點
    applicable_when:
      industries: [finance, industrial_materials_science, tech_software]
      brand_types: [institutional_public_trust, heritage_legacy]
      conditions: [multiple_logo_contexts]
      archetypes: [brand_experience_guide, corporate_toolkit, multi_brand_architecture]
    dependencies:
      requires: [Visual Identity]
      enables: [Legal and Trademark, Governance]
    evidence:
      - brand_id: BNP_Brand_Pass_BD_2012
        chapter: ch-02-01
        excerpt: "把 emblem、signature、brand block 拆成可組合工具，定義何時使用單一標誌、何時使用品牌區塊或完整 lockup；標誌不得重繪、變色、變形或被非核准元素取代。"
    status: extracted

  - id: dp-contact-before-appendix
    title: 在技術資料前先給治理窗口，讓 guideline 成為可改善系統
    problem:
      statement: 規則無法涵蓋所有情境，缺乏權威決策入口時，例外用法無人裁決。
      signals: [exceptions_expected, governance]
    solution:
      module: Governance
      move: 用 self-check questions、escalation path 與品牌責任章把 guideline 變成可諮詢制度
      layer: governance
    reason:
      - 規則無法涵蓋所有情境，必須提供權威決策入口
      - 完整 guideline 不只告訴人怎麼做，也要告訴人遇到不確定時找誰、問什麼、如何判斷
    applicable_when:
      industries: [finance]
      brand_types: [institutional_public_trust]
      conditions: [exceptions_expected]
      archetypes: [brand_experience_guide, full_brand_system, corporate_toolkit]
    dependencies:
      requires: [Governance]
      enables: [Operations]
    evidence:
      - brand_id: BNP_Brand_Pass_BD_2012
        chapter: ch-04-01
        excerpt: "以 self-check questions、困難排查與 escalation path 收束規範：輸出前應通過問題清單，遇到例外情境仍能回到品牌治理邏輯。"
    status: extracted
