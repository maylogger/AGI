# L3 決策卡 sidecar — Musée Zadkine（巴黎市立博物館視覺識別）
# schema：research/schemas/decision_pattern.schema.yaml
# 由 note.md 反向工程萃取；strict evidence 連回本檔 index.yaml 章節。

brand_id: Musee_zadkine
decisions:
  - id: dp-clearspace-from-logo-geometry
    title: 用標誌自身幾何定義留白，讓 spacing 隨縮放成立
    problem:
      statement: 用固定像素定義 clear space，在不同尺寸與媒介會失效。
      signals: [scaling_inconsistency, multi_media]
    solution:
      module: Visual Identity
      move: 以標誌幾何（logo height）作為相對留白與尺寸基準
      layer: visual_core
    reason:
      - 版面一致性來自比例關係，不只是絕對尺寸
      - 留白以標誌自身元素為單位，可隨縮放維持比例
      - 可讀性可透過比例公式治理，而不是靠設計者目測
      - 相對單位可建立 scalable spacing token，不被固定像素綁死
    applicable_when:
      industries: []
      brand_types: []
      conditions: [multi_media]
      archetypes: [brand_experience_guide, full_brand_system, logo_asset_guidelines]
    dependencies:
      requires: [Visual Identity]
      enables: []
    examples:
      - logo 最小寬度 30 mm，四周 margin 為 logo 寬度的 1/20
    evidence:
      - brand_id: Musee_zadkine
        chapter: ch-01-02
        excerpt: "logo 最小寬度 30 mm、四周 margin 為 logo 寬度的 1/20，以 5 cm logo 對應 0.25 cm margin 的例子讓規則可算；可讀性可透過比例公式治理，而不是靠設計者目測。"
      - brand_id: Musee_zadkine
        chapter: ch-01-03
        excerpt: "多 logo 並置時左右間距至少為 logotype 初始 M 高度的 2 倍，用 x spacing 與基線對齊降低主觀排版判斷。"
    status: extracted

  - id: dp-monochrome-logo-by-contrast
    title: 用背景對比決定單色標誌，而非開放自由配色
    problem:
      statement: 開放彩色標誌會被任意彩色化，破壞辨識與一致性。
      signals: [logo_misuse_risk, photo_backgrounds]
    solution:
      module: Visual Identity
      move: 以背景明暗與照片複雜度建立對比決策樹，限定白／深色兩種標誌
      layer: visual_core
    reason:
      - 標誌辨識與對比優先；單色策略比多色變體更能保護一致性
      - Logo 顏色規範應基於對比與背景風險，而非只列色票
    applicable_when:
      industries: []
      brand_types: []
      conditions: []
      archetypes: [brand_experience_guide, full_brand_system, logo_asset_guidelines]
    dependencies:
      requires: [Visual Identity]
      enables: [Accessibility]
    evidence:
      - brand_id: Musee_zadkine
        chapter: ch-01-01
        excerpt: "黑版僅用於黑白或極端 reproduction 條件；白版用於彩色、深色、深色攝影或複雜背景；不得任意改 logo 色。"
    status: extracted

  - id: dp-modular-manual-for-public-units
    title: 用「可辨識但不獨立」的層級框架治理多機構／多單位品牌
    problem:
      statement: 大型多機構、多單位組織，各單位都想要自己的識別，若無分層治理，品牌會裂解成互相競爭、削弱母品牌的子品牌。
      signals: [multi_unit_consistency, multi_entity, sub_unit_identity, brand_architecture_complexity]
    solution:
      module: Brand Architecture
      move: 先建立「誰在說話」的判斷層，再以 umbrella → member → VPU/GP → lockup → special case 的層級把組織結構視覺化
      layer: governance
    reason:
      - 局部單位可以被識別，但不能競爭或替代母品牌
      - 文化機構 guideline 應把「總管理機構規則」寫在開頭，避免地方品牌與母體規範衝突
      - 母機構 charte 與子品牌 palette 可透過「字體遵母、色彩取子」方式共存
    applicable_when:
      industries: [public_sector, education]
      brand_types: [institutional_public_trust, platform_ecosystem]
      conditions: [multi_unit_consistency, multi_entity]
      archetypes: [multi_brand_architecture, brand_experience_guide]
    dependencies:
      requires: [Brand Strategy, Visual Identity]
      enables: [Governance]
    anti_patterns:
      - 各單位自行創造分支品牌與專屬 tagline
      - 只列 logo 圖檔卻不給「何時用母體規範、何時用單一機構」的判斷規則
    evidence:
      - brand_id: Musee_zadkine
        chapter: ch-01
        excerpt: "建立 Musée Zadkine 的基礎識別語言，同時明確指出所有延展需服從巴黎市政府的總體規則；文化機構 guideline 應把總管理機構規則寫在開頭，避免地方品牌與母體規範衝突。"
      - brand_id: Musee_zadkine
        chapter: ch-04-01
        excerpt: "參觀摺頁與宣傳摺頁需依巴黎市政府 charte 並使用 VistaSans；母機構 charte 與子品牌 palette 可透過字體遵母、色彩取子方式共存。"
    status: extracted

  - id: dp-cobranding-grid-governance
    title: 用 grid 與固定模距治理聯名 lockup
    problem:
      statement: 聯名情境若沒有空間規則，夥伴標誌的相對大小與距離會失控，混淆主從關係。
      signals: [cobranding, partner_governance, multi_brand]
    solution:
      module: Brand Architecture
      move: 以 grid、固定 module 距離與分隔線定義 master brand 與 partner brand 的 lockup
      layer: strategy
    reason:
      - 聯名需先界定空間與主從，才能維持品牌資產權重
      - 多標誌關係需要幾何秩序，否則公共機構版面容易失控
    applicable_when:
      industries: [finance, tech_software]
      brand_types: [platform_ecosystem, institutional_public_trust]
      conditions: [cobranding]
      archetypes: [multi_brand_architecture, brand_experience_guide]
    dependencies:
      requires: [Brand Architecture, Visual Identity]
      enables: [Governance]
    evidence:
      - brand_id: Musee_zadkine
        chapter: ch-01-03
        excerpt: "多 logo 必須水平排列、以字母基線對齊，左右距離至少為 logotype 初始 M 高度的 2 倍；co-editions logo 亦遵循同一 cohabitation spacing。"
    status: extracted
