rules_ai_checkable:
- module: Visual Identity
  criterion: AI 可檢查：Foundation logo 僅指涉 entity；Project logo 僅指涉 project；logo 不得拉伸、壓縮、加陰影/漸層/立體效果、改色、換字體或置於 busy texture/pattern。
  chapter: ch-01
  chapter_title: Logo
- module: Visual Identity
  criterion: AI 可檢查：提到 Mojaloop Foundation 使用 Foundation logo；提到 Mojaloop project/open-source software 使用 Project logo；不得用
    Project logo 替代 Foundation legal identity。
  chapter: ch-01-01
  chapter_title: Foundation and Project Logos
- module: ''
  criterion: AI 可檢查：logo 四周不可有元素進入 `m` 寬高範圍；螢幕顯示寬度不得小於 50 px；印刷寬度不得小於 20 mm。
  chapter: ch-01-02
  chapter_title: Clear Space and Minimum Size
- module: ''
  criterion: AI 可檢查：所有 logo 背景對比至少 5:1；背景不超過 10% black 時可用彩色版；背景深於 30% black 時使用白色版；淺色背景使用黑色版；不得放在 busy texture/pattern。
  chapter: ch-01-03
  chapter_title: Proper and Improper Use
- module: Typography System
  criterion: AI 可檢查：display 使用 Varela Round；body 使用 Open Sans；小於 10 pt 使用 Open Sans Regular/Italic/Bold；10 pt 以上使用 Light/Semibold
    variants；metric kerning；tracking 依章節設定維持 0 或 -10。
  chapter: ch-02
  chapter_title: Type
- module: Color System
  criterion: AI 可檢查：任何 Mojaloop branded material 應先引入 blue；black/gray 主要用於 typography；secondary colors 用於 charts/illustrations/presentations
    的 highlight/variation；不得從 digital files 或 screenshots 取樣色彩；應使用白/負空間。
  chapter: ch-03
  chapter_title: Color
- module: ''
  criterion: AI 可檢查：不得使用 stock/staged photos；不得使用黑白攝影；影像需有清楚 focal point；主體需代表 Mojaloop audience/users；人物應看起來 empowered and
    hopeful；避免 cluttered large anonymous groups。
  chapter: ch-04
  chapter_title: Photography
