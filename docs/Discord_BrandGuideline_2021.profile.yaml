rules_ai_checkable:
- module: Visual Identity
  criterion: 小尺寸低於 80px x 15px 使用 small logo；不可修改、扭曲或重畫 logo；partner logos 需以 1px white stroke 分隔；tagline 預設分成兩行。
  chapter: ch-02
  chapter_title: Logo, Symbol, Wordmark and Tagline
- module: ''
  criterion: 動畫與 masked composition 應置中組合 tagline + logo；extra-wide tagline 可單行；不可 stack logo elements 或使用非核准配色。
  chapter: ch-02-02
  chapter_title: Placement and Usage
- module: Color System
  criterion: Blurple HEX `5865F2`；避免 White+Yellow、Fuchsia+Red、Blurple+Fuchsia、Fuchsia+Green、Yellow+Green；animated communication
    不得混用多套色彩方案。
  chapter: ch-03
  chapter_title: Brand Colors
- module: Typography System
  criterion: headline 一律大寫；paragraph line-height 135%；段落每行約 50-75 字元；不可 warp text、混合句中字體樣式或在 static layout 使用 motion distortion。
  chapter: ch-04
  chapter_title: Typography
- module: Brand Strategy
  criterion: brand lines 應能承載 Imagine a Place；user quotes 應包含使用者標籤或 avatar 情境；chat dialog 應保持產品感且不可扭曲 UI 語義。
  chapter: ch-05
  chapter_title: Brand in Use
