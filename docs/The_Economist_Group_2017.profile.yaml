rules_ai_checkable:
- module: Brand Strategy
  criterion: AI 可檢查：品牌描述應包含 independent editorial stance、clear analysis、global affairs 或 naturally curious audience；不得把 The
    Economist 簡化為只談 economics。
  chapter: ch-01
  chapter_title: Our Brand
- module: Typography System
  criterion: AI 可檢查：body copy at or below 11pt 使用 Milo Serif Text；body copy 不得低於 7pt；headlines above 18pt primarily print
    使用 Milo Serif Medium；navigation/subscription copy 不得低於 7pt；leading 建議為 font size 120%；kerning set to metrics、tracking
    set to zero；web-safe fonts 為 Georgia 與 Helvetica。
  chapter: ch-02
  chapter_title: Typography
- module: Visual Identity
  criterion: AI 可檢查：只能使用 provided vector artwork；不得自製、拉伸、扭曲或改造 logo；print logo 不得低於 6mm；digital logo 不得低於 40px high；print
    clear space 為 logo height 1/2；digital clear space 為 logo height 1/4；紅底或相近低對比背景須使用 keyline version。
  chapter: ch-03
  chapter_title: Logos and Positioning
- module: Visual Identity
  criterion: AI 可檢查：print keyline：6mm 以上 0.5pt、12mm 以上 0.5pt、24mm 以上 0.75pt、48mm 以上 1pt；digital keyline：40px/80px 以上 1px、160px
    以上 2px；digital red 為 `#e3120b` / RGB 227 18 11。
  chapter: ch-03-01
  chapter_title: Core Logo Rules
- module: Visual Identity
  criterion: AI 可檢查：group logo clear space 與 core logo 一致；group logo print/digital 不得低於 6mm 或 40px；非 core brand business logos
    使用 group signatures；social avatars 與 app icons 需符合標示的 X 比例。
  chapter: ch-03-02
  chapter_title: Group, Editorial and Sub-Brand Logos
- module: ''
  criterion: AI 可檢查：digital Economist Red 必須為 `#E3120B`；digital Black 為 `#121212`；CTA active 為 `#3E51B5`；background 為 `#F2F2F2`；metadata
    為 `#B6B6B6`；core red 應 sparingly 使用，不應成為大面積裝飾色。
  chapter: ch-04
  chapter_title: Colour
- module: ''
  criterion: AI 可檢查：accent rule 高度參照 section heading cap height；stroke width 取自 `I`；長度為 `2 x I`；用途應限於 title/header focus、feature
    highlight 或 text-heavy rhythm punctuation。
  chapter: ch-05
  chapter_title: Signature Element
- module: ''
  criterion: AI 可檢查：插畫 brief 應要求 ideas-led contemporary style；不得改變、扭曲、增添或改造 supplied illustrations；reuse 或 permission 問題需聯絡指定負責人。
  chapter: ch-06
  chapter_title: Illustrative Style
- module: ''
  criterion: AI 可檢查：registration CTA height 30px、font Econ Sans、font-size 14px、padding 8px 30px、border-radius 4px；blue CTA
    background `#3e51b5` hover `#4c60eb`；red CTA background `#e3120b` hover `#fc150d`; grey CTA background `#d7d7d7` hover
    `#3d51b5`; editorial CTA height 34px、background white、border 2px solid `#d7d7d7`。
  chapter: ch-08
  chapter_title: User Interface Components
- module: ''
  criterion: AI 可檢查：e-newsletter internal content 使用 Georgia serif 與 Helvetica sans serif；不得依賴非 web-safe 字體作為唯一呈現。
  chapter: ch-09
  chapter_title: E-newsletters
