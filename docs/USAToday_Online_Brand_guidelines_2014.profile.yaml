rules_ai_checkable:
- module: ''
  criterion: AI 可檢查：品牌敘述需支援 reader utility；不得呈現偏見或議程；內容應簡潔、可視覺化且可行動。
  chapter: ch-01
  chapter_title: Introduction
- module: Brand Strategy
  criterion: AI 可檢查：不得建立未遵循本文件的 USA TODAY logo 或 brand identity；任何子品牌標誌必須可追溯到 master system。
  chapter: ch-02
  chapter_title: Brand Rules
- module: Visual Identity
  criterion: AI 可檢查：logo clearspace 至少等於 USA TODAY 中 U 的 cap height；master logo width 不小於 2.53 inches；Gannett endorsement
    不小於 0.8 inches 或 85 px；禁止 gradient、drop shadow、off-palette color、pattern background、overlap、retyping、improper scaling。
  chapter: ch-03
  chapter_title: The Logo
- module: Brand Strategy
  criterion: AI 可檢查：子品牌 logo 應含 trademark；小於 15mm high 時使用 small usage logos 且不含 TM；不得使用非系統色建立新 vertical。
  chapter: ch-04
  chapter_title: The Sub-brands
- module: Color System
  criterion: 'AI 可檢查：News #009BFF、Money #00A53C、Sports #EB1E00、Life #9600B4、Travel #00C3C3、Tech #FA5F00、Weather #FFCC00；不得以近似色取代
    core values。'
  chapter: ch-05
  chapter_title: Color
- module: ''
  criterion: AI 可檢查：同一 edition 或 communication 不應過度重複同一 behavior；若不需要行為，保留簡潔 logo 可能更有力。
  chapter: ch-07
  chapter_title: Master Behaviors
- module: Voice and Tone
  criterion: AI 可檢查：USA TODAY 永遠全大寫；不得使用 USAT；usatoday.com 句首不大寫；不得跨行斷開 USA TODAY/USA WEEKEND；sections 順序為 News, Money, Sports
    and Life；heading/subhead 預設 sentence case。
  chapter: ch-08
  chapter_title: Tone of Voice
