patterns:
- name: 先宣告 mission，再以 manifesto 建立情緒與社會角色，是媒體品牌常用的 legitimacy pattern。
  chapter: ch-01
  chapter_title: Introduction
- name: 在細節規範前加入一頁總治理原則，可減少例外濫用。
  chapter: ch-02
  chapter_title: Brand Rules
- name: 同一品牌標誌依媒體條件切換版本，但保留 clearspace 與禁用規則。
  chapter: ch-03
  chapter_title: The Logo
- name: 媒體品牌可用色彩建立內容 taxonomy。
  chapter: ch-04
  chapter_title: The Sub-brands
- name: 將 palette 直接綁定內容 taxonomy。
  chapter: ch-05
  chapter_title: Color
- name: 品牌可用 bespoke typeface 解決跨媒介 readability。
  chapter: ch-06
  chapter_title: Typography
- name: 以可變容器承載內容主題，是媒體與事件品牌可複用模式。
  chapter: ch-07
  chapter_title: Master Behaviors
- name: 價值對照與 copy style rules
  chapter: ch-08
