rules_ai_checkable:
- module: Visual Identity
  criterion: AI 可檢查準則：main version 應優先用於所有 communication；secondary version 僅尺寸限制導致 main version 不夠清楚時使用；symbol 僅小空間且 main/secondary
    不可用時使用；無法印紅色時才用黑白 Logo。
  chapter: ch-02
  chapter_title: Logotype
- module: ''
  criterion: AI 可檢查準則：credit cards 到大格式 communication 優先 main version；sponsorship 等尺寸受限可 secondary；app pictogram 或促銷小物等極小空間可
    symbol。
  chapter: ch-02-01
  chapter_title: Meaning and Versions
- module: ''
  criterion: AI 可檢查準則：main version 最小 25px/3mm；secondary 50px/5mm；symbol 16px/3mm；main/secondary 理想 clear space 為 flame width，最低為半個
    flame width；symbol security space 為 28x28 grid 中上左右 5 modules、下方 6 modules，最低上左右 3、下方 4。
  chapter: ch-02-02
  chapter_title: Clear Space and Minimum Size
- module: Brand Strategy
  criterion: AI 可檢查準則：兩 Logo 間距為 4 modules；中央加入 1pt line；break line 高度依所選 lockup version 高度變化。
  chapter: ch-02-03
  chapter_title: Cobranding
- module: Color System
  criterion: 'AI 可檢查準則：Red HEX #EC0000；White #FFFFFF；Sky #DEEDF2；Black #000000；建議色彩比例為 White 50%、Red 40%、Sky 5%、Black 5%。'
  chapter: ch-03
  chapter_title: Color Palette
