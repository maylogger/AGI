rules_ai_checkable:
- module: ''
  criterion: AI 可檢查：任何 Sterling rebrand 相關說明須提及 Rising Sun、敏捷/進步定位與一致性目的；不得只描述為 logo refresh。
  chapter: ch-01
  chapter_title: Introduction and New Identity
- module: ''
  criterion: AI 可檢查：只能使用 horizontal 或 stacked 兩種基本形式；有限色彩或低品質複製時只能用 black、white、light gray 單色版本；logo 不得拉伸、壓縮、反轉色、旋轉、使用漸層、加
    3D/陰影或錯放在紅底上；digital 不得低於 32px，print 不得低於 25mm。
  chapter: ch-02
  chapter_title: Visual Identity
- module: ''
  criterion: AI 可檢查：安全區內不得有圖像、文字或元素侵入；digital logo 寬高不得低於指定像素；A4 print ad 需至少 60mm x 32mm；不得 stretch、condense、reverse colours、rotate、use
    gradients、3D effects 或 shadows。
  chapter: ch-02-02
  chapter_title: Clear Space, Minimum Size and Incorrect Use
- module: Brand Strategy
  criterion: AI 可檢查：partner logo 必須置於指定 co-branding zone；其高度不得超出 Sterling wordmark 高度；vertical 空間時 partner logo 置於 Sterling
    logo 上方。
  chapter: ch-02-03
  chapter_title: Co-Branding
- module: Typography System
  criterion: AI 可檢查：Sterling Red 使用 Pantone 1795 M / C10 M100 Y100 K0 / R219 G53 B58；logo typeface 是 FF Cocon；advertising
    typeface 是 Museo Sans；email 字體是 Century Gothic，官方 font size 為 10。
  chapter: ch-03
  chapter_title: Colour and Typography
- module: ''
  criterion: AI 可檢查：照片不得過度擺拍；人物年齡與衣著需符合目標客群；背景需支撐職業或生活脈絡；至少在 retail/SME 使用紅色作為基底或 accent。
  chapter: ch-04-01
  chapter_title: Photography Directions
- module: ''
  criterion: AI 可檢查：簡報應簡單、彩色、彈性且維持一致 voice；email signature 應強化品牌訊息；卡片可用 Metro elements 區分類型；應用素材不得偏離前述 logo、色彩與字體規則。
  chapter: ch-05
  chapter_title: Applications
