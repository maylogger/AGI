rules_ai_checkable:
- module: ''
  criterion: 不得使用非官方 logo artwork；不得 alter、re-draw、re-create；corporate communications 必須帶 registered trademark symbol；所有 brandmark
    artwork 需送 Brand and Marketing team approval。
  chapter: ch-02
  chapter_title: Identity System
- module: Visual Identity
  criterion: 清除空間等於 eftpos wordmark x-height；整體 logo 不得小於 8mm / 23px 或 17mm / 48px 版本門檻；primary with tagline 25mm / 70px，small
    use 10mm / 28px；不得 stretch、skew、rotate、flip、drop shadow、3D effects 或低對比背景。
  chapter: ch-02-01
  chapter_title: Logo
- module: Typography System
  criterion: Waratah HEX `E50056`、Jacaranda `401463`、Eucalypt Flower `B0147D`、Midnight Purple `1F0038`；functional colours
    僅在 primary palette 不足時少量使用，外部溝通需 approval。
  chapter: ch-02-02
  chapter_title: Typography and Colour
- module: Brand Strategy
  criterion: eftpos logo 寬度至少等於其他 network logos；divider 與各 logo 間距為 2X；divider 延伸超過 logo edge 的高度為 X；所有 co-branding 需 approval。
  chapter: ch-02-04
  chapter_title: Co-branding
- module: ''
  criterion: Word / PowerPoint 應使用提供模板與預設字級；poster 與 OOH 若為 working draft 或 reference images，應標示不可作最終授權素材。
  chapter: ch-03
  chapter_title: Application Examples
- module: Brand Strategy
  criterion: 所有 card designs 與 eftpos brandmark / corporate logo 使用必須先 approval；contactless lockup 不得小於 21mm / 60px；front
    of card 的 eftpos logo 與 contactless mark 必須分離；reverse mono logo restricted 且需 permission。
  chapter: ch-04
  chapter_title: Card Branding and Contactless Requirements
- module: Compliance
  criterion: 會員必須經 Service Now Member Portal 提交 finished scale colour sample；未經書面同意不得公開文件；Contactless Mark 使用須包含 attribution
    並遵守 EMVCo guidelines。
  chapter: ch-04-01
  chapter_title: Compliance and Licensing
- module: ''
  criterion: eftpos only cards front 必須有 eftpos brandmark；debit / prepaid wordmark 不得與 logo 整合；multi-network cards 背面必須顯示
    eftpos logo 或 contactless lockup；terminal logos 必須 parity；acceptance decals 背景通常 white。
  chapter: ch-04-02
  chapter_title: Card and Device Rules
- module: Brand Strategy
  criterion: 所有 UI 需 eftpos branding approval；digital card art 不得顯示 cardholder name、PAN、BIN、expiry、EMV chip 或實體卡照片；Apple /
    Google / Samsung card art 需 RGB、1536 x 969 PNG 輸出、無邊框留白、不可含 CVV。
  chapter: ch-05
  chapter_title: Mobile and Online Brand Requirements
