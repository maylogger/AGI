patterns:
- name: logo asset decision tree 可供自動版面系統依尺寸、背景與媒介選擇版本。
  chapter: ch-01-01
  chapter_title: Brandmark Construction and Usage
- name: 可複用為 high-integrity brand 的 negative application checklist。
  chapter: ch-01-02
  chapter_title: Misuses and Prohibited Applications
- name: 把核心理念當作可插拔 copy asset，而非固定 slogan，可支援多語與合作溝通。
  chapter: ch-02
  chapter_title: Our Core Philosophy
- name: 對國家或機構品牌，主色通常承載法定 / 文化象徵，而非單純美感選擇。
  chapter: ch-03
  chapter_title: Colour
