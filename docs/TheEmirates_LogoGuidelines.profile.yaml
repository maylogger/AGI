  chapter: ch-08
  chapter_title: Contact Us
rules_ai_checkable:
- module: Brand Strategy
  criterion: 不可改變 lockup、間距、字標、symbol 形狀、旋轉與比例；primary / secondary logo 在 print 最小高度分別不得低於 14mm / 7mm，在 digital 不得低於 50px
    / 25px；不可放在會被踩踏、丟棄、污染、危險或有損品牌尊嚴的物件與場域。
  chapter: ch-01
  chapter_title: Brandmark Assets
- module: Brand Strategy
  criterion: 影像或影片上只能用單色白 / 黑 logo 並確保最高對比；full-colour logo 不得覆蓋影像或影片；symbol-only 僅限小尺寸、壓印、頭像等特定用途。
  chapter: ch-01-01
  chapter_title: Brandmark Construction and Usage
- module: ''
  criterion: 若物件會被丟棄、踩踏、污染、藏污、危害、與酒精或廁浴空間相鄰，應判定不可使用；事件若內容或表演者不可控且可能損害品牌價值，需拒絕或送審。
  chapter: ch-01-02
  chapter_title: Misuses and Prohibited Applications
- module: ''
  criterion: lockup 時 core philosophy 必須在 logo 右側且以分隔線隔開；不可放在上、下、左；背書他牌時不可使用 core philosophy；merchandise 上不可緊鄰或置於 logo 下方，需
    Brand Office 核准。
  chapter: ch-02
  chapter_title: Our Core Philosophy
- module: ''
  criterion: 印刷與螢幕輸出不可只依表列 CMYK/RGB 值直接定稿；需測試以匹配 Pantone shade。
  chapter: ch-03
  chapter_title: Colour
- module: ''
  criterion: 使用 core philosophy 的 email signature 必須遵循 Section 2.02；co-branded email signature 中 Emirates Brand 或帶 core philosophy
    的 lockup 應在共同品牌序列最後。
  chapter: ch-05
  chapter_title: Digital
- module: ''
  criterion: 紙、木、銀金屬、金金屬應使用無色 blind emboss/deboss；紡織可用 full-colour embroidery 或 silk screen；皮革不得加色，只允許 blind deboss。
  chapter: ch-06
  chapter_title: Materials
- module: Brand Strategy
  criterion: co-branding 可選擇是否加入 core philosophy，但若加入需依 Section 2.02；Emirates Brand 應在 co-brand 序列最後；endorsement 不得使用 core
    philosophy，且 Emirates Brand 必須低於或晚於被背書品牌。
  chapter: ch-07
  chapter_title: Co-branding and Endorsement
