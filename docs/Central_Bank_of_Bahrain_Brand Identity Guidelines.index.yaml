title: 'Central Bank of Bahrain Brand Identity Guidelines'
source: 'sources/Central_Bank_of_Bahrain_Brand Identity Guidelines.pdf'
language: 'en'
summary: 'Central Bank of Bahrain 的精簡品牌識別指南，規範 primary logos、improper usage、名稱使用、色彩、英文與阿拉伯文字體，以及聯絡窗口。'
chapters:
  - id: 'ch-01'
    title: 'Primary Logos'
    level: 1
    order: 1
    pages: '1-3'
    summary: '定義 light background 上的 primary logo、dark background 上的 white reverse logo，以及 black-only logo。'
  - id: 'ch-02'
    title: 'Improper Usage'
    level: 1
    order: 2
    pages: '4'
    summary: '禁止拉伸、壓縮、改色、傾斜、重排元素、對個別元素加色或放在彩色背景。'
  - id: 'ch-03'
    title: 'Our Name'
    level: 1
    order: 3
    pages: '5'
    summary: '規範首次使用 Central Bank of Bahrain，後續使用 CBB，並禁止 Bahrain’s Central Bank、Central Bank、CB of Bahrain、CB。'
  - id: 'ch-04'
    title: 'Colours'
    level: 1
    order: 4
    pages: '6'
    summary: '列出 primary palettes 與 secondary palettes 的 HEX、RGB、CMYK 色彩值。'
  - id: 'ch-05'
    title: 'Typeface'
    level: 1
    order: 5
    pages: '7-8'
    summary: '定義 Zona Pro 用於 English main headings，Maven Pro 用於 English subheadings/body，Cairo 用於 Arabic headings/body。'
  - id: 'ch-06'
    title: 'Contact Us'
    level: 1
    order: 6
    pages: '9'
    summary: '提供 External Communications Unit、email 與網站作為 identity 問題聯絡窗口。'
