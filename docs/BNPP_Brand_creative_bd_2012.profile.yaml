rules_ai_checkable:
- module: Iconography System
  criterion: AI-checkable：優先使用彩色照片；避免插畫、photomontage、黑白照；retouch 僅可微調光線或場景，不得更換背景、拼貼或新增人物。
  chapter: ch-01
  chapter_title: Iconographie
- module: Iconography System
  criterion: AI-checkable：照片不得看起來明顯棚拍或過度擺拍；人物或人類痕跡需可辨識；畫面應允許正向詮釋而非只描述產品。
  chapter: ch-01-02
  chapter_title: Les principes de notre iconographie
- module: ''
  criterion: AI-checkable：核心品牌綠需在主要品牌接觸點中可見；輔助色不得單獨取代品牌色；同一版面應維持核准色票與合理對比。
  chapter: ch-02
  chapter_title: Couleurs
- module: ''
  criterion: AI-checkable：輸出需使用核准字體；標題、內文與輔助資訊需有可辨識層級；不得混用未授權字體造成系統斷裂。
  chapter: ch-03
  chapter_title: Typographies
- module: ''
  criterion: AI-checkable：文案應避免金融術語堆疊；每段主要訊息應包含受眾利益；語氣不得自誇、冷漠或含糊。
  chapter: ch-04
  chapter_title: Style éditorial
