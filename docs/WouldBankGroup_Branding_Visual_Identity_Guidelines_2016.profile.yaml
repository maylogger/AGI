rules_ai_checkable:
- module: ''
  criterion: AI 可檢查：一般外部 flagship publication 應用 WBG corporate logo，而非 GP sublogo；IFC visibility lockup 只可用於列明的 advisory product
    場景；Treasury 變體不可由其他單位複製。
  chapter: ch-03-03
  chapter_title: Integrated Entities and Special Cases
- module: ''
  criterion: AI 可檢查：若 program 無 distinct presence apart from WBG，應判為 Category 2；若外部產品有 own logo，需搭配「An Innovation of」或類似 unifier；unifier
    文字不可任意改成暗示錯誤權責的 wording。
  chapter: ch-04-01
  chapter_title: Category System and Unifiers
- module: Visual Identity
  criterion: AI 可檢查：cosponsor logo 若存在，應依 contract 或置於 back cover 指定區域；contributors 最佳作法是前言/致謝文字，不是封面 logo；narrow spine less
    than 3/8 inch 可用 typeset World Bank Group 取代 globe。
  chapter: ch-06-01
  chapter_title: Logo Placement
