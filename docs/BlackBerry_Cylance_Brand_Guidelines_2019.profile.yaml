rules_ai_checkable:
- module: Brand Strategy
  criterion: logo 必須含 ®；不得改色、加 glow/drop shadow/tagline、旋轉/skew、移除 emblem；gradients 只能用 45°、60° 或 -60°，不得 straight up/down；icon
    可用 80-400px；partner logo 建議 1:1 等大並維持 0.5 in/72 px spacing。
  chapter: ch-03
  chapter_title: Visual Brand
- module: Color System
  criterion: Cylance Green 為 `#2EEF37`；primary colors 應為設計 foundation；secondary palette 應 sparingly 使用。
  chapter: ch-03-01
  chapter_title: Color and Typography
- module: Visual Identity
  criterion: Product names 使用 Neogrey Medium 30pt tracking 500pt；Tier 03 使用 24pt tracking 200pt；產品 logo 應含 trademark 或依 tier
    指示不含；stacked logo 主要用於 1:1 小方形。
  chapter: ch-03-02
  chapter_title: Logo and Brand Hierarchy
- module: Iconography System
  criterion: Smart Antivirus 不得使用 enterprise backgrounds/imagery；icons 應來自 updated set；影像需符合 refresh direction。
  chapter: ch-03-03
  chapter_title: Photography, Smart Antivirus and Iconography
- module: Brand Strategy
  criterion: 任何 digital properties 使用 powered-by logo 前需 approval；不得用 dividing line 暗示錯誤關係；不得在 off-brand background 上 pairing。
  chapter: ch-03-04
  chapter_title: Co-branding
- module: Brand Strategy
  criterion: 使用 Oxford comma；不可用 `&` 或 `+` 替代 and；電話格式 `+1-XXX-XXX-XXXX`；第三人稱為預設；BlackBerry Cylance 指公司，CylancePROTECT/CylanceOPTICS
    指產品；不要公開引用 VirusTotal。
  chapter: ch-04
  chapter_title: Brand Messaging Guidelines
- module: Brand Strategy
  criterion: 交付前需檢查 trademark、company/product name distinction、cybersecurity 詞形、Oxford comma、AI/ML 重複、logo registered mark、updated
    assets。
  chapter: ch-05
  chapter_title: Brand Checklist
