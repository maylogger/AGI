# L3 決策卡 sidecar — São Paulo Brandbook
# schema：research/schemas/decision_pattern.schema.yaml
# 由 note.md 反向工程萃取；strict evidence 連回本檔 index.yaml 章節。

brand_id: SAO_PAULO_BRANDBOOK_2011
decisions:
  - id: dp-clearspace-from-logo-geometry
    title: 用標誌自身幾何定義留白，讓 spacing 隨縮放成立
    problem:
      statement: 用固定像素定義 clear space，在不同尺寸與媒介會失效。
      signals: [scaling_inconsistency, multi_media]
    solution:
      module: Visual Identity
      move: 以 letter P 高度作為 non-interference area 與 tagline 對齊距離的量尺，並訂最小一般印刷尺寸 10mm
      layer: visual_core
    reason:
      - 版面一致性來自比例關係，不只是絕對尺寸
      - 留白以標誌自身元素為單位，可隨縮放維持比例
    applicable_when:
      industries: []
      brand_types: []
      conditions: [multi_media]
      archetypes: [brand_experience_guide, full_brand_system, logo_asset_guidelines]
    dependencies:
      requires: [Visual Identity]
      enables: []
    evidence:
      - brand_id: SAO_PAULO_BRANDBOOK_2011
        chapter: ch-04-01
        excerpt: "non-interference area 至少等於 letter P 高度；tagline 與 São Paulo words 對齊、距離至少為 P 高度一半；最小一般印刷尺寸 10mm。"
    status: extracted

  - id: dp-system-toolkit-over-template
    title: 企業視覺系統給「可組合工具箱」而非僵硬模板
    problem:
      statement: 要求每個版面長得完全相同會扼殺多元內容；但完全自由又會失去一致性。
      signals: [many_teams, many_agencies, diverse_content, system_consistency, mass_touchpoints]
    solution:
      module: Visual Language
      move: 把識別定義為 Logo/colors/typography/secondary graphics/photography/pattern 六個可組合元素，每個應用可用一個或多個，但元素須來自 electronic originals
      layer: visual_core
    reason:
      - 彈性必須被結構化；城市品牌的可變性必須來自預先定義的元件，而不是任意自由設計
      - 元素可獨立使用也可組合，支援多元內容又維持辨識
      - 彈性識別系統需要「可變範圍」與「不可變限制」同時明確
    applicable_when:
      industries: [industrial_materials_science, tech_software, consumer_retail_hospitality, public_sector]
      brand_types: [mass_consumer, category_creator, institutional_public_trust]
      conditions: []
      archetypes: [full_brand_system, corporate_toolkit, brand_experience_guide]
    dependencies:
      requires: [Visual Identity]
      enables: [Layout System, Examples]
    anti_patterns:
      - 一次使用所有元素造成過載
      - 只提供單一固定版型，使用者只會複製貼上
    evidence:
      - brand_id: SAO_PAULO_BRANDBOOK_2011
        chapter: ch-04
        excerpt: "six-element visual system + controlled variation；應用可使用一個或多個六大視覺元素，但元素需來自本書與 electronic originals，不得任意改變透視、顏色、字體比例或清楚度。"
    status: extracted

  - id: dp-cobranding-grid-governance
    title: 用 grid 與固定模距治理聯名 lockup
    problem:
      statement: 聯名情境若沒有空間規則，夥伴標誌的相對大小與距離會失控，混淆主從關係。
      signals: [cobranding, partner_governance, multi_brand]
    solution:
      module: Brand Architecture
      move: 以 association type → order → separator → max height 規範並列：政府品牌簽名需分隔線，其他品牌最大高度 3P，活動品牌最大高度等於 São Paulo brand height
      layer: strategy
    reason:
      - 聯名需先界定空間與主從，才能維持品牌資產權重
      - co-branding rule 應給出方向、順序、分隔與最大高度四類資料
    applicable_when:
      industries: [finance, tech_software, public_sector]
      brand_types: [platform_ecosystem, institutional_public_trust]
      conditions: [cobranding]
      archetypes: [multi_brand_architecture, brand_experience_guide]
    dependencies:
      requires: [Brand Architecture, Visual Identity]
      enables: [Governance]
    evidence:
      - brand_id: SAO_PAULO_BRANDBOOK_2011
        chapter: ch-05-02
        excerpt: "association type → order → separator → max height；政府品牌 signature 間必須有 line，其他品牌最大高度 3P，event brand 最大高度等於 São Paulo brand height（以 module P / logo height 管理）。"
    status: extracted

  - id: dp-trademark-permission-flow
    title: 用授權閘門治理第三方商標使用，先處理混淆與背書風險
    problem:
      statement: 平台品牌被大量第三方使用商標與資產，若無授權流程，會造成商標混淆與誤導性背書風險。
      signals: [trademark_protection, partner_governance, endorsement_risk, third_party_usage]
    solution:
      module: Legal and Trademark
      move: 以「核准來源 + 允許情境 + 禁止改作 + permission gate」治理，使用或散布品牌前須向 São Paulo Turismo 取得 authorization，並使用官方 electronic originals
      layer: governance
    reason:
      - 公共城市品牌應明確處理「誰可使用」與「為何仍需嚴格」的張力
      - permission section 將品牌治理流程化，降低設計師自行判斷法律風險
      - 公共品牌開放不等於素材著作權開放
    applicable_when:
      industries: [tech_software, public_sector]
      brand_types: [platform_ecosystem, institutional_public_trust]
      conditions: [third_party_usage, partner_governance]
      archetypes: [multi_brand_architecture, brand_experience_guide]
    dependencies:
      requires: [Legal and Trademark]
      enables: [Governance]
    anti_patterns:
      - 放任第三方自行判斷法律與背書風險
    evidence:
      - brand_id: SAO_PAULO_BRANDBOOK_2011
        chapter: ch-05
        excerpt: "使用 São Paulo brand 前需寄信至 marcasp@spturis.com 取得 authorization；第三方需事先授權，並依情境調整 foreground/background 權重。"
      - brand_id: SAO_PAULO_BRANDBOOK_2011
        chapter: ch-08
        excerpt: "guidebook images 僅供 illustration purposes；不得未經 Strategic Actions and Communication Department 事先明確授權而重製。"
    status: extracted
