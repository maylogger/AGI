title: "BigCommerce Brand Guidelines"
source: "sources/BC_BrandGuidelines_2020.pdf"
version: "Q2 2020"
date: "2020"
language: "en"
summary: "BigCommerce 品牌指南以 Build, Innovate, Grow 訊息框架為核心，規範 logo、色彩、字體、幾何圖形、攝影、圖示、資料視覺化、數位、影片、簡報與品牌延伸。"
chapters:
  - id: "ch-01"
    title: "Our Brand and Messaging Framework"
    level: 1
    order: 1
    pages: "1-4"
    summary: "介紹 2020 更新與 Build, Innovate, Grow 訊息框架。"
    children:
      - id: "ch-01-01"
        title: "2020 Updates"
        level: 2
        order: 1
        pages: "2"
        summary: "列出 imagery、video、slides、partners、essentials 等更新。"
      - id: "ch-01-02"
        title: "Build, Innovate, Grow"
        level: 2
        order: 2
        pages: "3"
        summary: "用三個利益層級組織品牌使命、功能、受眾與內容。"
  - id: "ch-02"
    title: "Our Logo"
    level: 1
    order: 2
    pages: "5-11"
    summary: "定義 BigCommerce 三角成長語意、primary logo、B mark、clearspace、minimum size、improper use 與 partner lockups。"
    children:
      - id: "ch-02-01"
        title: "Concept and Primary Logo"
        level: 2
        order: 1
        pages: "6-7"
        summary: "logo 的 up-and-to-the-right movement 象徵 growth/scalability。"
      - id: "ch-02-02"
        title: "Secondary Mark and Best Practices"
        level: 2
        order: 2
        pages: "8-10"
        summary: "B mark 在小尺寸或避免重複時使用，並定義 Y/2 clearspace、80px/1in 等尺寸。"
      - id: "ch-02-03"
        title: "Branded Partner Lockups"
        level: 2
        order: 3
        pages: "11"
        summary: "定義 partnership lockup 與 1.5px divider stroke。"
  - id: "ch-03"
    title: "Color Palette"
    level: 1
    order: 3
    pages: "12-17"
    summary: "以 BC Black、True White、BC Blue 為基礎，搭配 purple、green、pink、grayscale 與 gradients。"
    children:
      - id: "ch-03-01"
        title: "Overview and Palette"
        level: 2
        order: 1
        pages: "13-15"
        summary: "強調 blue heritage、contrast、accessibility、extensibility。"
      - id: "ch-03-02"
        title: "Swatches and Gradients"
        level: 2
        order: 2
        pages: "15-17"
        summary: "提供 HEX/RGB/CMYK/PMS 與核心漸層。"
  - id: "ch-04"
    title: "Typography"
    level: 1
    order: 4
    pages: "18-22"
    summary: "定義 Gotham 與 Source Sans Pro 的角色、字體階層、H1 highlight 與比例。"
    children:
      - id: "ch-04-01"
        title: "Typography Palette"
        level: 2
        order: 1
        pages: "20"
        summary: "Gotham 為品牌字體，Source Sans Pro 僅於 Gotham 不可用時使用。"
      - id: "ch-04-02"
        title: "Hierarchy"
        level: 2
        order: 2
        pages: "21-22"
        summary: "定義 H1-H6、body 與 highlight positioning。"
  - id: "ch-05"
    title: "Geometry and Patterns"
    level: 1
    order: 5
    pages: "23-29"
    summary: "以 90° triangle 延伸 sacred geometry、shape palette、stroked/bold pattern 與 legibility 限制。"
    children:
      - id: "ch-05-01"
        title: "Shape Palette"
        level: 2
        order: 1
        pages: "25"
        summary: "以基本幾何形作為可擴展 visual language。"
      - id: "ch-05-02"
        title: "Pattern Use"
        level: 2
        order: 2
        pages: "26-29"
        summary: "定義 stroked pattern、bold pattern、15px/115px 尺寸限制與文字疊加注意事項。"
  - id: "ch-06"
    title: "Photography"
    level: 1
    order: 6
    pages: "30-35"
    summary: "以 people、merchants、customers、products 建立人本且能展示商務成長的攝影方向。"
    children:
      - id: "ch-06-01"
        title: "Our People"
        level: 2
        order: 1
        pages: "32-33"
        summary: "環境照與人像強調團隊與差異化。"
      - id: "ch-06-02"
        title: "Merchants and Customers"
        level: 2
        order: 2
        pages: "34-35"
        summary: "以商家故事、顧客互動與產品使用展示平台價值。"
  - id: "ch-07"
    title: "Iconography and Data Visualization"
    level: 1
    order: 7
    pages: "36-50"
    summary: "定義 website/marketing、in-product、help center、developer center icons，以及資料視覺化規則。"
    children:
      - id: "ch-07-01"
        title: "Iconography"
        level: 2
        order: 1
        pages: "36-44"
        summary: "依網站、產品、Help Center、Developer Center 等場景分流圖示。"
      - id: "ch-07-02"
        title: "Data Visualization"
        level: 2
        order: 2
        pages: "45-50"
        summary: "規範資料圖表如何使用品牌色、清晰度與資訊層級。"
  - id: "ch-08"
    title: "Digital, Media, and Brand Extensions"
    level: 1
    order: 8
    pages: "51-127"
    summary: "整合 imagery、website/digital、video、slides、partner program、essentials、brand extensions 與 internal brands。"
    children:
      - id: "ch-08-01"
        title: "Imagery and Website/Digital"
        level: 2
        order: 1
        pages: "51-70"
        summary: "規範 isometric imagery、網站與數位素材。"
      - id: "ch-08-02"
        title: "Video and Slides"
        level: 2
        order: 2
        pages: "71-91"
        summary: "補充 camera、framing、animation 與簡報模板。"
      - id: "ch-08-03"
        title: "Partner Program and Extensions"
        level: 2
        order: 3
        pages: "92-127"
        summary: "規範 partner ecosystem、BigCommerce Essentials、brand extensions 與 internal brands。"
