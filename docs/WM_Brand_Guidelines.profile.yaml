  chapter: ch-01
  chapter_title: WarnerMedia Lockup Usage
- name: 把 downloadable assets 的命名與技術限制放進 guideline，降低錯拿檔案風險。
  chapter: ch-02
  chapter_title: Logo Variations and Technical Specifications
