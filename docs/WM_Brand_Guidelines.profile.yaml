  chapter: ch-04
  chapter_title: Color Palette and Usage
- name: 同時規範 type system 與品牌名 spelling/casing。
  chapter: ch-05
  chapter_title: Brand Typography and Lettering
- name: 以固定 token 順序編碼 logo metadata。
  chapter: ch-06
