  chapter_title: A WarnerMedia Company Branded Divisional Tagline
rules_ai_checkable:
- module: ''
  criterion: AI 可檢查：lockup 不得被 altered、adjusted、modified；空間允許時優先 horizontal 1-line；只可在核准版本中選擇，不得自建 lockup。
  chapter: ch-01
  chapter_title: WarnerMedia Lockup Usage
- module: Visual Identity
  criterion: AI 可檢查：1-line lockup print height > 0.075 inch，onscreen > 9px；2-line alternate print height > 0.1556 inch，onscreen
    > 20px；clear space 至少等於 Warner cap height；正片使用 Black/Grey，反白使用 White/Grey。
  chapter: ch-02
  chapter_title: Logo Variations and Technical Specifications
- module: Visual Identity
  criterion: AI 可檢查：不得改變 logo color、typeface、word spacing、element size relationship；不得創建新 lockup；白/淺背景用 positive version，深背景用
    reverse version；不得放在讓 identity 難以閱讀的顏色、圖案或照片上；one-color 需 multi-color unavailable 或 written consent。
  chapter: ch-03
  chapter_title: Logo Misuse and Background Control
- module: Color System
  criterion: 'AI 可檢查：Black #000000、Grey #959595、White #ffffff、Blue #00a0dd；主色使用應以黑/灰/白為主，Blue 約 10% 且作 accent；所有 communications
    and marketing materials 應主要使用三主色不得偏離。'
  chapter: ch-04
  chapter_title: Color Palette and Usage
- module: Typography System
  criterion: AI 可檢查：文字中應寫 `WarnerMedia`，不得寫成 `Warner Media`；一般通訊設計應使用 AT&T Aleck Sans；字標 lockup 不應以非核准字體重做。
  chapter: ch-05
  chapter_title: Brand Typography and Lettering
- module: Visual Identity
  criterion: AI 可檢查：不得 rename logo artwork files；EPS 用於最高品質 offset/digital print/special applications；JPG 用於 web/onscreen
    或 PowerPoint/Word 替代；PNG 用於 PowerPoint、Word 與 onscreen 且需要透明支援。
  chapter: ch-06
  chapter_title: Logo File Nomenclature
- module: Brand Strategy
  criterion: AI 可檢查：非純文字表示時應使用 downloadable logo files；文字形式不得 relegated to mouse type 或 buried with legal/copyright information；所有非文字使用需遵循
    guideline artwork；tagline standard presentation 應為 2-color format，one-color 例外需 multi-color unavailable 或 written consent。
  chapter: ch-07
  chapter_title: A WarnerMedia Company Branded Divisional Tagline
