rules_ai_checkable:
- module: ''
  criterion: AI 可檢查：文案不得使用 IT nerd-speak、不得硬銷、不得以公司自誇為主；文案需能指出使用者 benefit 或工作方式改善。
  chapter: ch-01
  chapter_title: Strategy
- module: Brand Strategy
  criterion: AI 可檢查：願景文案需提到人、協作、速度或任意地點工作；不得只列產品名稱或功能。
  chapter: ch-01-01
  chapter_title: Brand Vision Statement
- module: ''
  criterion: AI 可檢查：受眾描述需包含 attitude 或 motivation；不得只用職稱、部門或公司規模。
  chapter: ch-01-02
  chapter_title: Shared Mindset and Positioning
- module: Voice and Tone
  criterion: AI 可檢查：避免 jargon、over-explain、ego claims；句子應短、明確，至少包含一個使用者價值。
  chapter: ch-01-03
  chapter_title: Brand Voice and Tone
- module: Brand Strategy
  criterion: AI 可檢查：logo 不得旋轉、拉伸、改比例、加效果、改字體、單獨使用 modifier；灰色 Google logo 高度不得小於 22px 或 0.175in。
  chapter: ch-02
  chapter_title: Brand Elements
- module: Visual Identity
  criterion: AI 可檢查：最近圖形元素與 logo 距離至少一個 x-height；不得動畫化 icon；Premier badge 僅限 contracted Premier Partners。
  chapter: ch-02-01
  chapter_title: Logo System
- module: Color System
  criterion: AI 可檢查：body copy 使用 Google for Work Gray；accent 使用 Google for Work Blue；不得從螢幕或列印品視覺匹配色彩。
  chapter: ch-02-02
  chapter_title: Color Palette
- module: ''
  criterion: AI 可檢查：若主詞已完成轉換，使用「has gone Google」；若描述正在發生的活動或趨勢，使用「is going Google」；creative assets 不得出現「Work the way you live」。
  chapter: ch-02-03
  chapter_title: Tagline and Vision Usage
- module: Typography System
  criterion: AI 可檢查：print 不得使用 Arial；Arial online only sparingly；headline 字級至少為 body 兩倍；行距為字級 1.2 倍。
  chapter: ch-02-04
  chapter_title: Typography
