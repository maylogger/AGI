rules_ai_checkable:
- module: ''
  criterion: 若使用 logo、名稱或暗示 Microsoft Bing 贊助、背書、相容性，即需確認 license；使用方式必須準確反映公司/產品與 Bing 的關係；不確定時需取得 Microsoft business owner
    或 brand team 授權。
  chapter: ch-01
  chapter_title: Usage Requirements
- module: ''
  criterion: 若使用 “Results from Microsoft Bing” 或類似語句，需與實際資料來源/相容關係一致；不可用元素暗示超出事實的合作關係。
  chapter: ch-02
  chapter_title: Our Elements
- module: Visual Identity
  criterion: light/white background 使用 positive version；dark background 或照片暗部使用 knock-out version；不得選用導致低對比或不可讀的版本。
  chapter: ch-03
  chapter_title: Logo and Logo Usage
- module: Iconography System
  criterion: icon width 不得小於 0.16 in / 4.23 mm / 16 px；標籤與 icon 的間距應遵循 X、1/2X、1/8X 比例；不得縮放到標籤不可讀或 icon 形狀失真。
  chapter: ch-04
  chapter_title: Product Icon
