# L3 決策卡 sidecar — Amazon Brand Usage Guidelines
# schema：research/schemas/decision_pattern.schema.yaml
# 由 note.md 反向工程萃取；strict evidence 連回本檔 index.yaml 章節。

brand_id: Amazon_Brand_Usage_Guidelines
decisions:
  - id: dp-trademark-permission-flow
    title: 用授權閘門治理第三方商標使用，先處理混淆與背書風險
    problem:
      statement: 平台品牌被大量第三方使用商標與資產，若無授權流程，會造成商標混淆與誤導性背書風險。
      signals: [trademark_protection, partner_governance, endorsement_risk, third_party_usage]
    solution:
      module: Legal and Trademark
      move: 以「核准來源 + 允許情境 + 禁止改作 + permission gate」治理，高風險情境須送審並附最終版本、描述與 script
      layer: governance
    reason:
      - 平台品牌 guideline 應優先處理 trademark confusion 與 endorsement risk，再處理美學一致
      - 越接近大眾媒體、商業廣告、包裝與劇情敘事，審查需求越高
      - permission section 將品牌治理流程化，降低設計師自行判斷法律風險
    applicable_when:
      industries: [tech_software]
      brand_types: [platform_ecosystem]
      conditions: [third_party_usage, partner_governance]
      archetypes: [multi_brand_architecture, brand_experience_guide]
    dependencies:
      requires: [Legal and Trademark]
      enables: [Governance]
    anti_patterns:
      - 只給視覺規格而無使用情境風險表與審核材料清單
      - 放任第三方自行判斷法律與背書風險
    evidence:
      - brand_id: Amazon_Brand_Usage_Guidelines
        chapter: ch-01
        excerpt: "平台品牌的 partner guideline 應先定義審核權限，再給予執行細節；所有創意材料須事前提交 Amazon 核准，未獲 written approval 不應使用 Amazon branding elements。"
      - brand_id: Amazon_Brand_Usage_Guidelines
        chapter: ch-02-04
        excerpt: "品牌詞庫應包含 prohibited、requires approval、allowed-with-context 三種狀態；平台品牌 guideline 應管理『近似語』而不只管理精確商標。"
    status: extracted

  - id: dp-clearspace-from-logo-geometry
    title: 用標誌自身幾何定義留白，讓 spacing 隨縮放成立
    problem:
      statement: 用固定像素定義 clear space，在不同尺寸與媒介會失效。
      signals: [scaling_inconsistency, multi_media]
    solution:
      module: Visual Identity
      move: 以標誌幾何（logo height）作為相對留白與尺寸基準
      layer: visual_core
    reason:
      - 版面一致性來自比例關係，不只是絕對尺寸
      - 留白以標誌自身元素為單位，可隨縮放維持比例
    applicable_when:
      industries: []
      brand_types: []
      conditions: [multi_media]
      archetypes: [brand_experience_guide, full_brand_system, logo_asset_guidelines]
    dependencies:
      requires: [Visual Identity]
    evidence:
      - brand_id: Amazon_Brand_Usage_Guidelines
        chapter: ch-03-01
        excerpt: "logo 的 internal letterform 可成為 spacing token：clear space 以 bold letter `o` 計算，logo 最小 1 inch 或 72px。"
    status: extracted

  - id: dp-monochrome-logo-by-contrast
    title: 用背景對比決定單色標誌，而非開放自由配色
    problem:
      statement: 開放彩色標誌會被任意彩色化，破壞辨識與一致性。
      signals: [logo_misuse_risk, photo_backgrounds]
    solution:
      module: Visual Identity
      move: 以背景明暗與照片複雜度建立對比決策樹，限定白／深色兩種標誌
      layer: visual_core
    reason:
      - 標誌辨識與對比優先；單色策略比多色變體更能保護一致性
      - Logo 顏色規範應基於對比與背景風險，而非只列色票
    applicable_when:
      industries: []
      brand_types: []
      conditions: []
      archetypes: [brand_experience_guide, full_brand_system, logo_asset_guidelines]
    dependencies:
      requires: [Visual Identity]
      enables: [Accessibility]
    evidence:
      - brand_id: Amazon_Brand_Usage_Guidelines
        chapter: ch-03-01
        excerpt: "背景明暗決定選擇 color/reversed/one-color 版本；不得把 logo 放在 patterned background，one-color smile 不得灰色。"
    status: extracted
