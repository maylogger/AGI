rules_ai_checkable:
- module: Brand Strategy
  criterion: AI 可檢查準則：所有品牌材料應遵循同一 Logo、字體、色彩與寫作規則；不得以專案需求作為破壞一致性的理由。
  chapter: ch-01
  chapter_title: Protecting Our Brand
- module: Visual Identity
  criterion: AI 可檢查準則：preferred Logo 為三色標準 layout 且白字置於藍色；單色優先 RNST Dark Blue；黑白應為 100% black 或 white，不用灰階；clear space 等於
    RENASANT lettering 高度；Logo 需保持完整、不得拆分、旋轉、重繪、重排、陰影化或 3D 化。
  chapter: ch-02
  chapter_title: Logo System
- module: Visual Identity
  criterion: AI 可檢查準則：Understanding You 與 Logo 並用時必須加 ®；作 headline 或與 Logo 分離時不加 ®；水平 layout 的 dividing line 顏色應與 tagline
    相同。
  chapter: ch-02-01
  chapter_title: Our Logo and Logo with Tagline
- module: ''
  criterion: AI 可檢查準則：不得 alterar proportions、rotate、reconfigure、redraw、reset type、place inside another shape、separate components、animate、shadow
    或 3D render，除非有 Renasant Marketing authorization。
  chapter: ch-02-02
  chapter_title: Clear Space, Proportions and Unacceptable Usage
- module: Typography System
  criterion: AI 可檢查準則：Trajan Pro Bold 不得用於 Logo 以外應用，除非 Marketing approval；Univers LT Std 57 Condensed 用於多數文字與 disclosure；Univers
    LT Std 67 Bold Condensed 用於 all caps headlines 與強調；Glypha LT Std 55 Bold 僅 Mortgage Lending headline/subheadline；Archivo
    Narrow Bold 與 Muli Regular 僅 Web。
  chapter: ch-03
  chapter_title: Typography
- module: Color System
  criterion: 'AI 可檢查準則：Logo 主要色包含 RNST Dark Blue #15467B 與 RNST Flame Green #009779；Logo 外主要使用 blue shades；additional colors
    未經 Marketing permission 不得使用；black/white 使用指定值。'
  chapter: ch-04
  chapter_title: Color Palette and Patterns
- module: ''
  criterion: AI 可檢查準則：比較數值用 more than/less than；多數情境稱 account holders 為 clients；不用 Oxford comma；cell phone 分兩字；使用 active voice；句尾不放
    prepositions；避免 Everyone knows、We always、Everything、Never；電話號碼用句點分隔；網址不用 www.。
  chapter: ch-05
  chapter_title: Writing Style
- module: Brand Strategy
  criterion: AI 可檢查準則：不得向內部個人或部門共享 working design files；Logo、symbols、colors、patterns 問題應送 Renasant Marketing；例外需提交 Director
    of Marketing & Public Relations。
  chapter: ch-06
  chapter_title: Brand Element Requests and Inquiries
