rules_ai_checkable:
- module: ''
  criterion: AI 可檢查：只能使用 Brand Resource Center 資產；Facebook wordmark 不可用於代表 presence；不得讓 Facebook 成為最突出特徵；不得改色、變形、旋轉、加效果或重畫資產；Facebook
    一詞不可複數化、動詞化或縮寫。
  chapter: ch-01
  chapter_title: Welcome and General Guidelines
- module: ''
  criterion: AI 可檢查：除網址外需寫作 Facebook；字體大小與 surrounding text 一致；不得寫成 facebook、Facebooks、facebooked、FB；不得用 logo/icon 取代單字。
  chapter: ch-01-01
  chapter_title: General usage and talking about Facebook
- module: ''
  criterion: AI 可檢查：TV/online marketing、books/plays/TV/film scripts、print packaging、news/commentary 需 permission；request 必須附最終版本、描述、script
    與非英語 translation。
  chapter: ch-01-02
  chapter_title: Requesting Permission
- module: Brand Strategy
  criterion: AI 可檢查：f logo 可用於 Facebook presence、Facebook content 或 product integration；thumb icon 必須搭配清楚 CTA 且不可與其他 Facebook
    symbols 並列；badge online 必須直接連到 Facebook presence；Reactions 不可單獨拆開或改造。
  chapter: ch-02
  chapter_title: Facebook Brand Assets
- module: ''
  criterion: AI 可檢查：不得修改 Reactions 顏色、比例、形狀；不得單獨突出一個 Reaction 作為 icon；不得動畫化或做成實體物件；floating Reactions 僅能出現在 Facebook Live
    或 Facebook products；若在 UI 內呈現需遵守 UI guidelines。
  chapter: ch-02-02
  chapter_title: Reactions
- module: ''
  criterion: AI 可檢查：Facebook UI 不得浮在頁面上；不得超過 100% file size；mobile UI 不得裁切 top/sides；iOS 用 San Francisco、Android 用 Roboto、Web
    用 Helvetica；不得使用未授權 PII、第三方 logo、copyrighted content。
  chapter: ch-03
  chapter_title: User Interface Templates
- module: ''
  criterion: AI 可檢查：Facebook assets 不可用於 merchandise；只能用 Brand Resource Center 官方資產；Facebook 不可作動詞；book/film/play 使用 logo
    或 image 需書面 permission。
  chapter: ch-04
  chapter_title: FAQs
