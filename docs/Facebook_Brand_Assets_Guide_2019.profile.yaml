patterns:
- name: 把 brand guideline 寫成第三方 compliance manual，而不是單純視覺風格書。
  chapter: ch-01
  chapter_title: Welcome and General Guidelines
- name: 品牌提及規則可以從視覺 guideline 延伸到 copy guideline。
  chapter: ch-01-01
  chapter_title: General usage and talking about Facebook
- name: permission section 將品牌治理流程化，降低設計師自行判斷法律風險。
  chapter: ch-01-02
  chapter_title: Requesting Permission
- name: 每個 logo 類 asset 都用相同治理欄位，讓審核規則可模組化。
  chapter: ch-02
  chapter_title: Facebook Brand Assets
- name: 每個 asset 都必須和明確 action 或 context 綁定，防止漂浮裝飾化。
  chapter: ch-02-01
  chapter_title: f Logo, Thumb Icon, and Badge
- name: 功能語境
  chapter: ch-02-02
  chapter_title: Reactions
- name: 而非只含外觀
  chapter: ch-02-02
  chapter_title: Reactions
- name: 可自訂內容，但不可改 UI 形態；這是 template-based localization 的治理模式。
