rules_ai_checkable:
- module: ''
  criterion: AI 可檢查：品牌說明需連結 customer needs、competitive advantage、all touchpoints；不得把 visual identity 寫成單純美術風格。
  chapter: ch-01
  chapter_title: A message from Michael
- module: Visual Identity
  criterion: AI 可檢查：Dell Blue logo 是 primary；logo 不得 alter、modify、recreate；clear space = Dell word 中 D 高度；minimum offline
    0.5 inch diameter / digital 40px；Dell Blue logo 只能用於 solid white background。
  chapter: ch-02
  chapter_title: Logo
- module: Visual Identity
  criterion: AI 可檢查：不得修改或重繪 logo；approved artwork 需從 DAM 取得。
  chapter: ch-02-01
  chapter_title: Logo overview
- module: ''
  criterion: AI 可檢查：clear space 內不得有 headline、text、graphic elements 或 material edge；offline diameter 不小於 0.5 inch/12.7mm；digital
    diameter 不小於 40px。
  chapter: ch-02-02
  chapter_title: Clear space and minimum size
- module: Visual Identity
  criterion: AI 可檢查：light gray/white logo 只能在 primary impression 已出現後使用；dark gray 僅限 one/two-color applications；Dell Blue
    logo 不得置於非白底或圖片上；light/dark gray logo 不得置於 colored backgrounds。
  chapter: ch-02-03
  chapter_title: Alternate logos and backgrounds
- module: ''
  criterion: AI 可檢查：partner lockup 必須有 vertical rule 與 proper spacing；separator 不得傾斜；不得 overlay 或 stack partner lockup；department
    lockup copy 使用 Museo for Dell 300，距 logo 1x cap height，色彩 85%K。
  chapter: ch-02-04
  chapter_title: Incorrect usage and lockups
- module: Color System
  criterion: 'AI 可檢查：Dell Blue 使用 #0085C3 / RGB 0-133-195 / C92 M34 Y0 K0；不得使用任何 palette tint；Dell Periwinkle 與 Dell Aqua
    不得與 Dell Blue 在同一 surface 使用。'
  chapter: ch-03
  chapter_title: Color
- module: Typography System
  criterion: AI 可檢查：使用 approved Dell typefaces；body copy flush left/rag right；headline over 20pt tracking 10；sentence case；default
    type color 85%K；不得 all caps、justify body、open letter spacing、drop shadows、distort letterforms、使用 Gotham/Interstate/Univers。
  chapter: ch-04
  chapter_title: Typography
- module: ''
  criterion: AI 可檢查：rounded corner shape 不得小於 1" x 1"；理想上每頁只使用一個；不得混合 round and sharp corners、改變 corner ratio、放 body copy
    進 rounded corners、在 rounded corners 中使用多張 image。
  chapter: ch-05
  chapter_title: Graphic elements
- module: Photography System
  criterion: AI 可檢查：所有 photography 必須 deliver on thriving，具備 open/bright/active/authentic；不得 staged、overly conceptual、cluttered、cliche、photo-montaged、digitally
    enhanced。
  chapter: ch-06
  chapter_title: Imagery
- module: Photography System
  criterion: AI 可檢查：需 show real product interaction、natural environments、bright natural light、thriving situations；不得 staged
    poses、exaggerated effects、disconnect from Dell usage 或讓使用者失焦只突出產品。
  chapter: ch-06-01
  chapter_title: Lifestyle imagery
- module: Photography System
  criterion: AI 可檢查：不得讓環境 overwhelming；不得 float 或 unnaturally pose products；不得用 dark/cluttered imagery 作 primary photograph。
  chapter: ch-06-02
  chapter_title: Product imagery
- module: Photography System
  criterion: AI 可檢查：可使用 growth/thrive、beneficial technology、clear concept imagery；不得使用 cliched imagery、embellished scientific
    renderings、photo-montaged 或 digitally enhanced imagery。
  chapter: ch-06-03
  chapter_title: Supporting imagery
- module: Photography System
  criterion: AI 可檢查：不得 blow out background to white；照片邊緣需在白頁可見，除非 cut-out/silhouetted；不得裁切人的臉或眼睛；不得聚焦 blurred/unattractive
    elements；不得只 focus on product 而忽略 people。
  chapter: ch-06-04
  chapter_title: Imagery style and cropping
- module: Voice and Tone
  criterion: AI 可檢查：不得從本 PDF 推論 Dell voice 具體規則；需查找 voice standards 文件。
  chapter: ch-07
  chapter_title: Voice
