# L3 決策卡 sidecar — USA TODAY Corporate Brand Guidelines
# schema：research/schemas/decision_pattern.schema.yaml
# 由 note.md 反向工程萃取；strict evidence 連回本檔 index.yaml 章節。

brand_id: USAToday_Online_Brand_guidelines_2014
decisions:
  - id: dp-platform-before-visual-rules
    title: 先定義企業策略與語氣，再建立視覺識別工具箱
    problem:
      statement: 大型技術企業若直接寫視覺規則，視覺系統會變成單純新風格，而非品牌平台的執行工具。
      signals: [no_strategic_foundation, enterprise, style_over_system, new_identity]
    solution:
      module: Brand Strategy
      move: 先把新聞品牌核心從「媒體產品」改寫成「理解與實用性」，再讓視覺規則承接其新聞哲學
      layer: strategy
    reason:
      - 視覺規則需有可回推的語義來源
      - 品牌 principle 可作為內容、產品與視覺決策的共同評分維度
      - 先宣告 mission，再以 manifesto 建立情緒與社會角色
    applicable_when:
      industries: [industrial_materials_science, tech_software, media_entertainment]
      brand_types: [category_creator, heritage_legacy, challenger, mission_driven]
      conditions: [new_identity, strategy_refresh]
      archetypes: [full_brand_system, brand_experience_guide]
    dependencies:
      requires: []
      enables: [Visual Identity, Color System, Typography System, Voice and Tone]
    anti_patterns:
      - guideline 從空白直接列章節、先寫 Logo 規格
    evidence:
      - brand_id: USAToday_Online_Brand_guidelines_2014
        chapter: ch-01
        excerpt: "先把新聞品牌的核心從『媒體產品』改寫成『理解與實用性』，讓後續視覺規則有新聞哲學支撐。"
    status: extracted

  - id: dp-personality-words-as-evaluation-criteria
    title: 把人格詞做成創意評估準則
    problem:
      statement: 抽象企業價值無法指導產出，設計與文案缺乏共同判斷語彙。
      signals: [abstract_values, needs_evaluation_criteria, inconsistent_outputs]
    solution:
      module: Brand Strategy
      move: 用 experience principles（Everywhere/Useful/Easily understood/Unbiased/Inventive）當內容、產品與視覺決策的共同評分維度
      layer: strategy
    reason:
      - 人格詞應能成為產出評估標準，而不是僅作品牌牆口號
      - 品牌 principle 可作為內容、產品與視覺決策的共同評分維度
    applicable_when:
      industries: [industrial_materials_science, nonprofit_social, media_entertainment]
      brand_types: [challenger, category_creator, mission_driven]
      conditions: []
      archetypes: [full_brand_system, brand_experience_guide]
    dependencies:
      requires: [Brand Strategy]
      enables: [Voice and Tone, Visual Language, Content Design]
    evidence:
      - brand_id: USAToday_Online_Brand_guidelines_2014
        chapter: ch-01-01
        excerpt: "everywhere、useful、easily understood、unbiased、inventive 五項體驗原則作為品牌行為框架，可作為內容、產品與視覺決策的共同評分維度。"
    status: extracted

  - id: dp-modular-manual-for-public-units
    title: 用「可辨識但不獨立」的層級框架治理多機構／多單位品牌
    problem:
      statement: 大型多機構、多單位組織，各單位都想要自己的識別，若無分層治理，品牌會裂解成互相競爭、削弱母品牌的子品牌。
      signals: [multi_unit_consistency, multi_entity, sub_unit_identity, brand_architecture_complexity]
    solution:
      module: Brand Architecture
      move: 以 Masterbrand governance 要求所有 property 與子品牌可追溯到 master system，子品牌僅以色彩 label 分化而非自成識別
      layer: governance
    reason:
      - 局部單位可以被識別，但不能競爭或替代母品牌
      - 品牌資產擴張必須回補 masterbrand，而不是抽離或稀釋它
      - 子品牌應服務導航與內容辨識，而非建立與 masterbrand 競爭的新品牌
    applicable_when:
      industries: [public_sector, education, media_entertainment]
      brand_types: [institutional_public_trust, platform_ecosystem, heritage_legacy]
      conditions: [multi_unit_consistency, multi_entity]
      archetypes: [multi_brand_architecture, brand_experience_guide]
    dependencies:
      requires: [Brand Strategy, Visual Identity]
      enables: [Governance]
    anti_patterns:
      - 各 property 自行發展識別造成 masterbrand fracture
    evidence:
      - brand_id: USAToday_Online_Brand_guidelines_2014
        chapter: ch-02
        excerpt: "所有帶 USA TODAY 名稱的品牌識別都必須遵循 identity system；masterbrand equity flows from and contributes to the Masterbrand。"
      - brand_id: USAToday_Online_Brand_guidelines_2014
        chapter: ch-04
        excerpt: "子品牌以顏色與 label 加到 USA TODAY logotype，不自成獨立識別，應服務導航與內容辨識而非與 masterbrand 競爭。"
    status: extracted

  - id: dp-clearspace-from-logo-geometry
    title: 用標誌自身幾何定義留白，讓 spacing 隨縮放成立
    problem:
      statement: 用固定像素定義 clear space，在不同尺寸與媒介會失效。
      signals: [scaling_inconsistency, multi_media]
    solution:
      module: Visual Identity
      move: 以 logotype 中 U 字的 cap height 作為四周 clearspace 量尺
      layer: visual_core
    reason:
      - 版面一致性來自比例關係，不只是絕對尺寸
      - 留白以標誌自身元素為單位，可隨縮放維持比例
    applicable_when:
      industries: []
      brand_types: []
      conditions: [multi_media]
      archetypes: [brand_experience_guide, full_brand_system, logo_asset_guidelines]
    dependencies:
      requires: [Visual Identity]
      enables: []
    evidence:
      - brand_id: USAToday_Online_Brand_guidelines_2014
        chapter: ch-03-02
        excerpt: "logo clearspace 至少等於 USA TODAY 中 U 的 cap height。"
    status: extracted

  - id: dp-contact-before-appendix
    title: 在技術資料前先給治理窗口，讓 guideline 成為可改善系統
    problem:
      statement: 規則無法涵蓋所有情境，缺乏權威決策入口時，例外用法無人裁決。
      signals: [exceptions_expected, governance]
    solution:
      module: Governance
      move: 提供 brand team 聯絡窗口並建議在開發中早期尋求 review，而非產出完成後才阻擋
      layer: governance
    reason:
      - 規則無法涵蓋所有情境，必須提供權威決策入口
      - 品牌治理要在開發中介入，而不是產出完成後才阻擋
      - guideline 應提供人類治理節點，而不只規則
    applicable_when:
      industries: [finance]
      brand_types: []
      conditions: []
      archetypes: [brand_experience_guide, full_brand_system, corporate_toolkit, logo_asset_guidelines]
    dependencies:
      requires: [Governance]
      enables: [Operations]
    evidence:
      - brand_id: USAToday_Online_Brand_guidelines_2014
        chapter: ch-09
        excerpt: "提供 brand@usatoday.com 並建議早期尋求 feedback；需要 logo 使用、外部 vendor 或 branding issue 時應尋求 brand team review。"
    status: extracted
