rules_ai_checkable:
- module: Brand Strategy
  criterion: AI-checkable：任何品牌應用需保留內容主導地位；Further 不得被改寫成與探索、進展無關的口號；影像不得被高音量品牌元素壓過。
  chapter: ch-01
  chapter_title: Our Brand
- module: ''
  criterion: AI-checkable：敘事需指向 science/adventure/exploration；不可把娛樂語氣與真實世界根基切離。
  chapter: ch-01-01
  chapter_title: Our Mission
- module: ''
  criterion: AI-checkable：Further 使用需暗示前進、探索、深化或突破；不得只作裝飾性標語。
  chapter: ch-01-02
  chapter_title: Further
- module: Brand Strategy
  criterion: AI-checkable：品牌元素需可依內容需求調整音量；影像優先情境不得使用過量遮罩或圖形。
  chapter: ch-01-03
  chapter_title: Content-Forward Brand
- module: Brand Strategy
  criterion: AI-checkable：Index 應沿 X 軸前進並承載資料或標題；Mapping 應以揭露/擴張方式呈現更大圖像；Z-depth 應產生向前或深入的空間感。
  chapter: ch-02
  chapter_title: Brand Behavior
- module: ''
  criterion: AI-checkable：Metric index 使用量化資訊；Title index 使用訊息或情緒性文字；不得讓 index 成為無意義裝飾。
  chapter: ch-02-01
  chapter_title: Index Metrics
- module: ''
  criterion: AI-checkable：鏡頭/圖形需產生前進方向；X 軸資料移動可與 Z 軸推進同步；轉場不得顯得隨機漂移。
  chapter: ch-02-03
  chapter_title: Z-Depth
- module: Visual Identity
  criterion: AI-checkable：檢查輸入是否使用指定元素、是否符合頁面標示的尺寸/比例/色彩/留白，且不得出現章節列出的禁用組合。
  chapter: ch-03-01
  chapter_title: Logo, Color, Image, Typeface
- module: Brand Strategy
  criterion: AI-checkable：先判斷 image/message/brand 的優先權；不得同時提高三者造成視覺擁擠；每個輸出需能說明所選音量等級。
  chapter: ch-04
  chapter_title: Guidelines and Brand Volume
- module: ''
  criterion: AI-checkable：品牌元素面積需低於訊息與影像主體；不得遮蔽關鍵影像。
  chapter: ch-04-01
  chapter_title: Image Priority
- module: ''
  criterion: AI-checkable：每個 on-air 元件需對應核准用途；長標題需使用指定 accommodate long copy 模式；navigation/ident 不得混用 promo 結構。
  chapter: ch-05
  chapter_title: On-Air Systems
- module: ''
  criterion: AI-checkable：檢查輸入是否使用指定元素、是否符合頁面標示的尺寸/比例/色彩/留白，且不得出現章節列出的禁用組合。
  chapter: ch-05-01
  chapter_title: Promo Toolkit
- module: ''
  criterion: AI-checkable：檢查輸入是否使用指定元素、是否符合頁面標示的尺寸/比例/色彩/留白，且不得出現章節列出的禁用組合。
  chapter: ch-05-02
  chapter_title: Navigation
- module: ''
  criterion: AI-checkable：檢查輸入是否使用指定元素、是否符合頁面標示的尺寸/比例/色彩/留白，且不得出現章節列出的禁用組合。
  chapter: ch-05-03
  chapter_title: Idents
- module: ''
  criterion: AI-checkable：商務文件需使用指定 stationery 版型；社群標頭與貼文需維持核准品牌音量；簡報/網站不得使用未定義的 logo 或 header 變體。
  chapter: ch-06
  chapter_title: Print and Social/Digital
- module: ''
  criterion: AI-checkable：檢查輸入是否使用指定元素、是否符合頁面標示的尺寸/比例/色彩/留白，且不得出現章節列出的禁用組合。
  chapter: ch-06-01
  chapter_title: Stationery and Digital Templates
