frameworks:
- name: 此章形成 History -> International Mission -> Event Mission 的三層框架，將運動起源、長期使命與本屆賽會目標串接起來
  chapter: ch-01
  chapter_title: History & Mission
- name: Problem -> Action -> Movement 的歷史框架：看見不公平、建立日營、擴展成全球運動
  chapter: ch-01-01
  chapter_title: Our History
- name: Mission Alignment 框架：International Mission 定義永久價值，Event Mission 定義本屆賽會如何具體化
  chapter: ch-01-02
  chapter_title: Our Mission
- name: Athlete Creation -> Professional Synthesis -> United Symbol，將個人創作整合為公共賽會識別
  chapter: ch-02-01
