rules_ai_checkable:
- module: ''
  criterion: AI 可檢查品牌內容是否提及 inclusion、acceptance、athletes' abilities、community partnership，並避免把活動只描述成一般體育賽事。
  chapter: ch-01
  chapter_title: History & Mission
- module: ''
  criterion: AI 可檢查行銷素材是否把 athletes 描述為有 abilities and talents 的主體，是否提到 inclusion、acceptance 或 collaborative partnerships。
  chapter: ch-01-02
  chapter_title: Our Mission
- module: Visual Identity
  criterion: AI 可檢查是否優先使用 United O + wordmark，是否將 athlete logos 標示為 special use only 且需 cleared with 2022 USA Games。
  chapter: ch-02-02
  chapter_title: Our Logo
- module: Visual Identity
  criterion: '可檢查規則包含所有含 marks 的素材須事前核准、vertical logo 優先、clear space 至少 X、標誌不可小於 1 inch / 72 px、不得拉伸或改色、社群活動須核准、使用 #ShineAsOne。'
  chapter: ch-03
  chapter_title: Logo Usage
- module: ''
  criterion: AI 可檢查素材若含 2022 USA Games marks，是否標記為需要 GOC prior written approval；合作夥伴不得未經核准發布。
  chapter: ch-03-01
  chapter_title: Approval Process
- module: Visual Identity
  criterion: AI 可檢查 logo bounding box 四側是否至少保留 1X 無遮擋空間。
  chapter: ch-03-05
  chapter_title: Logo Spacing
- module: Visual Identity
  criterion: AI 可檢查兩側是否有 1X spacing、是否有黑色垂直分隔線、partner designation 是否置中且 ALL CAPS、文字是否使用灰色或藍色。
  chapter: ch-03-06
  chapter_title: Partner Logos
- module: Visual Identity
  criterion: AI 可檢查 vertical logo height >= 1 inch/72 px，horizontal logo width >= 1 inch/72 px；分離元素不得小於 1 inch logo 中的個別元素尺寸。
  chapter: ch-03-07
  chapter_title: Logo Scale
- module: ''
  criterion: 'AI 可檢查是否使用正確 handles、是否避免混淆 state chapters 或 Special Olympics International、是否對 games-related social campaigns
    標記需 Chief Marketing Officer approval、是否使用 #ShineAsOne。'
  chapter: ch-03-10
  chapter_title: Social Media
- module: Color System
  criterion: '可檢查色值包含 Ocean Blue #335CA9、Lagoon Blue #1A8FC9、Florida Orange #F89836、Sunset Red #EE2564、Palm Green #6CC061。'
  chapter: ch-04-01
  chapter_title: Colors
