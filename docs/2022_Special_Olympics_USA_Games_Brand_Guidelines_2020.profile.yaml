  chapter: ch-03-07
  chapter_title: Logo Scale
- name: Element Separation Framework：established context -> United O；legibility critical context -> wordmark
  chapter: ch-03-08
  chapter_title: Separated Elements
- name: Misuse Taxonomy：geometry distortion、containerization、color alteration、typographic edit、effect addition、element removal
  chapter: ch-03-09
  chapter_title: Logo Misuse
- name: Social Governance Framework：official handles + prior approval + icon usage + campaign hashtag
  chapter: ch-03-10
  chapter_title: Social Media
- name: Color Token Framework：primary colors + complementary colors + gradients + logo contrast rule
  chapter: ch-04
  chapter_title: Color Palette
- name: Cross-Media Token Framework：screen HEX、print Pantone、process CMYK
  chapter: ch-04-01
  chapter_title: Colors
- name: Gradient Background Rule：gradient enhances brand color；white logo preserves contrast
  chapter: ch-04-02
  chapter_title: Gradients
- name: Dual Communication Framework：typographic consistency + inclusive language governance
  chapter: ch-05
  chapter_title: Typography & Language
- name: Typeface Hierarchy Framework：Gotham Bold/Ultra for identity emphasis，Helvetica fallback for constrained environments
  chapter: ch-05-01
  chapter_title: Typography
- name: Respectful Language Framework：definition literacy + person-first terms + equal naming style + avoid stigmatizing or
    s...
