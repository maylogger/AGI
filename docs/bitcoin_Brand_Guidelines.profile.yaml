rules_ai_checkable:
- module: Brand Strategy
  criterion: AI 可檢查 logo 字體不可為斜體；主色應接近指定金黃色；灰色不得深到產生威脅或沉重感。
  chapter: ch-01
  chapter_title: Brand Overview
- module: Brand Strategy
  criterion: logo 不得使用未列色彩；不得 stretch、distort、shadow、bevel、stroke、gradient、transparency；coin 黃色版的 B 應保持白色；logo/coin 不應置於未提供的照片、圖樣或紋理背景。
  chapter: ch-03
  chapter_title: Brand Asset Usage
- module: Color System
  criterion: AI 可檢查指定黃是否為 `#FAB915`、灰是否為 `#8B8B8B`，或是否落在允許誤差範圍內。
  chapter: ch-04
  chapter_title: Colors
