rules_ai_checkable:
- module: Visual Identity
  criterion: logo 永遠白色且在 ARTE orange 上；不得重繪或修改 logo artwork；各 genre 顏色需使用指定 RGB/Hex 或對應深淺組合。
  chapter: ch-02-01
  chapter_title: Logo, Avatar and Digital Colour
- module: ''
  criterion: header image 垂直置中，內容看起來被吸向左側 avatar；文字一律左對齊；Facebook header type 60-110 pt、subheader 35 pt；Twitter header type
    105-170 pt、subheader 60 pt；YouTube header type 115-214 pt、subheader 54 pt；YouTube full image 2560x1440 px、desktop visible
    area 1540x427 px、上傳 72 dpi 且最大 4 MB。
  chapter: ch-03
  chapter_title: Design Principles
- module: ''
  criterion: header 主要文字需在 safe area；YouTube 應以 2560x1440 px 建圖但主要資訊限於 1540x427 px desktop safe area；避免把文字放在 mobile 會裁掉或 avatar
    遮擋的位置。
  chapter: ch-03-01
  chapter_title: Positioning and Safe Areas
- module: ''
  criterion: avatar matrix 需在圓形/方形裁切中保持上下空間；ARTE、Creative、Magazine、Tracks headers 都應使用 programme/feature content 與 typography
    表現 right-to-left magnetic motion。
  chapter: ch-04
  chapter_title: Social Media Channels
- module: ''
  criterion: Arte URL jingle logo 垂直、URL 水平置於右側；outro 從 logo 開始，元素由右向左逐字吸附；Creative/Concert logo 垂直置中於各自品牌色；promo intro/outro
    用該 genre 深色背景，footage highlight 用淺色；like/comment/share animation 需沿用同色與風格；third-party bug 位於左上角且為白色。
  chapter: ch-05
  chapter_title: Social Jingles, Promos and Bugs
