# L3 決策卡 sidecar — European Committee of the Regions Visual Identity Guidelines
# schema：research/schemas/decision_pattern.schema.yaml
# 由 note.md 反向工程萃取；strict evidence 連回本檔 index.yaml 章節。
# 同一 dp- id 可出現在多份 sidecar，compile_knowledge_graph.py 會合併並累計信心。

brand_id: European_Committee_of_the_Regions_visual_identity_EN_2019
decisions:
  - id: dp-modular-manual-for-public-units
    title: 用「可辨識但不獨立」的層級框架治理多機構／多單位品牌
    problem:
      statement: 大型多機構、多單位組織，各單位都想要自己的識別，若無分層治理，品牌會裂解成互相競爭、削弱母品牌的子品牌。
      signals: [multi_unit_consistency, multi_entity, sub_unit_identity, brand_architecture_complexity]
    solution:
      module: Brand Architecture
      move: 先建立「誰在說話」的判斷層，再以 umbrella → member → VPU/GP → lockup → special case 的層級把組織結構視覺化
      layer: governance
    reason:
      - 局部單位可以被識別，但不能競爭或替代母品牌
      - 子品牌應有差異，但差異必須透過主系統控制，而不是另起爐灶
      - 子品牌系統可用「共享母構件 + 專屬色彩 + 固定應用模板」達成治理
    applicable_when:
      industries: [public_sector, education]
      brand_types: [institutional_public_trust, platform_ecosystem]
      conditions: [multi_unit_consistency, multi_entity]
      archetypes: [multi_brand_architecture, brand_experience_guide]
    dependencies:
      requires: [Brand Strategy, Visual Identity]
      enables: [Governance]
    anti_patterns:
      - 各單位自行創造分支品牌與專屬 tagline
      - 只列 logo 圖檔卻不給「何時用 umbrella、何時用單一機構」的判斷規則
    evidence:
      - brand_id: European_Committee_of_the_Regions_visual_identity_EN_2019
        chapter: ch-04-01
        excerpt: "為六個 commission（CIVEX、ENVE、COTER、NAT、ECON、SEDEC）指定專屬 HEX 與 diamond-based layout，用 masterbrand anchor + commission colour + scaled diamond 維持差異又保留 CoR 主識別連結。"
    status: extracted

  - id: dp-bilingual-identity-system
    title: 用語言平權的雙語標誌與分語字體治理多語品牌
    problem:
      statement: 跨語言、跨文化的品牌若只把標誌與字體做翻譯版本，會讓某一語言層被視為附屬裝飾，並在多語環境出現字形、排序與可讀性不一致。
      signals: [multilingual, bilingual, localization, cross_cultural_audience]
    solution:
      module: Typography System
      move: 把語言平權內建到標誌結構（雙語字形融合），並為每種文字系統指定字體、用途與排序規則
      layer: visual_core
    reason:
      - 多語品牌最好把語言平權內建在 logo 結構，而非只做翻譯版本
      - 多語 logo 系統應把語言排序、例外法律情境、聯名視覺重量明文化
      - 明定語言排序與例外法律情境，可降低使用者自行重排雙語標誌的風險
    applicable_when:
      industries: [public_sector, finance, education]
      brand_types: [institutional_public_trust]
      conditions: [multilingual, localization]
      archetypes: [brand_experience_guide, multi_brand_architecture]
    dependencies:
      requires: [Visual Identity, Typography System]
      enables: [Localization, Accessibility]
    anti_patterns:
      - 只提供翻譯版本，讓單一語言層支配另一層
      - 字體規範未標註語言維度，輔助字體污染主識別
    evidence:
      - brand_id: European_Committee_of_the_Regions_visual_identity_EN_2019
        chapter: ch-01-01
        excerpt: "logo 有 24 種 EU 語言版本、需依 ISO 639-1 原文標題排序，雙語版文字上下排列且依正式標題字母順序；Brussels 外牆法規例外不可用於其他情境。"
    status: extracted

  - id: dp-clearspace-from-logo-geometry
    title: 用標誌自身幾何定義留白，讓 spacing 隨縮放成立
    problem:
      statement: 用固定像素定義 clear space，在不同尺寸與媒介會失效。
      signals: [scaling_inconsistency, multi_media]
    solution:
      module: Visual Identity
      move: 以標誌幾何（logo height）作為相對留白與尺寸基準
      layer: visual_core
    reason:
      - 版面一致性來自比例關係，不只是絕對尺寸
      - 留白以標誌自身元素為單位，可隨縮放維持比例
      - 用 logo 內部元素作為量尺，可讓 clear space、diamond、grid 都有同一基準
    applicable_when:
      industries: []
      brand_types: []
      conditions: [multi_media]
      archetypes: [brand_experience_guide, full_brand_system, logo_asset_guidelines]
    dependencies:
      requires: [Visual Identity]
      enables: []
    examples:
      - minimum clear space = 1x o，optimal = 2x o
    evidence:
      - brand_id: European_Committee_of_the_Regions_visual_identity_EN_2019
        chapter: ch-01
        excerpt: "clear space 等於 4X、X 為 EU flag 高度的 1/8，diamond 與 grid 也都以 EU flag 尺寸衍生，讓所有比例有同一基準。"
    status: extracted

  - id: dp-media-split-typography
    title: 依媒介分流字體系統（print / digital / body）
    problem:
      statement: 同一字體在印刷與數位、標題與內文的需求不同，混用會犧牲可讀性或授權合規。
      signals: [print_and_digital, readability, licensing]
    solution:
      module: Typography System
      move: 區分 print font、digital font 與 secondary/body font，並各自規範字級與行距
      layer: visual_core
    reason:
      - 不同媒介的可讀性與授權條件不同
      - 字體規範應搭配用途說明，而非只列字體名稱
      - Office 場景需提供可替代字體以維持一致
    applicable_when:
      industries: [finance, public_sector, education]
      brand_types: [institutional_public_trust]
      conditions: [print_and_digital]
      archetypes: [brand_experience_guide]
    dependencies:
      requires: [Typography System]
      enables: []
    examples:
      - body copy 使用 Segoe UI Regular 10pt / 14pt leading
    evidence:
      - brand_id: European_Committee_of_the_Regions_visual_identity_EN_2019
        chapter: ch-01-02
        excerpt: "Myriad Pro 提供跨歐語支援、Minion Pro 為內頁帶來節奏，Office 場景可用 Arial/Times 替代；headline/subtitle 對比遵守 2:1。"
    status: extracted

  - id: dp-cobranding-grid-governance
    title: 用 grid 與固定模距治理聯名 lockup
    problem:
      statement: 聯名情境若沒有空間規則，夥伴標誌的相對大小與距離會失控，混淆主從關係。
      signals: [cobranding, partner_governance, multi_brand]
    solution:
      module: Brand Architecture
      move: 以 grid、固定 module 距離與分隔線定義 master brand 與 partner brand 的 lockup
      layer: strategy
    reason:
      - 聯名需先界定空間與主從，才能維持品牌資產權重
      - 多種出版物可共享一個 graphic line，只需為情境建立條件分支
    applicable_when:
      industries: [finance, tech_software, public_sector]
      brand_types: [platform_ecosystem, institutional_public_trust]
      conditions: [cobranding, partner_governance]
      archetypes: [multi_brand_architecture, brand_experience_guide]
    dependencies:
      requires: [Brand Architecture, Visual Identity]
      enables: [Governance]
    evidence:
      - brand_id: European_Committee_of_the_Regions_visual_identity_EN_2019
        chapter: ch-01-01
        excerpt: "聯名 logo 間距至少等於 EU flag 寬；co-branded publication 需依三種聯名方式配置、signpost host/co-organised 版型不得混用。"
    status: extracted
