# L3 決策卡 sidecar — Slack
# schema：research/schemas/decision_pattern.schema.yaml
# 由 note.md 反向工程萃取；strict evidence 連回本檔 index.yaml 章節。

brand_id: Slack-Brand-Guidelines
decisions:
  - id: dp-platform-before-visual-rules
    title: 先定義企業策略與語氣，再建立視覺識別工具箱
    problem:
      statement: 大型技術企業若直接寫視覺規則，視覺系統會變成單純新風格，而非品牌平台的執行工具。
      signals: [no_strategic_foundation, enterprise, style_over_system, new_identity]
    solution:
      module: Brand Strategy
      move: 先建立 Who We Are → How We Communicate → Brand Platform，再進入 Visual System
      layer: strategy
    reason:
      - 視覺規則需有可回推的語義來源
      - 品牌不是單一標誌，而是組織如何行動與如何溝通
      - 先建立判斷標準，後續視覺與語氣才有可回溯的語義來源
    applicable_when:
      industries: [industrial_materials_science, tech_software]
      brand_types: [category_creator, heritage_legacy, challenger, mission_driven]
      conditions: [new_identity, strategy_refresh]
      archetypes: [full_brand_system, brand_experience_guide]
    dependencies:
      requires: []
      enables: [Visual Identity, Color System, Typography System, Voice and Tone]
    anti_patterns:
      - guideline 從空白直接列章節、先寫 Logo 規格
    evidence:
      - brand_id: Slack-Brand-Guidelines
        chapter: ch-01
        excerpt: "先建立 Slack 為何存在，使後續設計元素不只是好看，而是服務工作協調；brand definition framework：mission → coordination problem → Slack solution → values → persona → voice。"
      - brand_id: Slack-Brand-Guidelines
        chapter: ch-02
        excerpt: "把品牌定義轉成 logo、color、type、architecture 的操作系統；設計元素既是表達工具，也是法律可辨識資產，需有可回推的語義來源。"
    status: extracted

  - id: dp-persona-driven-voice
    title: 從產品行為與用戶語言抽取語氣，而非另造企業腔
    problem:
      statement: 平台／社群品牌若用一般企業口吻發聲，會顯得疏離、像公告，無法與用戶建立歸屬感。
      signals: [personality_expression, community, relatability, differentiation]
    solution:
      module: Voice and Tone
      move: 從產品行為與用戶實際語言抽取語氣，並把品牌人格寫成「理想同事」，讓文案像對使用者直接說話
      layer: language
    reason:
      - 品牌系統必須從產品行為抽取，而不是在產品外另造裝飾語言
      - 品牌人格應從公司文化向外翻譯，而不是廣告語任意創作
      - 人性化不等於過度隨便，尊重使用者時間是 voice 的核心
    applicable_when:
      industries: [tech_software, media_entertainment]
      brand_types: [challenger]
      conditions: [community_driven, product_led]
      archetypes: [brand_experience_guide, product_design_system]
    dependencies:
      requires: [Brand Strategy]
      enables: [Messaging, Content Design]
    anti_patterns:
      - 文案聽起來像一般科技平台公告
    evidence:
      - brand_id: Slack-Brand-Guidelines
        chapter: ch-01-02
        excerpt: "把品牌人格寫成『理想同事』是 B2B SaaS 可複用模式；人性化不等於過度隨便，尊重使用者時間是 voice 的核心。"
    status: extracted

  - id: dp-modular-manual-for-public-units
    title: 用「可辨識但不獨立」的層級框架治理多機構／多單位品牌
    problem:
      statement: 大型多機構、多單位組織，各單位都想要自己的識別，若無分層治理，品牌會裂解成互相競爭、削弱母品牌的子品牌。
      signals: [multi_unit_consistency, multi_entity, sub_unit_identity, brand_architecture_complexity]
    solution:
      module: Brand Architecture
      move: 以 master brand → offering/partner/department/team lockup 的層級把組織結構視覺化，讓差異可見但不獨立
      layer: governance
    reason:
      - 局部單位可以被識別，但不能競爭或替代母品牌
      - 品牌架構應讓差異可被看見，但不能削弱 master brand
    applicable_when:
      industries: [public_sector, education]
      brand_types: [institutional_public_trust, platform_ecosystem]
      conditions: [multi_unit_consistency, multi_entity]
      archetypes: [multi_brand_architecture, brand_experience_guide]
    dependencies:
      requires: [Brand Strategy, Visual Identity]
      enables: [Governance]
    anti_patterns:
      - 各單位自行創造分支品牌與專屬 tagline
    evidence:
      - brand_id: Slack-Brand-Guidelines
        chapter: ch-02-03
        excerpt: "品牌架構應讓差異可被看見，但不能削弱 master brand；以 master brand → offering/partner/department/team lockups 控制多種品牌關係。"
    status: extracted

  - id: dp-trademark-permission-flow
    title: 用授權閘門治理第三方商標使用，先處理混淆與背書風險
    problem:
      statement: 平台品牌被大量第三方使用商標與資產，若無授權流程，會造成商標混淆與誤導性背書風險。
      signals: [trademark_protection, partner_governance, endorsement_risk, third_party_usage]
    solution:
      module: Legal and Trademark
      move: 以「核准來源 + 允許情境 + 禁止改作 + permission gate」治理，並把 API affiliation 模糊度與 disclaimer 量化為可檢查規則
      layer: governance
    reason:
      - 平台品牌 guideline 應優先處理 trademark confusion 與 endorsement risk，再處理美學一致
      - 第三方 guideline 應把 visual imitation、API affiliation 與 merchandise 分開審核
      - 治理不是限制創意，而是防止使用者混淆與錯誤背書
    applicable_when:
      industries: [tech_software]
      brand_types: [platform_ecosystem]
      conditions: [third_party_usage, partner_governance]
      archetypes: [multi_brand_architecture, brand_experience_guide]
    dependencies:
      requires: [Legal and Trademark]
      enables: [Governance]
    anti_patterns:
      - 只給視覺規格而無使用情境風險表與審核材料清單
      - 放任第三方自行判斷法律與背書風險
    evidence:
      - brand_id: Slack-Brand-Guidelines
        chapter: ch-03-02
        excerpt: "把 API integration 的 affiliation ambiguity 寫入 brand guideline；third-party risk framework：visual imitation → asset framing → API ambiguity → disclaimer visibility → merchandise ban。"
      - brand_id: Slack-Brand-Guidelines
        chapter: ch-03
        excerpt: "治理不是限制創意，而是防止使用者混淆與錯誤背書；以 trademark notice、trade dress 與 API affiliation disclaimer 管理風險。"
    status: extracted
