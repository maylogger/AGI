patterns:
- name: 可複用模式是把 heritage 當成 contemporary refresh 的可信來源，而非懷舊裝飾。
  chapter: ch-01-01
  chapter_title: Brand strategy, values and heritage
- name: 可複用模式包括 simplified mark、extended palette、fixed relationship 與 flexible line-of-thought 溝通。
  chapter: ch-02
  chapter_title: Toolkit
- name: 可複用模式是以旅程節點作為 guideline 組織方式，確保 design system 對營運有用。
  chapter: ch-03
  chapter_title: Application
- name: 可複用模式是將 guideline 與資產庫連動，讓使用者在閱讀後可直接取得素材。
  chapter: ch-04
  chapter_title: Library
- name: 可複用模式是將 service values 轉成 writing principles，再用例句訓練一致語氣。
  chapter: ch-05
  chapter_title: 'Appendix A: Tone of voice'
- name: 可複用模式是使用案例庫承接複雜情境，尤其適合多地區、多供應商品牌。
  chapter: ch-06
  chapter_title: 'Appendix B: Examples'
