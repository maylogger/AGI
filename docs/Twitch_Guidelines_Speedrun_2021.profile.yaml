rules_ai_checkable:
- module: Brand Strategy
  criterion: AI 可檢查：品牌文案應避免只描述被動觀看；應出現共同參與、chat、streamers、community、moments 或 equivalent concepts；不得把 Twitch 語氣寫成過度正式、孤立或
    broadcast-only。
  chapter: ch-01
  chapter_title: Brand Narrative
- module: Visual Identity
  criterion: AI 可檢查：owned/internal 或 partnership context 優先 wordmark；outbound comms 且需最高表現力時使用 extruded wordmark；短距離或 icon-like
    reference 使用 Glitch；每種 logo 必須保留 clearspace，不得省略。
  chapter: ch-02
  chapter_title: Logos
- module: Visual Identity
  criterion: AI 可檢查：內部與合作 lockup 必須使用指定 spacing；文字高度應依 cap height/x-height 對齊；partner logo 不得侵入 Twitch logo clearspace；不得任意貼齊或不對齊中心線。
  chapter: ch-03
  chapter_title: Logo Lockups
- module: Color System
  criterion: AI 可檢查：digital 使用 RGB/HEX；IRL 優先 PMS；CMYK 為最後選項；core communications 僅使用核准色彩搭配。
  chapter: ch-04
  chapter_title: Color
- module: ''
  criterion: AI 可檢查：Twitch Purple HEX `#9146FF`；Black Ops HEX `#000000`；Ice HEX `#F0F0FF`；digital output 應使用 RGB/HEX 值。
  chapter: ch-04-01
  chapter_title: Core Palette
- module: ''
  criterion: AI 可檢查：secondary color 必須使用 guideline 中命名 token 與指定 HEX；不得自行新增未命名 accent；需避免讓 secondary color 取代 Twitch Purple
    的核心識別角色。
  chapter: ch-04-02
  chapter_title: Secondary Palette
- module: Visual Identity
  criterion: AI 可檢查：core communications 的 logo color pairing 必須屬於核准清單；不得任意將 logo 套用 secondary accent；solid background pairings
    需符合列出的 logo/background 組合。
  chapter: ch-04-03
  chapter_title: Logo Color Pairings
- module: Typography System
  criterion: AI 可檢查：主要字體應為 Roobert；常規內容優先 Regular/Medium/Bold/Semibold；Light/Heavy 只能用於 special instances；headline 範例為 Roobert
    SemiBold 80/80/-20，body 為 Roobert Medium 16/20/-10。
  chapter: ch-05
  chapter_title: Typography
- module: Layout System
  criterion: AI 可檢查：單一版面不得使用超過 3 種 type styles；headline/body placement 應維持清楚層級；repetition/crop 必須形成有意圖的 streaming effect，不得造成內容不可讀。
  chapter: ch-06
  chapter_title: Layout
- module: Voice and Tone
  criterion: AI 可檢查：社群與行銷內容可偏 Casual/Reassuring/Encouraging/Celebratory；產品指示應偏 Neutral；政策與道歉可偏 Firm 但不得 aggressive；幽默應 good-natured，不得攻擊使用者。
  chapter: ch-07
  chapter_title: The Twitch Voice
- module: ''
  criterion: AI 可檢查：不得使用 guideline 中示範照片於 public-facing communications；缺少 brand elements 或不確定規定時需聯絡 Twitch design team；使用照片前需確認
    copyright owner approval。
  chapter: ch-08
  chapter_title: Usage and Copyright Notes
