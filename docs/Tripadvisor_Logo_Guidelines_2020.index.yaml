title: "Tripadvisor Design System Logos"
source: "sources/Tripadvisor_Logo_Guidelines_2020.pdf"
date: "2020-01-17"
language: "en"
summary: "Tripadvisor 標誌系統規範，定義主要與次要 logo lockup、最小尺寸、背景情境與基本使用原則。"
chapters:
  - id: "ch-01"
    title: "Download"
    level: 1
    order: 1
    pages: "2"
    summary: "引導使用者下載核准的 Tripadvisor logo，並要求遵循本文件規範。"
  - id: "ch-02"
    title: "Primary Logo"
    level: 1
    order: 2
    pages: "3-17"
    summary: "展示主要 logo 的水平、垂直、小空間版本與 logo suite，並定義最小尺寸。"
    children:
      - id: "ch-02-01"
        title: "Primary Horizontal Lockup"
        level: 2
        order: 1
        pages: "6-8"
        summary: "定義主要水平 lockup 的版式與留白示意。"
      - id: "ch-02-02"
        title: "Primary Vertical Lockup"
        level: 2
        order: 2
        pages: "9-11"
        summary: "定義主要垂直 lockup 的版式與比例示意。"
      - id: "ch-02-03"
        title: "Small Space Vertical Lockup"
        level: 2
        order: 3
        pages: "12-14"
        summary: "提供受限空間下的垂直 lockup 版本。"
      - id: "ch-02-04"
        title: "Primary Logo Suite and Minimum Scale"
        level: 2
        order: 4
        pages: "15-17"
        summary: "彙整主要 logo 套件並列出 Ollie、水平與垂直 lockup 的最小像素高度。"
  - id: "ch-03"
    title: "Secondary Logos"
    level: 1
    order: 3
    pages: "18-34"
    summary: "定義在留白或淺色背景無法成立時使用的次要 logo 系統，以及淺色、深色背景與最小尺寸。"
    children:
      - id: "ch-03-01"
        title: "Secondary Logo Rationale"
        level: 2
        order: 1
        pages: "18-20"
        summary: "說明 Ollie 置於圓形中的次要 logo 用途，並限制描邊版本不可與 wordmark lockup。"
      - id: "ch-03-02"
        title: "Secondary Horizontal and Vertical Lockups"
        level: 2
        order: 2
        pages: "21-29"
        summary: "展示次要水平、垂直與 limited-space lockup 的配置。"
      - id: "ch-03-03"
        title: "Secondary Logo Suite and Minimum Scale"
        level: 2
        order: 3
        pages: "30-34"
        summary: "彙整淺色與深色背景版本，並定義次要 logo 最小像素高度。"
  - id: "ch-04"
    title: "Logo Usage"
    level: 1
    order: 4
    pages: "35-36"
    summary: "規定 logo 理想上應以黑色用於淺色品牌色或清楚背景上。"
