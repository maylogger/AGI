rules_ai_checkable:
- module: Brand Strategy
  criterion: 可檢查規則：對外訊息應能對應 Build/Innovate/Grow 之一；不得只描述功能而不說明商家利益；2020 新素材需反映 imagery/video/slides/partners 更新。
  chapter: ch-01
  chapter_title: Our Brand and Messaging Framework
- module: Visual Identity
  criterion: '可檢查規則：B mark 只在 wordmark 低於 80px/1in 或避免重複時使用；clearspace 至少為各自高度 Y/2；不得拉伸、堆疊、改色、加陰影或修改兩個 mark；partner divider
    stroke 為 #AFB4BE 1.5px。'
  chapter: ch-02
  chapter_title: Our Logo
- module: Color System
  criterion: '可檢查規則：核心 palette 應使用 #121118、#FFFFFF、#0D52FF 等核准值；purple/green 為主要 accent 且應節制；pink 為 tertiary；Twilight/Northern
    Lights 等漸層需保留 middle color-stops 防止 banding。'
  chapter: ch-03
  chapter_title: Color Palette
- module: Typography System
  criterion: '可檢查規則：Gotham 為主要字體；Source Sans Pro 只在 Gotham 不可用如 product/Google Docs 時使用；H1 highlight 使用 #03EADA 且只強調單字或單行；highlight
    位置約在 x-height 一半並向右偏移約半個字寬。'
  chapter: ch-04
  chapter_title: Typography
- module: ''
  criterion: 可檢查規則：stroked pattern square 尺寸約 15px 至 115px；文字疊在 intricate pattern 上需高對比、大而粗；bold pattern 背景與形狀漸層整體對比應較低；不得讓
    pattern 與前景 copy 競爭。
  chapter: ch-05
  chapter_title: Geometry and Patterns
- module: ''
  criterion: 可檢查規則：影像應有人、互動或商務成果；不得只呈現無脈絡科技抽象圖；商家圖像應服務 growth/versatility 敘事；人物照應反映 bright modern creative spaces。
  chapter: ch-06
  chapter_title: Photography
- module: Iconography System
  criterion: 可檢查規則：icon 風格應符合所屬場景；資料圖不得濫用 accent 色；圖表需有清楚標籤與對比；不可用裝飾圖形模糊數值。
  chapter: ch-07
  chapter_title: Iconography and Data Visualization
- module: Brand Strategy
  criterion: 可檢查規則：數位/影片/簡報需使用核准 logo、色彩、字體與圖像風格；partner 素材需使用標準化 partnership system；BigCommerce Essentials 與 extensions 不得建立無關主品牌的新視覺語言。
  chapter: ch-08
  chapter_title: Digital, Media, and Brand Extensions
