rules_ai_checkable:
- module: Visual Identity
  criterion: logo 只可使用 Creative team supplied files；不得改動；發布前需送審；print 最小 30mm wide、screen 最小 150px wide；logo clear space 以
    page height/8 或 landscape/square page height/6 計算，minimum clear space 為 M 高度兩倍。
  chapter: ch-02
  chapter_title: Our Logos
- module: Visual Identity
  criterion: Double royal poster logo 210mm、A4 70mm、A5 55mm、DL 45mm；light background 用 grey，dark background 用 white；不要使用 GLA
    logo 推廣 Mayor's work。
  chapter: ch-02-01
  chapter_title: Logo Space, Size and Options
- module: ''
  criterion: partner logo 需與 Mayor logo 成比例且保留 clear space；sponsor logos 不得大於 Mayor of London logo 的 1/3；sponsor logos 置於
    artwork bottom under content，並沿 vertical centres 對齊。
  chapter: ch-02-02
  chapter_title: Partners, Supporters and Sponsors
- module: ''
  criterion: 線上工作至少符合 WCAG 2.1 AA；不得使用未列出的 accessible colour combinations；印刷最小字級 12pt/15pt leading；digital aim 18pt or above；icon
    80px square、1.5pt line weight。
  chapter: ch-03
  chapter_title: Core Visual and Content Tools
- module: ''
  criterion: PDF 應 single page export、tag every item、check logical reading order、include alt copy、確保 references/footnotes
    可讀；線上材料至少 WCAG 2.1 AA。
  chapter: ch-03-01
  chapter_title: Accessibility
- module: Voice and Tone
  criterion: 外包需確認 Aktiv Grotesk license；minimum print type 12pt/15pt leading；文案應 simple、easy to understand、no jargon、get
    to the point immediately。
  chapter: ch-03-02
  chapter_title: Fonts and Tone of Voice
- module: Iconography System
  criterion: icons 必須 relevant 且 easy to understand；所有 icons 以 80px square、1.5pt line weight 建立；illustration 只在 appropriate
    情境使用。
  chapter: ch-03-03
  chapter_title: Illustration, Iconography and Website
- module: ''
  criterion: 印刷報價需經 CDS；PDF for print 使用 PDF/X-1a:2001；需含 crop marks and bleed；標準 stock 為 Revive 100 Offset uncoated；spine
    = No. of pages x paper weight / 2000。
  chapter: ch-04
  chapter_title: Printed Material
- module: ''
  criterion: 不得使用 previous administration pre-May 2016 images；Mayor 照片需 active and engaging 且 staff/political figures out
    of shot；個人或群體成為焦點時需先簽 consent；提交影像需標 title、photographer、date、description、attendees、location/borough。
  chapter: ch-05
  chapter_title: Photography
- module: ''
  criterion: 影像應呈現 recognisable、real、diverse London；不得使用不代表 real Londoners 或看起來 staged 的照片。
  chapter: ch-05-01
  chapter_title: Photography Principles and Vetting
- module: ''
  criterion: Mayor 應在 real and relatable environments 中互動；approved photos 不應跨 policy areas/campaigns 重複；location photography
    必須 relevant 且 support the story；avoid scenes without people。
  chapter: ch-05-02
  chapter_title: Mayor, Case Studies, Events and Locations
- module: ''
  criterion: focus individual/group must sign consent before shoot；images submitted must include title、photographer、date、description、attendees、location
    including borough；拍攝 Mayor speech/event 時需包含觀眾多元與反應。
  chapter: ch-05-03
  chapter_title: Social Shotlist, Consent and Image Library
- module: ''
  criterion: video frame panel 可為 85% wide/25% square height 或 base panel 1/3 tile height；minimum type size 37.5pt；leaflet
    main body max 60 words；supporter logos 通常為 MoL logo 寬度 1/3；event branding artwork 需 high-res print-ready PDF、Pantone references、crop
    marks/bleed、fonts outlined。
  chapter: ch-06
  chapter_title: Templates
