rules_ai_checkable:
- module: Brand Strategy
  criterion: 不得拆除任何一層字母；不得改變字距、比例或透明度；不得讓單一語言層支配另一層。
  chapter: ch-02-01
  chapter_title: Brand Anatomy
- module: Typography System
  criterion: Calibri 僅用於 emails、official letters、presentations；Brush Script 僅用於 social media；print / digital 字體需按指定語言使用。
  chapter: ch-03
  chapter_title: Typography
- module: ''
  criterion: 使用色彩需符合該子品牌 palette；不得將 Dubai Calendar 的紅黃橘系任意套用於 Business Events；色票需使用列出的 Hex / Pantone / CMYK / RGB。
  chapter: ch-04
  chapter_title: Colour Palettes
- module: Brand Strategy
  criterion: 排除區不得小於 1 daal；logo 對齊應以 baseline 而非底部 dots；最小寬度 20mm；不得改字距、缺漏元素、改透明度、模糊、變形、加效果、italicise 或未經批准用色。
  chapter: ch-05
  chapter_title: Brand Usage
- module: ''
  criterion: 直式頁 brandmark 等於頁寬 1/4，橫式頁等於 1/6；透明 box 最低 70%；圖上使用白 logo；box 不得低於 70% opacity 或貼邊。
  chapter: ch-06
  chapter_title: Applications
- module: Iconography System
  criterion: 自製 icon 需有以曲線結尾的 gap；攝影與影片 briefing 至少標示 people、places、detail 其中一項，完整故事可由同一拍攝的多張照片組合。
  chapter: ch-07
  chapter_title: Iconography and Visual Content
- module: Voice and Tone
  criterion: 文案應 cheerful、approachable、knowledgeable；不得過度高聲、排他、過熟、傲慢或冷漠。
  chapter: ch-08
  chapter_title: Tone of Voice
- module: ''
  criterion: partner 必須是 Dubai flag bearer 或有合作 / MOU；endorsement 不得對 Brand Dubai equity 造成重大負面風險；partner 通訊只能用 brandmark，不得使用其他
    visual language。
  chapter: ch-09
  chapter_title: Events, Merchandise and Partnerships
- module: ''
  criterion: Marks 不得商業使用、不得商品化、不得廣告使用、不得貶損、不得政治敏感、不得暗示 endorsement、不得裁切修改；使用需加 attribution statement。
  chapter: ch-10
  chapter_title: Terms of Use
