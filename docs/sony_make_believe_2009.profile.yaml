rules_ai_checkable:
- module: ''
  criterion: AI 可檢查：make.believe 相關材料應指向 imagine/make real、technology/content integration 或 Sony unity；不得把它當一般裝飾文字或孤立 campaign
    slogan。
  chapter: ch-01
  chapter_title: The Meaning of make.believe
- module: ''
  criterion: AI 可檢查：若屬 Electronics & Networked Services 或 Entertainment 的 marketing/corporate communication，composite logo
    應為 mandatory；content products/packaging/start-up screen 依表格為 recommended；hardware/application software 不得任意使用。
  chapter: ch-02
  chapter_title: Application of make.believe
- module: Visual Identity
  criterion: AI 可檢查：不得 stretch、outline、3D/drop shadow、arc、angle、condense、italicize、改字距、改字體、垂直排字、與其他 logo/元素合成或改變 Sony 與 make.believe
    間距。
  chapter: ch-03
  chapter_title: Usage of the Composite Logo
- module: Visual Identity
  criterion: AI 可檢查：print composite logo 置於 top left；website header 左側顯示；header 黑底，logo 白色；header 高度需符規定範；utility area 只放
    make.believe related elements；accent color 約 <=10%；不得改 header 高度、漸層、加入其他 logo/graphics。
  chapter: ch-04
  chapter_title: Using the Composite Logo in Print Media and Websites
- module: Visual Identity
  criterion: AI 可檢查：motion logo 僅使用官方 1.5/3/5 秒版本；digital media 可用三種版本；不得自行重製 dual element 或變更藍黃光點火效果。
  chapter: ch-05
  chapter_title: make.believe Motion Logo
- module: ''
  criterion: AI 可檢查：make.believe 原則上英文使用；僅列明國家/語言可用翻譯；第三方不得分發；修訂/廢止需 Sony CEO approval；適用期間 2009-09 至 2014-08。
  chapter: ch-06
  chapter_title: Other Important Information
