rules_ai_checkable:
- module: Brand Strategy
  criterion: AI 可檢查：任何品牌輸出應能對應到 `We Believe in Brave`；文件應同時包含 positioning 與 visual communication rationale；不得把 guideline 描述為僅限版型公式。
  chapter: ch-01
  chapter_title: Brand Overview
- module: Brand Strategy
  criterion: AI 可檢查：文案需能被標記為 confident/clear；不得使用未解釋 acronyms；強論點不得埋在長文後段；每個 communication 必須說出正向故事。
  chapter: ch-02
  chapter_title: Brand Positioning
- module: ''
  criterion: AI 可檢查：輸出應至少對應一項人格；不得傳達保守、孤立、被動或只服務內部流程的訊息。
  chapter: ch-02-04
  chapter_title: Personality
- module: Brand Strategy
  criterion: AI 可檢查：標誌不可變形、重繪、改色；色彩必須來自 palette；字體限 Futura PT/Arial fallback；影像需自然、動態、非 staged。
  chapter: ch-03
  chapter_title: Brand Toolkit
- module: Brand Strategy
  criterion: AI 可檢查：不得 stretch/distort/recreate；不得使用未核准 sub-brand lockup；clear space 至少等於 U 符號厚段寬，例外最多降到一半；print minimum 25mm，digital
    minimum 95px。
  chapter: ch-03-01
  chapter_title: Brandmark
