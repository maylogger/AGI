rules_ai_checkable:
- module: Visual Identity
  criterion: AI 可檢查：logo 應使用核准 full-color、one-color reversed 或 one-color black 版本；不得擅自從 logo 萃取 Nexus 作為獨立圖形裝置。
  chapter: ch-01
  chapter_title: The Logo
- module: Visual Identity
  criterion: AI 可檢查：不得改色、扭曲、加效果、縮放內部元素、使用非核准色、改變 logo arrangement；co-branding 必須 logo 等重、保留 exclusion zones；所有第三方 co-branding
    需 MSCI Marketing 核准。
  chapter: ch-02
  chapter_title: Logo Usage
- module: ''
  criterion: AI 可檢查：logo 周圍需保留 inner square 尺寸 clear space；不得使用 Nexus 作 diagram graphic device，favicon 例外；若需新版本應聯絡 Brand &
    Design Team。
  chapter: ch-02-01
  chapter_title: Clear Space and Misuse
- module: Visual Identity
  criterion: AI 可檢查：MSCI 與 partner logo 需視覺等重；兩者間距不得小於指定 exclusion zone；需使用 partner logo 版本；所有第三方 co-branding 須核准。
  chapter: ch-02-02
  chapter_title: Third Party and Partner Logo
- module: Color System
  criterion: AI 可檢查：使用色彩應引用指定 HEX/RGB/CMYK/Pantone；非大字文字需符合暗底/亮底建議色組；logo 背景應依表格選擇 full-color 或 white version；不得用未列色值替代。
  chapter: ch-04
  chapter_title: Color
- module: ''
  criterion: AI 可檢查：pattern 應用應維持全球連結語義；不得把 Nexus 獨立作 diagram device；pattern 不應干擾可讀性或 logo clear space。
  chapter: ch-05
  chapter_title: Graphic Accents
- module: Iconography System
  criterion: AI 可檢查：不得自行創建 icon 或使用網路 icon；新 icon 需 solid 與 outline 版；wide icon 最大寬 91 px、高 73 px；digital platform icon 使用
    16 x 16 px artboard；16 px icon 不含文字；outline stroke 1.3 pt 並 convert to path。
  chapter: ch-06
  chapter_title: Iconography
- module: ''
  criterion: AI 可檢查：page title 50-55 字元且 title case、無特殊字元；meta description 最多 250 字元；每頁僅一個 H1；body line length 40-55 characters；hero
    image 約 200KB、body image 約 100KB；decorative image alt 為空；所有 video 有 captions 與 transcript；不得使用 animated GIFs。
  chapter: ch-07
  chapter_title: Best Practices for User Experience (UX)
- module: ''
  criterion: AI 可檢查：teaser/sizzle/preview 不超過 30 秒；promos/demos/marketing material 通常不超過 3 分鐘且更接近 1 分鐘；影片需 captions 且不可 burn-in；web
    影片需 transcript；背景音樂需 licensed/royalty-free；系列影片需一致 intro/outro、長度與語氣。
  chapter: ch-08
  chapter_title: Videography
- module: ''
  criterion: AI 可檢查：拍攝受訪者時建議兩機位；key light 約在攝影機 45 度；lapel mic 應隱藏；請受訪者帶額外服裝避免 moire 或背景融合；corporate video 偏好 diffuse light；voiceover
    應清晰且考慮多元代表性。
  chapter: ch-08-01
  chapter_title: Corporate Video Production
- module: Motion Identity
  criterion: AI 可檢查：60 秒動畫腳本約 140 words；Attract 內容約 10 秒，thought-leadership 約 30 秒，explainer/tutorial/case study 約 60 秒，close
    階段 tutorial/culture/testimonial 可 2 分鐘以上；社群動畫需短且視覺獨特。
  chapter: ch-08-02
  chapter_title: Animation and Motion Graphics
