patterns:
- name: 以 logo 內部幾何元素作為所有比例量測基準，是可跨尺寸複用的 identity pattern。
  chapter: ch-01
  chapter_title: FirstBank Logo System
- name: 跨市場 guideline 應以例外表管理 localization，而不是讓在地團隊自行詮釋。
  chapter: ch-02
  chapter_title: SSA Market and Social Media Logo Usage
- name: 以 transition governance 管理品牌債務：不改既有名稱，但統一未來規則與 logo 視覺。
  chapter: ch-03
  chapter_title: Product and Service Brand Architecture
- name: 把語氣拆成內部態度與外部文案規則，可支援文案審核。
  chapter: ch-04
  chapter_title: Tone of Voice
- name: tint ladder 讓同一色彩可在資訊層級與背景深淺中延展。
  chapter: ch-05
  chapter_title: Colour Wheel and Endorser
- name: 將廣告版面轉成 modular grid 是跨媒體可複用的 layout governance。
  chapter: ch-06
  chapter_title: Press Advert and Editorial Templates
- name: 用形容詞 cue 加上技術性構圖規則，讓影像審核兼具情緒與可操作性。
  chapter: ch-07
  chapter_title: Photography and Illustration Style
- name: 把品牌規範寫成生產規格，是 design system 從畫面延伸到 supply chain 的模式。
  chapter: ch-08
  chapter_title: Printed and Merchandise Applications
- name: safe area 與 rendered area 是所有 digital guideline 可複用的基礎模式。
  chapter: ch-09
  chapter_title: Digital Applications
- name: 把 signage 依場景分類，比單一 master template 更能處理尺度差異。
  chapter: ch-10
  chapter_title: Signage and Mobile Truck
rules_ai_checkable:
- module: Visual Identity
  criterion: AI 可檢查：clear zone 必須以 Dynamic Square 高度/矩形量測；horizontal lockup dynamic square 不得低於 4 mm，stacked 不得低於 6 mm；不得
    redraw、recreate、translate、recolor、drop shadow、改字體、壓縮、伸展或改變 dynamic shape。
  chapter: ch-01
  chapter_title: FirstBank Logo System
- module: Visual Identity
  criterion: AI 可檢查：DRC Congo 只用 Dynamic Shape 與 Vous d’abord lockup；English speaking countries 使用 You First and FBNBank lockup
    except Ghana；社群 profile 可使用 name appellations 以利識別。
  chapter: ch-02
  chapter_title: SSA Market and Social Media Logo Usage
- module: Brand Strategy
  criterion: AI 可檢查：未來產品名稱應為 DESCRIPTOR + FIRST；FIRST 必須使用 corporate identity font；產品 logo 應採 Blue PMS 295C 與 Gold PMS 124C；agency
    應追求約 70/30 balance；divider 不得整組拉伸，應分別調整 bar 長度。
  chapter: ch-03
  chapter_title: Product and Service Brand Architecture
- module: ''
  criterion: AI 可檢查：tabloid splash 應有 8mm blue border；頁面應分成 4 high x 2 wide 的 8 格；格間距 1mm；top left 與 bottom two rectangles
    不應放圖片，應保留給品牌與文字元素。
  chapter: ch-06
  chapter_title: Press Advert and Editorial Templates
- module: ''
  criterion: AI 可檢查：人物照片主焦點應為 face/shoulders/chest；不可像 passport photograph；影像應 natural、uncluttered、real、simple、aspirational、honest、accessible、warm；構圖應
    simple, clean, straight talking, not posed。
  chapter: ch-07
  chapter_title: Photography and Illustration Style
- module: ''
  criterion: AI 可檢查：cap color 應為 Pantone 295 C；cap 正面應為 raised embroidered logo；特定品牌語句需維持順序與大小寫；印刷素材需使用指定 Pantone/CMYK。
  chapter: ch-08
  chapter_title: Printed and Merchandise Applications
- module: ''
  criterion: AI 可檢查：web banner 應依指定 1200 x 400px canvas 與 871 x 299px rendered area；資訊應置於可渲染範圍內；email signature/HTML template
    不得任意改變 logo 與聯絡資訊層級。
  chapter: ch-09
  chapter_title: Digital Applications
- module: ''
  criterion: AI 可檢查：ATM directional sign 應清楚表達方向；branch signage 必須保持 logo clear zone 與主色；mobile truck 不得使用與品牌無關的大面積圖形。
  chapter: ch-10
  chapter_title: Signage and Mobile Truck
