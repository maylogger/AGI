rules_ai_checkable:
- module: Brand Strategy
  criterion: AI 可檢查：logo clearance 至少使用 H 高度作單位；色彩不得從螢幕或列印稿視覺匹配；必須使用 Pantone/CMYK 參照。
  chapter: ch-01
  chapter_title: Core Branding
- module: Visual Identity
  criterion: AI 可檢查：Harrods logo 需依 optical centre 置中；clearance zone 至少等於 H 高；不得低於指定 print minimum。
  chapter: ch-01-01
  chapter_title: Logo Options and Rules
- module: ''
  criterion: AI 可檢查：Harrods Green、black、gold/silver foil、sale red 不得任意替換；需查指定色值或 Pantone。
  chapter: ch-01-02
  chapter_title: Colour Palette
- module: Typography System
  criterion: AI 可檢查：Big Caslon 不得小於 20pt；web/telephone in logo 需以 JPEG artwork 出現，不得手打；PC 溝通使用 Arial/Times New Roman。
  chapter: ch-02
  chapter_title: Typography
- module: ''
  criterion: AI 可檢查：新作品應用 Caslon Egyptian；Big Caslon FB 只用於 headlines/subheadlines 或指定用途；Caslon Pro Swash 需 brand guardian
    approval。
  chapter: ch-02-01
  chapter_title: Primary and Migration Fonts
- module: ''
  criterion: 'AI 可檢查：email main copy/header 使用 #333333；links 使用 #000000；T&Cs 使用 #999999；pre-header 使用 #666666。'
  chapter: ch-02-02
  chapter_title: PC and Digital Fonts
- module: ''
  criterion: AI 可檢查：避免 cheap、low-cost、bargain、hard-sell、business-speak、overused cliches；avoid commanding unless words like
    Discover/Enjoy are welcoming。
  chapter: ch-03
  chapter_title: Harrods Style Guide
- module: Voice and Tone
  criterion: AI 可檢查：不得過度使用 luxury/luxurious 作描述詞；unique 僅限真正 distinctive/incomparable；開頭應避免「Harrods is now stocking」類平庸句。
  chapter: ch-03-01
  chapter_title: Tone of Voice
- module: ''
  criterion: AI 可檢查：Harrods.com 寫作 `harrods.com` 且無 `www`；Harrods 為單數；數字 1-9 拼字、10+ 用數字；£750 不寫 £750.00；percentage in text
    寫 `per cent`；web URL 無句號。
  chapter: ch-03-02
  chapter_title: House Style A-Z
- module: Brand Strategy
  criterion: AI 可檢查：co-branded collateral 不得出現第三方 web addresses；terms 必須按 Style Guide 且經 Legal；素材需送 Brand Guardians approval。
  chapter: ch-04
  chapter_title: Co-branding
- module: Brand Strategy
  criterion: AI 可檢查：predominantly white/light collateral 使用 black band；dark/black background 使用 white band；Rewards card band
    只用於 Rewards card holders direct communication。
  chapter: ch-04-01
  chapter_title: Essentials and Brand Band
- module: ''
  criterion: AI 可檢查：brand email content width = 640px；copy 不得疊在圖片上；除 harrods.com 外不得含外部連結；approval 至少提前五天。
  chapter: ch-04-02
  chapter_title: Applications and Approval
