rules_ai_checkable:
- module: ''
  criterion: wordmark 只用黑或白，不得與 Golden Arches lock up；tagline 不得與 Golden Arches 或 Token lock up；Golden Arches clearspace 為
    arch leg 寬度 2x，minimum height print 4mm、digital 15px；Token minimum print 6mm、digital 25px，置於 layout corner，偏好 bottom left
    或 top right；不得使用非 Gold 的 Golden Arches，不得用作 letterform 或加 drop shadow。
  chapter: ch-02
  chapter_title: The Golden Arches Cheatsheet
- module: ''
  criterion: 只使用 provided cropped artwork；極端裁切使 Arches 不明顯時，out-of-home 必須用 Golden Arches mark 或 Token 強化；alternative crops
    in photography 需 Global Brand team approval；不得 alter Golden Arches；Archery 不得只是 decoration。
  chapter: ch-03
  chapter_title: Archery Cheatsheet
- module: Color System
  criterion: Gold Hex FFBC0D，Red Hex DB0007；Black 不再是 masterbrand core colour，只用於 type；不得使用新 visual identity palette 外的色彩；Charcoal、light
    gray、kraft 保留給 internal communications 或部分 illustration elements。
  chapter: ch-04
  chapter_title: Brand Color Cheatsheet
- module: ''
  criterion: 使用餐廳實際用材質作 props；使用 Perfect Serve packaging；food staged on wrapper, not directly on a surface；不得用 wood、metal
    等不符合品牌真實性的 props/materials。
  chapter: ch-06
  chapter_title: Food Photography Cheatsheet
- module: ''
  criterion: casting 應 diverse、lighthearted、optimistic；scenario 應 spontaneous、in-the-moment、positive、uplifting；lighting 應
    golden/natural；product and idealized packaging must be delicious and unmistakable。
  chapter: ch-07
  chapter_title: Lifestyle Photography Cheatsheet
- module: ''
  criterion: 不得改 Playful Pattern colors；避免與 photography 一起使用；避免重複 Jumble；避免縮放過大或過小；Playful Patterns 需 Global Brand team approval；只使用
    provided product illustrations，新增插畫需 Global Brand approval。
  chapter: ch-08
  chapter_title: Playful Patterns and Product Illustrations Cheatsheet
