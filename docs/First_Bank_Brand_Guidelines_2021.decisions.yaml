# L3 決策卡 sidecar — First Bank Brand Guidelines 2021
# schema：research/schemas/decision_pattern.schema.yaml
# 由 note.md 反向工程萃取；strict evidence 連回本檔 index.yaml 章節。

brand_id: First_Bank_Brand_Guidelines_2021
decisions:
  - id: dp-clearspace-from-logo-geometry
    title: 用標誌自身幾何定義留白，讓 spacing 隨縮放成立
    problem:
      statement: 用固定像素定義 clear space，在不同尺寸與媒介會失效。
      signals: [scaling_inconsistency, multi_media]
    solution:
      module: Visual Identity
      move: 以標誌幾何（logo height）作為相對留白與尺寸基準
      layer: visual_core
    reason:
      - 版面一致性來自比例關係，不只是絕對尺寸
      - 留白以標誌自身元素為單位，可隨縮放維持比例
    applicable_when:
      conditions: [multi_media]
      archetypes: [brand_experience_guide, full_brand_system, logo_asset_guidelines]
    dependencies:
      requires: [Visual Identity]
    evidence:
      - brand_id: First_Bank_Brand_Guidelines_2021
        chapter: ch-02-01
        excerpt: "clear space 至少等於 logo 中 F 的寬高，logo 最小寬度不得低於 55 px 或 0.76 in；以字母單位量測 clear space 是可移植模式，可讓 logo 隨尺寸等比例保護。"
    status: extracted

  - id: dp-modular-manual-for-public-units
    title: 用「可辨識但不獨立」的層級框架治理多機構／多單位品牌
    problem:
      statement: 大型多機構、多單位組織，各單位都想要自己的識別，若無分層治理，品牌會裂解成互相競爭、削弱母品牌的子品牌。
      signals: [multi_unit_consistency, multi_entity, sub_unit_identity, brand_architecture_complexity]
    solution:
      module: Brand Architecture
      move: 先建立「誰在說話」的判斷層，再以 umbrella → member → VPU/GP → lockup → special case 的層級把組織結構視覺化
      layer: governance
    reason:
      - 局部單位可以被識別，但不能競爭或替代母品牌
      - 企業品牌可用有限例外管理 portfolio complexity
      - 以 approved lockup library 管理子業務，而不是建立自由子品牌系統
    applicable_when:
      industries: [public_sector, education, finance]
      brand_types: [institutional_public_trust, platform_ecosystem]
      conditions: [multi_unit_consistency, multi_entity]
      archetypes: [multi_brand_architecture, brand_experience_guide]
    dependencies:
      requires: [Brand Strategy, Visual Identity]
      enables: [Governance]
    anti_patterns:
      - 各單位自行創造分支品牌與專屬 tagline
      - 只列 logo 圖檔卻不給「何時用 umbrella、何時用單一機構」的判斷規則
    evidence:
      - brand_id: First_Bank_Brand_Guidelines_2021
        chapter: ch-02-02
        excerpt: "Mortgage Services、Wealth Management、Private Banking 以 endorsed identity、controlled differentiation、master brand priority 使用核准 lockup；非核准業務不得自行建立 lockup，以有限例外管理 portfolio complexity。"
    status: extracted

  - id: dp-media-split-typography
    title: 依媒介分流字體系統（print / digital / body）
    problem:
      statement: 同一字體在印刷與數位、標題與內文的需求不同，混用會犧牲可讀性或授權合規。
      signals: [print_and_digital, readability, licensing]
    solution:
      module: Typography System
      move: 區分 print font、digital font 與 secondary/body font，並各自規範字級與行距
      layer: visual_core
    reason:
      - 不同媒介的可讀性與授權條件不同
      - typography guideline 應把 font choice 轉成 content role mapping
    applicable_when:
      industries: [finance, public_sector, education]
      conditions: [print_and_digital]
      archetypes: [brand_experience_guide]
    dependencies:
      requires: [Typography System]
      enables: []
    evidence:
      - brand_id: First_Bank_Brand_Guidelines_2021
        chapter: ch-07
        excerpt: "Print 使用 Avenir Black/Light、Web 使用 Montserrat Extra Bold/Bold/Semibold/Regular，並依 headline、subhead、body、CTA、button 角色分工；字體選擇依媒介與內容角色決定。"
    status: extracted
