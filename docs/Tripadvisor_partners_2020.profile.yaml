rules_ai_checkable:
- module: ''
  criterion: AI 可檢查：任何含 Tripadvisor branding/content 的 advertising 或 marketing materials 必須標記為需 Tripadvisor 審核；缺少 approval
    metadata 時不可發布；素材應送交 account manager。
  chapter: ch-01
  chapter_title: Intro
- module: ''
  criterion: AI 可檢查：不得從 Web 抓取品牌資產；Tripadvisor 名稱 T 大寫、a 小寫且無空格；TripGreen 為 `#34E0A1`；Trip Sans 不可用時依序使用 Poppins/Roboto，再退回
    Helvetica/Courier。
  chapter: ch-02
  chapter_title: Visual Identity
- module: Visual Identity
  criterion: AI 可檢查：primary horizontal/Ollie >= 20px high；primary vertical >= 37px 或 50px high；secondary logo/horizontal >=
    35px high；secondary vertical >= 52px；small-space secondary vertical >= 69px。
  chapter: ch-02-01
  chapter_title: Primary and Secondary Logo Suite
- module: ''
  criterion: AI 可檢查：logo 四周 clearspace >= 1 pupil width；symbol-only 必須同頁已有 primary logo 或 Tripadvisor 名稱；不得在無 attribution
    的位置只放 Ollie。
  chapter: ch-02-02
  chapter_title: Minimum Clearspace and Symbol
- module: ''
  criterion: AI 可檢查：Tripadvisor logo 與合作方元素距離 >= 1 pupil width；不得改變 Tripadvisor logo 內部比例；水平與垂直 lockup 必須使用核准模板。
  chapter: ch-02-03
  chapter_title: Partnership Lockups
- module: Visual Identity
  criterion: AI 可檢查：不得 fragment/crop/bleed logo；不得 tilt/rotate；不得加 outlines/drop shadows；不得改 typeface；不得 invert logo；不得拆開
    logo；不得黑色 logo 置於深色品牌色；不得放在 busy backgrounds；不得使用非 Tripadvisor 提供資產。
  chapter: ch-02-04
  chapter_title: Logo Usage and Don'ts
- module: Visual Identity
  criterion: AI 可檢查：print width >= 0.5in/13mm；web width >= 50px；clearspace >= logo height 的 1/4；US-English 用 Travelers'，其他市場用
    Travellers'，日本與中國使用各自 localized version；不得 invert 或 pull apart。
  chapter: ch-02-05
  chapter_title: Travelers' Choice Logos
- module: Color System
  criterion: AI 可檢查：必須寫作 `Tripadvisor`，T 大寫、a 小寫、無空格；TripGreen `#34E0A1`；Sand `#FAF1ED`；Black `#000000`；White `#FFFFFF`；Trip
    Sans 不可用時用 Poppins/Roboto，再用 Helvetica/Courier。
  chapter: ch-02-06
  chapter_title: Proper Name, Color Palette, Typography
- module: ''
  criterion: AI 可檢查：引用評論需加引號、日期、Tripadvisor traveler attribution；不得編造評論；不得把一地評論用於另一地；不得把行銷文案放進引號假裝評論；ranking 必須標示月份年份或日期。
  chapter: ch-03
  chapter_title: Ratings and Reviews
- module: ''
  criterion: AI 可檢查：aggregate bubble 必須同頁出現 primary Tripadvisor logo 或 “Tripadvisor”；individual review bubble 必須以 “A Tripadvisor
    traveler review” 等語句明示來源；不得只放 bubble 而無語義標註。
  chapter: ch-03-01
  chapter_title: Bubbles
- module: ''
  criterion: AI 可檢查：review quote 必須有 quotation marks、review date、Tripadvisor traveler attribution；5-bubble rave review 需整體
    property rating >= 4/5，且若使用 don'ts 條件中的 rave claim，需近 6 個月 5-bubble review、overall >= 4、good standing；不得編輯到誤導、不得跨 property
    使用、不得 invent review、不得以 headline 偽裝 review、不得讓 content/bubble 疊在照片上。
  chapter: ch-03-02
  chapter_title: Ratings & Reviews Dos and Don'ts
- module: ''
  criterion: AI 可檢查：rating 旁需有 “Tripadvisor Traveler Rating” 與 review count；空間不足時需有 logo 且每個 rating rollover 顯示 “Tripadvisor
    Traveler Rating”；aggregate bubble 左側需有 Tripadvisor owl；owl >= 20px high；bubble graphic >= 55px wide；bubble 為 standard
    Tripadvisor green 且白底。
  chapter: ch-03-03
  chapter_title: Traveler Rating Text and Image
- module: ''
  criterion: AI 可檢查：任何 “#1” 或 popularity ranking claim 必須包含 as-of month/year；除 API 動態 banner 外，bubble ratings、rankings、number
    of reviews 均需附 date，如 “as of 16 Mar, 2020”。
  chapter: ch-03-04
  chapter_title: Tripadvisor Ranking
- module: ''
  criterion: AI 可檢查：Tripadvisor logos 與 rating bubbles 不得由 partner local hosting；campaign 必須有 Tripadvisor tracking pixel 或完成後
    CTR/impressions report；所有 content use 必須 final approval。
  chapter: ch-04
  chapter_title: Additional Information
