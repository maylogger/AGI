rules_ai_checkable:
- module: Brand Strategy
  criterion: AI 可檢查 claims 是否符合 durability class 1、stable、sustainable、reliable、tested/proven 等關鍵屬性。
  chapter: ch-02-02
  chapter_title: Our Brand Personality
- module: ''
  criterion: 可檢查規則包含 Green Tab 不可 free standing、必須 edge bleed、Accoya® 全文附 ®、認證只在公司 certified 時使用。
  chapter: ch-03
  chapter_title: The Accoya Identity
- module: ''
  criterion: 'AI 可檢查 Eden green #0db02b、Pitch grey #322d2e、Lime green #c1d82f、Dark grey #535456、Light grey #f2f1f0、Mid grey
    #a7a9ac 是否正確；Lime green 是否只用於 gradient。'
  chapter: ch-03-02
  chapter_title: Colour Palette
- module: Visual Identity
  criterion: AI 可檢查 Green Tab 是否 bleed off top/bottom edge、左右至少一個 a 寬且不少於 5mm、寬度 >= 27mm 或 80px。
  chapter: ch-03-04
  chapter_title: The Green Tab Logo
- module: Iconography System
  criterion: 可檢查規則包含 12 icons 必須固定順序；Dimensionally Stable、Outstanding Durability、Perfect for Coating 必須在上方並依序顯示。
  chapter: ch-04
  chapter_title: The Accoya Icons
- module: Iconography System
  criterion: AI 可檢查四語版本是否保留 12 icons 與 running order。
  chapter: ch-04-01
  chapter_title: Multilingual Accoya Icons
- module: Typography System
  criterion: AI 可檢查 email/live text 是否在 Neo Sans 不可用時使用 Arial。
  chapter: ch-05-02
  chapter_title: Web Typeface
- module: Typography System
  criterion: AI 可檢查 headline 是否 uppercase、線條是否 0.5pt、約 28 度、位置是否 top-left 或 bottom-right 並距字約半字高。
  chapter: ch-05-03
  chapter_title: Typography
- module: ''
  criterion: AI 可檢查 strapline 是否無標點、最小 6pt / web 12pt，是否使用正確翻譯。
  chapter: ch-05-04
  chapter_title: Primary Strapline
- module: Photography System
  criterion: AI 可檢查影像是否附 `© Accsys Technologies 2015 (or applicable date). Accsys Technologies is the trading name of Titan
    Wood Limited.`。
  chapter: ch-06-01
  chapter_title: Imagery
- module: ''
  criterion: AI 可檢查 Made With 是否有 Accsys 書面核准、尺寸 >= 20mm / 76px、是否沿 base edge 左或右、是否不靠近 headers。
  chapter: ch-06-04
  chapter_title: Made With
