rules_ai_checkable:
- module: Visual Identity
  criterion: AI 可檢查：internal signature 不得用於 external passenger-facing 或 ATL；排除區由 H 高度決定；email signature 必須用 primary Heathrow
    logo，不得用 service/division lock-up。
  chapter: ch-01
  chapter_title: Vision, Values and Logo System
- module: ''
  criterion: AI 可檢查：任何 brand claim 需能對應乘客旅程改善、安全、尊重或服務品質；不得只描述 Heathrow 規模。
  chapter: ch-01-01
  chapter_title: Our Vision and Values
- module: Visual Identity
  criterion: AI 可檢查：A4/A5 logo H-height = 7mm；A6/DL = 6mm；A7 minimum = 5mm；不得 altering/distorting logo 或置於文字內；email 不得包含 personal
    social handles。
  chapter: ch-01-02
  chapter_title: Logo and Signature Rules
- module: ''
  criterion: AI 可檢查：不得自行建立或修改 lock-up；新 lock-up 僅 Brand team 可授權；general lock-up online minimum width 70px，padding ideal 10px/min
    5px。
  chapter: ch-02
  chapter_title: Service Lock-ups
- module: ''
  criterion: AI 可檢查：Core factual 應 predominately white；Core influential 可用 purple gradients；Premium 黑色可 dominant；大面積黑色不得用在
    Core materials。
  chapter: ch-03
  chapter_title: Colour
- module: Photography System
  criterion: AI 可檢查：full-bleed image 必須保留 uncluttered area 或使用 white/purple fade；pictograms 不得重製或未經許可新設計；avoid clip art、cartoon、水彩、鉛筆、過度寫實插畫。
  chapter: ch-04
  chapter_title: Visual Language and Imagery
- module: Photography System
  criterion: AI 可檢查：影像需 tell a story of making every journey better；不得顯得 posed/staged；full-length cut-outs 需加 shadow grounding。
  chapter: ch-04-02
  chapter_title: Imagery and Visual Assets
- module: Typography System
  criterion: AI 可檢查：print 除 ATL 外用 Frutiger；PowerPoint/electronic 用 Arial；內部 initiatives 不得放上 merchandise；刺繡需使用 embroidery-only
    logo，供應商約 7,000 stitch count。
  chapter: ch-05
  chapter_title: Typography, Merchandising and Motion
- module: Voice and Tone
  criterion: AI 可檢查：避免 satellite piers、hub airports、codeshares 等 jargon；bad news 必須包含事實、乘客可做什麼、簡短原因與更多資訊來源；避免 sustainability
    一詞，改用具體行動與數據。
  chapter: ch-06
  chapter_title: Tone of Voice
- module: ''
  criterion: AI 可檢查：passenger-facing 不用 eg/ie/etc；日期為 `3 April 2017`；時間用 24 小時 `06:45`；Headlines 用 sentence case；Heathrow
    不寫 Heathrow Airport/HAL/LHR；使用 …ise；電話用空格分組。
  chapter: ch-07
  chapter_title: 'Appendix: Presentational and Typographic Rules'
- module: ''
  criterion: AI 可檢查：若無法 100% 確認品牌應用，應聯絡 Brand team。
  chapter: ch-08
  chapter_title: Contacts
