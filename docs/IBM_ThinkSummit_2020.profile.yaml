rules_ai_checkable:
- module: ''
  criterion: 所有 Think Summit 應呈現單一且連接的 IBM narrative；地方化內容不得破壞 IBM Design Philosophy 與 Think brand。
  chapter: ch-01
  chapter_title: Objective and Goals
- module: Brand Strategy
  criterion: 不得建立未核准 Think lockup 或 logotype；不得扭曲、操控 Think wordmark；IBM logo 尺寸、字體與 grid 必須依規格。
  chapter: ch-02
  chapter_title: Brand Elements
- module: Visual Identity
  criterion: 輸出物需使用核准 IBM logo artwork；尺寸不得低於指定最小值；字體不得以非 IBM 指定字體取代。
  chapter: ch-02-01
  chapter_title: IBM Logo Usage and Typography
- module: ''
  criterion: 不得自行建立 Think Summit 或 PartnerWorld lockup；tagline 使用需與指定活動情境一致。
  chapter: ch-02-02
  chapter_title: Think Identity and Lockups
- module: Brand Strategy
  criterion: 2020 資產應使用指定 color palette、campaign graphics 與年度 artwork；不得把不同年度視覺混用。
  chapter: ch-03
  chapter_title: 2020 Think Brand System
- module: ''
  criterion: 商品應使用核准年度圖形、logo 與色彩；不得在低可讀材質上放置複雜 lockup。
  chapter: ch-03-03
  chapter_title: Gallery and Merchandise
- module: ''
  criterion: Summit 應使用核准 tagline；signature moments 應與 Think narrative 而非地方臨時主題對齊。
  chapter: ch-04
  chapter_title: 2020 Think Summits
- module: ''
  criterion: 每類素材應使用指定 E3 asset link、核准 logo、button、grid、color；registration、banner、stage 與 topic zone 不得自創視覺。
  chapter: ch-05
  chapter_title: Event Elements and Applications
- module: ''
  criterion: Drupal、social、email 與 paid media 應遵守指定 grid、color 與 logo；CTA button 不得自行改色或改比例。
  chapter: ch-05-01
  chapter_title: Communications
- module: ''
  criterion: 小型舞台適合空間或預算有限情境；中型舞台適合 200 人以下；大型舞台可支援 panel 與多種 session styles；模板應使用核准檔案。
  chapter: ch-05-03
  chapter_title: General Session and Staging
- module: ''
  criterion: 各 topic zone 應包含核准 creative assets、環境元素、區域 branding、lead capture form 與 table tent card。
  chapter: ch-05-04
  chapter_title: Think Topics and Zones
- module: ''
  criterion: 大型環境物應依 brand hierarchy 放置；IBM Rebus、Be Equal、Diversity 8-Bar 等資產不得任意混排或脫離核准情境。
  chapter: ch-06
  chapter_title: Environmental Enhancements
- module: ''
  criterion: 數位平台應使用指定 Think branding、topic taxonomy 與 CHQ 支援流程；不得在平台上使用非核准 logo 或過期活動素材。
  chapter: ch-07
  chapter_title: Digital Events
