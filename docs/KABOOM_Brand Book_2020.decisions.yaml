# L3 決策卡 sidecar — KABOOM!
# schema：research/schemas/decision_pattern.schema.yaml
# 由 note.md 反向工程萃取；strict evidence 連回本檔 index.yaml 章節。

brand_id: KABOOM_Brand Book_2020
decisions:
  - id: dp-origin-story-before-rules
    title: 先把使命變成共用語言系統，再進入視覺規範
    problem:
      statement: 公益／使命型品牌若一開始就談視覺規範，色彩、攝影與字體會失去策略根基，淪為各自詮釋的風格選擇。
      signals: [mission_communication, no_strategic_foundation, participation, new_identity]
    solution:
      module: Brand Strategy
      move: 先用 voice attributes → mission → tagline → short/long description 把使命轉成可被全員共用的語言系統，再讓視覺承接其意義
      layer: strategy
    reason:
      - 先把使命從公益願景變成可被員工、設計師與文案共同使用的語言系統，避免後續視覺規範失去策略根基
      - 語言章節是後續 visual identity 的意義來源，讓色彩與影像不只是風格而承載使命
    applicable_when:
      industries: [nonprofit_social]
      brand_types: [mission_driven]
      conditions: [new_identity, mission_communication]
      archetypes: [full_brand_system, brand_experience_guide]
    dependencies:
      requires: []
      enables: [Visual Identity, Voice and Tone, Messaging]
    anti_patterns:
      - 先寫 logo／色彩規格，把使命只放在封面口號
    evidence:
      - brand_id: KABOOM_Brand Book_2020
        chapter: ch-01
        excerpt: "先把『playspace equity』從公益願景變成可被員工、設計師與文案共同使用的語言系統，避免後續視覺規範失去策略根基。"
      - brand_id: KABOOM_Brand Book_2020
        chapter: ch-01-02
        excerpt: "使命型品牌可建立多長度 messaging set，讓敘事在募款、合作、活動與介紹情境中保持一致。"
    status: extracted

  - id: dp-personality-words-as-evaluation-criteria
    title: 品牌人格詞要附正反行為，當文案的可審核準則
    problem:
      statement: 抽象品牌價值無法指導寫作，文案者不知道該偏哪個方向，產出容易飄移。
      signals: [abstract_values, inconsistent_outputs, needs_evaluation_criteria]
    solution:
      module: Voice and Tone
      move: 為每個人格屬性附上行為描述與「But Never」負面偏差，形成可審核的 voice QA rubric
      layer: language
    reason:
      - voice attribute matrix：desired quality 對應 prohibited drift
      - 可複用為 brand voice QA rubric，用正向特質與負向偏差共同審核
    applicable_when:
      brand_types: [mission_driven, challenger]
      industries: [nonprofit_social]
      archetypes: [full_brand_system, brand_experience_guide]
    dependencies:
      requires: [Brand Strategy]
      enables: [Voice and Tone, Content Design]
    evidence:
      - brand_id: KABOOM_Brand Book_2020
        chapter: ch-01-01
        excerpt: "透過正向形容詞、長段語氣說明與『But Never』列表建立語氣邊界；可複用為 brand voice QA rubric。"
    status: extracted
