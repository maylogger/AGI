rules_ai_checkable:
- module: Brand Strategy
  criterion: 敘述 Be Equal 時應同時保留 `expand`、`enable`、`ensure`；不得把承諾縮減成單一公益訴求。
  chapter: ch-01-01
  chapter_title: Context and Brand Promise
- module: Brand Strategy
  criterion: 內容應包含 inclusive、allyship、accountability 等行為；社群資產不得以未列入的自創標語取代 approved system。
  chapter: ch-01-02
  chapter_title: Pillars, Behaviors and Communities
- module: ''
  criterion: Ally 申請需具備社群 gateway、badge、250 字 allyship 文字、同事背書、訂閱與社群推廣；年度傳播應對齊已定義 D&I 節點。
  chapter: ch-01-03
  chapter_title: Allies, Partner Program and Social Strategy
- module: ''
  criterion: logo/logotype 可獨立使用；一起出現時 logotype 在上方或左側；logo/logotype 只可用於 60 或 40 色值；不得使用同色系或同色值組合。
  chapter: ch-02
  chapter_title: Expression
- module: Visual Identity
  criterion: 不得建立正式 lockup；共同出現時相對尺寸需互相對應，且 logotype 應在 logo 上方或左側。
  chapter: ch-02-01
  chapter_title: Logo, Logotype and Community IDs
- module: Color System
  criterion: 不得兩色來自同色系；不得兩色同色值；logo/logotype 不得放在非 60/40 色值上；背景為色彩時 logo/logotype 僅能黑白高對比。
  chapter: ch-02-02
  chapter_title: Color and Patterns
- module: Typography System
  criterion: Plex Sans Bold 保留給 Be... statements、Communities 與 logotype；Be... statements 不得在沒有 Be Equal 的情境單獨出現；不得為單一社群創造未核准
    headline、tagline 或 slogan。
  chapter: ch-02-03
  chapter_title: Typography, Translations and Voice
- module: ''
  criterion: 所有視覺元素與 typography 應依 IBM 2x Grid；portrait 是 portraits 不是 headshots；overlay 應使用已建立的社群覆層。
  chapter: ch-02-04
  chapter_title: Composition, Portraiture and Photo Overlays
- module: Motion Identity
  criterion: 動畫應以 upward action 為主；社群素材應維持各自 community pattern 與 palette。
  chapter: ch-03-02
  chapter_title: Motion and B.E. Communities
