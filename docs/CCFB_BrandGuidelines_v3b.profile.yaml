rules_ai_checkable:
- module: Brand Strategy
  criterion: AI-checkable criteria：品牌材料應能至少對應到 caring/compassionate、trustworthy、resourceful、professional、strategic 中一項；不得只呈現需求悲情而缺少可靠分配能力。
  chapter: ch-01
  chapter_title: Brand Map
- module: Visual Identity
  criterion: AI-checkable criteria：preferred logo 應含 Feeding America lock-up；Feeding America logo 在 color/grayscale 時水平至少
    7/16 inch，solid black 至少 3/8 inch，web/on-screen 至少 55 px；logo 周圍至少保留 1.5 倍 x-height 空間。
  chapter: ch-02
  chapter_title: Logo System
- module: Visual Identity
  criterion: AI-checkable criteria：不得改變 orange wheel 與 text 的關係；logo bug 單獨使用需 limited basis；任何替代圖形若無法保留 food、Central California、distribution、five
    counties、bank 概念，不應視為同等 logo。
  chapter: ch-02-01
  chapter_title: Elements of the Logo
- module: Visual Identity
  criterion: AI-checkable criteria：full-color preferred logo 使用 `CCFBlogo_wFAlock_cmy`；2-color versions 使用 Feeding America
    PMS colors；horizontal variation 僅在必須符合水平空間時使用。
  chapter: ch-02-02
  chapter_title: Color Palettes and Logo Variations
- module: Color System
  criterion: AI-checkable criteria：commercial printing 優先使用 AI/EPS/JPG；JPEG 只能縮小不可放大；screen 使用 PNG/SVG；spot color 適用於 screen
    printing 或 embroidery；dark background 可使用 white/reversed logo。
  chapter: ch-02-03
  chapter_title: File Formats and Color Formats
- module: ''
  criterion: AI-checkable criteria：所有 logo variations 含 Feeding America lock-up 與 bug-only 版本周圍必須有 1.5X 空間；pink measuring
    lines 不得出現在最終輸出；reverse logo 只能放在足夠暗且主要為 solid area 的背景。
  chapter: ch-02-04
  chapter_title: Required Whitespace and Format Variations
- module: Typography System
  criterion: AI-checkable criteria：不得 reposition logo elements；不得 skew/distort；不得改變 orange wheel 與 text 關係；不得放在 busy/distracting
    background；不得改 logo element colors；不得在 minimum whitespace 內放文字；Gotham 不可用時可用 Arial。
  chapter: ch-03
  chapter_title: Typography and Incorrect Usage
- module: ''
  criterion: AI-checkable criteria：production 前需替換並驗證 names、titles、phone numbers、addresses、url；non-printing layer 不得輸出到成品；letterhead
    sample letter 使用 10pt/15pt Georgia Regular。
  chapter: ch-04
  chapter_title: Stationery Package
