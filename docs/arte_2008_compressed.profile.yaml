rules_ai_checkable:
- module: ''
  criterion: 所有承載 ARTE brand 的媒介都需遵守基本圖形規則；logo 與 -4° angle 是不變常數；三大設計元素為彩色 cartouche、強勢彩色 typography、-4° horizontal band。
  chapter: ch-01
  chapter_title: Philosophie
- module: ''
  criterion: cartouche 是 logo 的主要載體；typography 應強勢、大面積、常用大寫並與 cartouche 色彩呼應；-4° band 必須協助圖像與文字空間劃分。
  chapter: ch-02
  chapter_title: Composition Graphique Generale / Grafische Grundlagen
- module: ''
  criterion: 任何完整 ARTE graphic composition 應至少能辨識出三元素之一，重要品牌溝通應使用三元素的組合。
  chapter: ch-02-01
  chapter_title: Three Fundamental Elements
- module: Visual Identity
  criterion: logo 不可變形、重繪、改字距；基本 orange 為 Pantone 1505 / CMYK 0,65,100,0 / RGB 255,95,29；黑白印刷用 50% black 或 white，不用 black；設計情境中
    logo 需 -4°，但 logo 列舉、共同製作、外部製作與 merch 可直立或傾斜。
  chapter: ch-03
  chapter_title: Le Logo ARTE / Das ARTE-Logo
- module: Visual Identity
  criterion: 衍生 wordmark 一般為 Helvetica Neue Heavy、capitals；設計情境中 sublogos 傾斜 -4°；含 ARTE 的節目 title 跟隨 ARTE logo，可搭配特定色碼；照片上
    title 可用 white；無 ARTE 字樣的 programme/case logo 可自成一體也可與 ARTE logo 組合。
  chapter: ch-04
  chapter_title: Marque ARTE - Marques Derivees / Sublogos
- module: Visual Identity
  criterion: cartouche 與其中 logo 一律 -4°；cartouche 永遠位於版面邊緣；水平間距用 1x ARTE logo 長度，垂直間距用 2x ARTE logo 高度；可從任何邊進入版面且有上/下方向；主色需使用純色構成漸層；無法確保平滑漸層、單色印刷或無框可定位時，不使用
    cartouche。
  chapter: ch-05
  chapter_title: Cartouche / ARTE-Logo-Podest
- module: ''
  criterion: 外部 print communication 使用 Helvetica Neue；correspondence/internal notes 使用 Arial；headline/subheadline 顏色匹配 cartouche，可
    -4°，右對齊；headline 用 capitals，subheadline 用大小寫；正文 always upper/lowercase、justified、prefer compact and non-tilted；避免過長行與過多字體。
  chapter: ch-06
  chapter_title: Typographie
- module: ''
  criterion: logo+information 情境文字不可過長；以 logo 的 t 測量元素間距；資訊載體只適用於內頁/封底且 logo 不在 cartouche；每頁不超過一個 cartouche；背景使用不得與另一 cartouche
    同頁混用；背景/資訊兩種自由用法不可合併。
  chapter: ch-08
  chapter_title: Cartouche - Utilisations / Podest Anwendungen
- module: ''
  criterion: press dossier 標題頁與孤立 headline 建議使用 -4° typography；內頁可依嚴格 grid 決定是否傾斜；三大元素應在範例中保持可辨識。
  chapter: ch-10
  chapter_title: Exemples / Beispiele
- module: ''
  criterion: logo 不得裁切、改色、加框、改構成、非 -4° 傾斜、透明、outline、改比例、加輪廓、用黑色、被外來形狀干擾留白；cartouche 不得變形、改比例、任意放置、非 -4°、階梯狀漸層、自由放置 logo、過度裁切、窄邊進入畫面、同頁出現兩次、透明、單色、漸層轉白/黑/灰或互補色。
  chapter: ch-11
  chapter_title: A Eviter / Don’ts
- module: Visual Identity
  criterion: 同上，並可拆為 `angle == -4deg`、`opacity == 100%`、`logo count per page <= 1 when in cartouche context`、`cartouche count
    per page <= 1`、`aspect ratio unchanged`、`no black logo`、`no monochrome podium` 等條件。
  chapter: ch-11-01
  chapter_title: Logo and Cartouche Don’ts
- module: ''
  criterion: cartouche assets 應使用提供的 Illustrator .eps 或 .jpg；放大 cartouche 時必須檢查 Illustrator blend settings，避免印刷色階；可在 Illustrator
    移除 ARTE logo 以單獨使用 Podest。
  chapter: ch-12
  chapter_title: Elements sur Serveur / Elemente auf Server
