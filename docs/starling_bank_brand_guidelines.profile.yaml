rules_ai_checkable:
- module: ''
  criterion: AI 可檢查：若輸出內容涉及 Starling 線上標誌或色彩，必須引用此文件；若涉及離線印刷、攝影或語氣，應標記為超出此文件範圍。
  chapter: ch-01
  chapter_title: Introduction and Scope
- module: Visual Identity
  criterion: AI 可檢查：水平 logo 高度不得低於 20px；四周清除空間需至少為 S mark 的 0.5 倍；白底與淺色背景優先使用 primary colourway；深色背景使用 light colourway；亮色背景使用
    white colourway。
  chapter: ch-02
  chapter_title: Horizontal Logo System
- module: ''
  criterion: AI 可檢查：任何水平 logo rendition 的 rendered height 必須大於或等於 20px。
  chapter: ch-02-01
  chapter_title: Construction and Minimum Size
- module: ''
  criterion: AI 可檢查：logo bounding box 外 0.5 個 S mark 尺寸內不得有文字、圖示、邊框或影像干擾物。
  chapter: ch-03-02
  chapter_title: Clearspace
- module: ''
  criterion: AI 可檢查：白色或淺色背景應用 primary colourway；深色背景應用 light colourway；高彩度亮色背景應用 white colourway；不得在低對比背景使用 primary logo。
  chapter: ch-03-03
  chapter_title: Colourways
- module: Visual Identity
  criterion: AI 可檢查：垂直 logo 高度不得低於 60px；應置中或獨立使用；周圍需有大量清除空間；colourway 選擇需遵守與水平 logo 相同的背景規則。
  chapter: ch-03
  chapter_title: Vertical Logo System
- module: ''
  criterion: AI 可檢查：Starling Purple 必須使用 HEX `#6935D3`；Starling Sand 使用 `#F6EFEA`；Starling Orange 使用 `#F08357`；Starling Teal
    使用 `#68D9CF`；Starling Navy 使用 `#192851`。
  chapter: ch-04
  chapter_title: Colour Palette
