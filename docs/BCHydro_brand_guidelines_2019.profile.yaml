rules_ai_checkable:
- module: Brand Strategy
  criterion: 可檢查規則：power smart 應作為公司行為/目的而非獨立計畫；品牌素材應連回 BC Hydro；不得形成第二個獨立 Power Smart 品牌。
  chapter: ch-01
  chapter_title: Brand Overview
- module: Voice and Tone
  criterion: 可檢查規則：文案需先說 benefits/effects/risks；避免內部語言與縮寫；保持 concise/scannable/helpful；可用 we/our；禁用 'we are committed to'；使用直接
    action-oriented CTA；尊重 preferred pronouns。
  chapter: ch-02
  chapter_title: Tone of Voice
- module: Visual Identity
  criterion: 可檢查規則：clear space 至少等於 symbol；數位優先 SVG，96px 時元素應清楚；without-tagline 只用於 signage/permanent installations；symbol-only
    用於 permanent signage/power boxes/uniforms；partner logo 65%、BC Hydro 100%；lock-up 不可用於 T-shirts 等 promotional materials。
  chapter: ch-03
  chapter_title: Our Logo
- module: Typography System
  criterion: 可檢查規則：GT Haptik 為主，Arial 僅於 GT Haptik 不可用；headlines sentence case；body leading 為字級 1.5 倍；alternative subhead
    all caps letter-spacing 75；regular 最小 6pt，medium/bold/black 最小 9pt；BC Hydro 不可斷行；power smart 一般 lower case；URL 不用 www。
  chapter: ch-04
  chapter_title: Typography
- module: ''
  criterion: 可檢查規則：coloured bars 應使用核准色；call-outs 應突出重要資訊而非裝飾；不可讓輔助元素干擾內文可讀性。
  chapter: ch-06
  chapter_title: Design Elements
- module: ''
  criterion: 可檢查規則：安全插畫需清楚呈現風險或正確行為；人物風格需與品牌 palette 一致；不得使用過度卡通或與安全語意衝突的圖像。
  chapter: ch-07
  chapter_title: Illustration
- module: ''
  criterion: 可檢查規則：影像應符合真實 BC 生活或服務情境；stock photo 不應過度 staged；產品照需清楚且不脫離品牌語境；不得使用低品質、與語氣不符或誤導情境的照片。
  chapter: ch-08
  chapter_title: Photography
