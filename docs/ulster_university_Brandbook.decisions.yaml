# L3 決策卡 sidecar — Ulster University Brand Handbook
# schema：research/schemas/decision_pattern.schema.yaml
# 由 note.md 反向工程萃取；strict evidence 連回本檔 index.yaml 章節。

brand_id: ulster_university_Brandbook
decisions:
  - id: dp-platform-before-visual-rules
    title: 先定義企業策略與語氣，再建立視覺識別工具箱
    problem:
      statement: 大型技術企業若直接寫視覺規則，視覺系統會變成單純新風格，而非品牌平台的執行工具。
      signals: [no_strategic_foundation, enterprise, style_over_system, new_identity]
    solution:
      module: Brand Strategy
      move: 先建立 We Believe in Brave 品牌信念與 Brand Positioning，再讓 Brand Toolkit 的視覺承接其意義（voice drives visuals）
      layer: strategy
    reason:
      - 視覺規則需有可回推的語義來源
      - 品牌手冊可先用少量敘事建立決策標準，再把標準交給後續模組實作
      - 先建立判斷標準，後續視覺與語氣才有可回溯的語義來源
    applicable_when:
      industries: [industrial_materials_science, tech_software, education]
      brand_types: [category_creator, heritage_legacy, challenger, mission_driven, institutional_public_trust]
      conditions: [new_identity, strategy_refresh]
      archetypes: [full_brand_system, brand_experience_guide]
    dependencies:
      requires: []
      enables: [Visual Identity, Color System, Typography System, Voice and Tone]
    anti_patterns:
      - guideline 從空白直接列章節、先寫 Logo 規格
    evidence:
      - brand_id: ulster_university_Brandbook
        chapter: ch-01
        excerpt: "先建立『品牌是感知』與 We Believe in Brave 的共同語言，讓後續視覺規範不是孤立美術規則；採用 Brand Positioning + Visual Communications 雙軸，前者定義聲音，後者把聲音視覺化。"
    status: extracted

  - id: dp-from-to-voice-translation
    title: 技術品牌語氣指南要給「轉譯規則」，不只是列形容詞
    problem:
      statement: 大型組織語氣不一致、讀者負擔過高，只列形容詞無法落到可審核的寫作行為。
      signals: [technical_jargon_risk, expert_audience, b2b]
    solution:
      module: Voice and Tone
      move: 用 do/don't、tips 與 before/after 改寫範例，把 confidence and clarity 從抽象形容詞變成可審核的寫作操作
      layer: language
    reason:
      - 提供轉譯規則比列 tone adjectives 更可執行
      - 語氣指南應同時提供判準、禁用風格與實際改寫
    applicable_when:
      industries: [industrial_materials_science, tech_software, finance, education]
      brand_types: [institutional_public_trust]
      conditions: [expert_audience, technical_translation]
      archetypes: [full_brand_system, brand_experience_guide, corporate_toolkit]
    dependencies:
      requires: [Messaging]
      enables: [Content Design]
    anti_patterns:
      - 只列 tone adjectives 卻沒有轉譯方法
    evidence:
      - brand_id: ulster_university_Brandbook
        chapter: ch-02-03
        excerpt: "用 do/don't、tips 與改寫範例，把語氣從抽象形容詞變成可審核操作；範例頁展示同一新聞內容如何從冗長正式轉為更直接、情感與可讀。"
    status: extracted

  - id: dp-personality-words-as-evaluation-criteria
    title: 把人格詞做成創意評估準則
    problem:
      statement: 抽象企業價值無法指導產出，設計與文案缺乏共同判斷語彙。
      signals: [abstract_values, needs_evaluation_criteria, inconsistent_outputs]
    solution:
      module: Brand Strategy
      move: 用 ambitious/creative/collaborative/entrepreneurial 四人格當創意評估矩陣，每個產出至少對應一項
      layer: strategy
    reason:
      - 人格詞應能成為產出評估標準，而不是僅作品牌牆口號
      - 人格章節可成為後續文案、攝影與版面的感性校準器
    applicable_when:
      industries: [industrial_materials_science, nonprofit_social, education]
      brand_types: [challenger, category_creator, mission_driven, institutional_public_trust]
      conditions: []
      archetypes: [full_brand_system, brand_experience_guide]
    dependencies:
      requires: [Brand Strategy]
      enables: [Voice and Tone, Visual Language, Content Design]
    evidence:
      - brand_id: ulster_university_Brandbook
        chapter: ch-02-04
        excerpt: "ambitious、creative、collaborative、entrepreneurial 四人格作為創意評估矩陣；輸出應至少對應一項人格，不得傳達保守、孤立、被動或只服務內部流程的訊息。"
    status: extracted

  - id: dp-clearspace-from-logo-geometry
    title: 用標誌自身幾何定義留白，讓 spacing 隨縮放成立
    problem:
      statement: 用固定像素定義 clear space，在不同尺寸與媒介會失效。
      signals: [scaling_inconsistency, multi_media]
    solution:
      module: Visual Identity
      move: 以標誌中 U 符號厚段寬度作為 clear space 量尺，例外最多降到一半
      layer: visual_core
    reason:
      - 版面一致性來自比例關係，不只是絕對尺寸
      - 留白以標誌自身元素為單位，可隨縮放維持比例
    applicable_when:
      industries: []
      brand_types: []
      conditions: [multi_media]
      archetypes: [brand_experience_guide, full_brand_system, logo_asset_guidelines]
    dependencies:
      requires: [Visual Identity]
      enables: []
    evidence:
      - brand_id: ulster_university_Brandbook
        chapter: ch-03-01
        excerpt: "clear space 至少等於 U 符號厚段寬，例外最多降到一半；print minimum 25mm，digital minimum 95px。"
    status: extracted

  - id: dp-modular-manual-for-public-units
    title: 用「可辨識但不獨立」的層級框架治理多機構／多單位品牌
    problem:
      statement: 大型多機構、多單位組織，各單位都想要自己的識別，若無分層治理，品牌會裂解成互相競爭、削弱母品牌的子品牌。
      signals: [multi_unit_consistency, multi_entity, sub_unit_identity, brand_architecture_complexity]
    solution:
      module: Brand Architecture
      move: 用 logo hierarchy + application context + exception approval 管理 corporate/creative/portrait/faculty/sub-brand/co-branding lockup，讓學院與研究單位可辨識但不脫離母品牌
      layer: governance
    reason:
      - 局部單位可以被識別，但不能競爭或替代母品牌
      - 多品牌大學可用 lockup governance 控制學院與研究單位擴散
    applicable_when:
      industries: [public_sector, education, media_entertainment]
      brand_types: [institutional_public_trust, platform_ecosystem]
      conditions: [multi_unit_consistency, multi_entity]
      archetypes: [multi_brand_architecture, brand_experience_guide]
    dependencies:
      requires: [Brand Strategy, Visual Identity]
      enables: [Governance]
    anti_patterns:
      - 各單位自行創造分支品牌與專屬 tagline
      - 只列 logo 圖檔卻不給判斷規則
    evidence:
      - brand_id: ulster_university_Brandbook
        chapter: ch-03-01
        excerpt: "標誌處理 corporate、creative、portrait、faculty、sub-brand、co-branding 等場景；不得使用未核准 sub-brand lockup，多品牌大學用 lockup governance 控制學院與研究單位擴散。"
    status: extracted
