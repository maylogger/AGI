rules_ai_checkable:
- module: ''
  criterion: 文案應 confident yet humble、playful、direct、casual、conversational、provocative；不得 brag、try too hard、sloppy、mean、過度
    jargon 或只像傳統廣告平台。
  chapter: ch-02
  chapter_title: Messaging
- module: Voice and Tone
  criterion: 不得使用過度俚語使品牌顯得 try hard；不得使用會貶低他人的語氣；若使用 business terms，應用口語方式軟化。
  chapter: ch-02-01
  chapter_title: Personality and Tone of Voice
- module: Brand Strategy
  criterion: 公開或 consumer-facing copy 必須寫 `TikTok For Business`，且 `For` 的 F 必須大寫；`TT4B` 或 `TTFB` 僅可內部使用。
  chapter: ch-02-02
  chapter_title: Brand Treatment in Copy
- module: Visual Identity
  criterion: horizontal logo 最小高度 5px，vertical logo 最小高度 14px；clearspace 等於 T 的 cap height；rotation 必須以 10 度增量且不可倒置；end state
    不得 distortion；不可重打、拉伸、改色、加陰影、加漸層、描邊或放在低可讀背景上。
  chapter: ch-03-01
  chapter_title: Logo
- module: Typography System
  criterion: headline highlight 只能用 Razzmatazz 與 Sofia Pro Soft；不得用 Splash highlight text；highlight punctuation 需跟隨被強調片語；色彩最多兩色；tracking
    遵循 -10pts；headline 不得全大寫或全小寫，文字不可拉伸、堆疊、套漸層、套圖案、加陰影或使用未核准字體。
  chapter: ch-03-02
  chapter_title: Typography
- module: Color System
  criterion: digital 使用 RGB；stationery / logo print 使用 Pantone；背景每個 composition 限一個 brand color；highlight text 不得超過一個 emphasis
    color；不得用 Splash 強調白底文字；不得使用 gradients、新顏色、灰色或中性色背景。
  chapter: ch-03-03
  chapter_title: Color
- module: ''
  criterion: bubbles digital 最小 30px、print 最小 .2in；rounded rectangle roundness 限 25%、50%、100%；100% roundness 在 digital 主要保留給
    CTA；patterns 最小圓直徑 20px 或 50px；patterns 不得放在圖片、競爭色、相近色或文字下；emphasis marks 尺寸與對齊以 headline x-height 為單位，句尾只能用 square marks。
  chapter: ch-03-04
  chapter_title: Design Toolkit
- module: Photography System
  criterion: 不得過度 staged、cheesy、overproduced；不得使用忙亂前景 / 背景、靜態無互動瞬間、blown-out 邊緣、過度戲劇燈光或單一性別 / 種族；影片應拍 9:16，避免水平 / 方形格式與長時間固定鏡頭。
  chapter: ch-04
  chapter_title: Imagery
- module: ''
  criterion: '`Don’t Make Ads.` 必須在黑底白字上並 word-by-word 動畫；TikToks 必須置於 phone graphic；stills 應取自清晰、帶動作與效果的 video frame；graphics
    中 supers 必須在白色 bubbles 內並用 Sofia Pro Bold；banners 至少顯示 phone graphic 一角，CTA 顏色需與 phone outline 相反；所有 talent、music、location、brand/IP
    rights 必須取得授權。'
  chapter: ch-05
  chapter_title: Advertising Campaign Guidelines
