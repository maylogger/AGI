    label: 新能源與移動
    aliases: [新能源, 電動車, EV, mobility, clean energy, 電動機車, 充電]
    description: 新品類或科技密集的能源／移動品牌，市場教育成本高，需建立信任與未來敘事。
    business_problems: [category_education, trust_in_new_tech, future_narrative, high_education_cost]
    emphasize_modules: [Brand Strategy, Messaging, Photography System, Motion Identity, Visual Language]
    de_emphasize_modules: []
    recommended_patterns:
      - dp-story-framework-category-education
      - dp-system-toolkit-over-template
    typical_archetypes: [full_brand_system, brand_experience_guide]
    evidence_brands:
      - LucidMotors
      - Tesla_Guidelines_2010
      - BCHydro_brand_guidelines_2019
      - Volvo_2021_compressed
    notes: 與汽車／航空等成熟移動品牌不同處在於「品類教育」與「未來感」權重更高。

