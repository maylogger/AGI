    - heritage_legacy
    conditions:
    - multi_unit_consistency
    - exception_handling
    archetypes:
    - multi_brand_architecture
    - corporate_toolkit
  dependencies:
    requires:
    - Governance
    enables: []
    conflicts_with: []
  examples: []
  anti_patterns:
  - 例外只寫「可以這樣做」卻不寫適用邊界與審核者
  - 各單位把一次性例外當成通用替代方案沿用
  - 地方社群把一次性例外當成通用替代方案沿用
