- id: dp-trademark-permission-flow
  title: 用授權閘門治理第三方商標使用，先處理混淆與背書風險
  problem:
    statement: 平台品牌被大量第三方使用商標與資產，若無授權流程，會造成商標混淆與誤導性背書風險。
    signals:
    - trademark_protection
    - partner_governance
    - endorsement_risk
    - third_party_usage
  solution:
    module: Legal and Trademark
    move: 以「核准來源 + 允許情境 + 禁止改作 + permission gate」治理，高風險情境須送審並附最終版本、描述與 script
    layer: governance
  reason:
  - 平台品牌 guideline 應優先處理 trademark confusion 與 endorsement risk，再處理美學一致
  - 越接近大眾媒體、商業廣告、包裝與劇情敘事，審查需求越高
  - permission section 將品牌治理流程化，降低設計師自行判斷法律風險
  - 高敏感品牌 guideline 應在規格前放審核流程，避免 partner 先做完再修改
  - 審核應前置於製作，越高風險的媒體越需要多階段送審
  - 把品牌規範從靜態文件轉成審核流程，材料超過一年需重新驗證
  - permission section 將品牌治理流程化，降低設計師自行判斷品牌風險
  - 授權標章應以「關係正確性」為審核目標，而非只看 logo 是否出現
  - 媒體越接近 sponsorship、移動曝光或可販售商品，越需要嚴格限制標章
  - 品牌控制不只靠禁止，還要提供可信資產供應鏈（official asset source）
  - 品牌保護不是阻止使用，而是把使用導向正確審核與授權流程
  - guideline 末端應將治理責任拆成具體單位與表單，而非只說「請遵守」
  - 授權鏈越長，越需要明確寫出誰提交、誰批准、誰能終止
  - co-branding guideline 必須包含價值不相容條款，因為品牌聯名本身會轉移聲譽風險
  - 越有名的公共品牌越需要權限治理
  - 外部夥伴指南應以媒介分類規範，而非只提供一般原則
  - 品牌資產使用不是設計問題的第一步，而是關係與授權問題
  - 任何第三方 logo guideline 都應先問「是否有合法關係」而不是「該放哪個版本」
  - 公共城市品牌應明確處理「誰可使用」與「為何仍需嚴格」的張力
  - 公共品牌開放不等於素材著作權開放
  - 第三方 guideline 應把 visual imitation、API affiliation 與 merchandise 分開審核
  - 治理不是限制創意，而是防止使用者混淆與錯誤背書
  - 奧運品牌治理優先處理權利與關聯風險，再處理視覺一致性
  - 對高價值 IP，guideline 應先設 permission scope，而非直接展示 logo artwork
  - Examples 不只是美術示範，而是權利邊界的場景化解釋
  - 品牌開放給第三方時，開頭就應定義「可用」不等於「可直接發布」
  - 合作擴散需要在 attribution、brand consistency 與 content integrity 之間取得平衡
  - 平台品牌 guideline 應把「可提及」與「可命名／可商品化」分開
  - 商標使用不是設計建議，而是有限、可撤銷、必須嚴格遵守的授權
  - 商標保護不只是法律，而是讓客戶更容易辨識可靠的 offer
  - 商標章節應同時處理命名、第三方使用、商品、標牌與侵權流程
  - partner brand guidelines 應明確連結品牌規則、商標權與可執行後果
