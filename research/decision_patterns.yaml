  evidence:
  - brand_id: 2022_Special_Olympics_USA_Games_Brand_Guidelines_2020
    chapter: ch-03-02
    excerpt: 標誌版本應由媒介條件與對比需求決定，不由個人喜好決定；深色或低對比背景使用 white logo。
  - brand_id: 2022_Special_Olympics_USA_Games_Brand_Guidelines_2020
    chapter: ch-04-02
    excerpt: 漸層背景上只使用 white single color logo，以維持對比與清晰度。
  - brand_id: accor_hotels_2015_compressed
    chapter: ch-02-05
    excerpt: logo 背景規則應包含照片複雜度判斷：彩色 logo 用於白色/淺底，深藍底用白色文字且 goose 維持 honey，照片背景須非常明或非常暗且避免 busy background。
  - brand_id: Afterpay_Merchant_Guidelines_US_2020
    chapter: ch-02-01
    excerpt: 用背景明度選擇 logo 色版：依背景條件選擇黑、白或 Bondi Mint lock-up，Bondi Mint lock-up 只可在黑底使用，對比與呼吸空間優先於填滿版面。
  - brand_id: Amazon_Brand_Usage_Guidelines
    chapter: ch-03-01
    excerpt: 背景明暗決定選擇 color/reversed/one-color 版本；不得把 logo 放在 patterned background，one-color smile 不得灰色。
  - brand_id: arte_2008_compressed
    chapter: ch-03
    excerpt: orange-like background → white logo；黑白印刷以 50% black 或 white，不用純黑；logo 顏色依背景對比決定而非自由配色。
  - brand_id: AXA_Design_principles_2017
    chapter: ch-02-02
    excerpt: Asset Version Matrix：solid 用於企業與高可視性，open blue/white 用於溝通與影像背景；logo 在所有背景上必須保持 legible。
  - brand_id: Barbican_Centre_brand_guidelines_2017
    chapter: ch-02-03
    excerpt: logo full-circle 必須與背景形成對比，Barbican word 與半圓需形成黑／白或設計色對比；背景對比與可讀性決定 logo 顏色。
  - brand_id: bitcoin_Brand_Guidelines
    chapter: ch-03
    excerpt: 背景決策框架：背景亮度／複雜度 → asset version → contrast check → forbidden effects；白底用標準、深灰/黑底用深色版、複雜背景視為高風險，並禁止
      stretch、shadow、gradient、transparency。
  - brand_id: Bolt_Brand_Guidelines_2019
    chapter: ch-02
    excerpt: 以 primary logo 與 inverse logo 確保標誌在明暗背景上維持可讀，inverse 是環境適配；不得在低對比背景使用或自行改比例。
  - brand_id: CDB_BrandIdentityManual
    chapter: ch-02-02
    excerpt: 依 background/reproduction need 選用 full colour、flat colour、B&W、reverse colour、reverse B&W
      版本；不得使用未授權色彩，印刷廣告最小 logo diameter 25mm。
  - brand_id: Central_Bank_of_Bahrain_Brand Identity Guidelines
    chapter: ch-01
    excerpt: 以 background brightness / reproduction mode 決定 logo 版本：light 用 primary，dark 用 white reverse，黑白/灰階用
      black-only。
  - brand_id: DELL_BRANDBOOK_2010
    chapter: ch-02-03
    excerpt: Dell Blue logo 只能用於白底，white logo 用於 solid color/imagery，light/dark gray logo 不得置於彩色背景；變體依背景對比選用而非自由配色。
  - brand_id: destination_canada_brand_booklet
    chapter: ch-03-01
    excerpt: logo 預設使用紅色，紅色或深色背景使用白色反白；最小尺寸 10mm / 28px，avatar 僅作社群頭像，例外使用被明確圈定。
  - brand_id: Dubai_BRAND_GUIDELINES_2021
    chapter: ch-02
    excerpt: Department of Tourism 白版用於深色背景、藍版用於白／淺色背景；original colours 僅用於全白或全黑且無圖片背景，依背景對比選用而非自由配色。
  - brand_id: LucidMotors
    chapter: ch-02-04
    excerpt: 用背景明暗與照片複雜度決定標誌顏色；dark/color/photo→White，light→Charcoal，背景太忙時不可放 wordmark。
  - brand_id: Google_for_Work_Brand_Book
    chapter: ch-02-01
    excerpt: logo variant selection 以背景決定：full color preferred，photo/light 背景用 54% black，medium/dark 背景用
      reverse，以對比而非自由配色選擇標誌版本。
  - brand_id: Huawei_Visual_Identity_Guidelines
    chapter: ch-02-01
    excerpt: 背景複雜或對比不足時需改用 monotone black 或 reversed white，以背景條件而非自由配色決定標誌顏色。
  - brand_id: Klepierre_Charte_graphique_2013
    chapter: ch-01
    excerpt: 彩色 logo 不得放深色背景；白色 logo 需在 corporate colours 存在時使用；用不同背景情境區分 positif、négatif、cartouche 與
      monochrome exception。
  - brand_id: MA_Style-Guide_
    chapter: ch-02-01
    excerpt: 不得改色、拉伸、扭曲、加濾鏡或置於低解析與低對比背景；深底可反白，淺底用 charcoal/black。
  - brand_id: McDelivery_brandbook_2017
    chapter: ch-02-02
    excerpt: wordmark 在淺底用黑、深底用白；低對比背景使用 single color logo，全球一致性優先但已核准區域色彩可在清楚限制下存在。
  - brand_id: Michelin_DISTRIBUTOR_GUIDE_2019
    chapter: ch-02-02
    excerpt: 依 light、yellow、dark、mono 背景選擇版本；wordmark 在深色背景為白、support line 在黃色背景改藍，背景需為均質色區，可讀性優先於裝飾整合。
