- id: dp-one-brand-one-voice-governance
  title: 以「one brand, one voice」治理目標收束跨產品跨夥伴的一致性
  problem:
    statement: 跨地區、跨產品、跨商戶的大型品牌，若缺乏統一治理目標，每個團隊各自詮釋會讓品牌在不同媒介中碎裂。
    signals:
    - consistency_across_partners
    - ecosystem_consistency
    - brand_fragmentation_risk
    - multi_market
  solution:
    module: Governance
    move: 把規範拆成 term dictionary、trademark rules、approved boilerplates，並以交付前 checklist 自我審核
    layer: governance
  reason:
  - 將品牌規範拆成可被非品牌專家使用、可檢查的知識結構管理一致性
  - 品牌治理的最後一步不應依賴記憶，而應依賴檢查清單
  - 將品牌規範拆成可被非品牌團隊使用、可檢查的知識結構管理一致性
  - 多利害關係人的設計系統需要 messaging toolkit，而不是只交付 logo files
  - 高端品牌不是只靠視覺維持，而是靠所有通路避免把產品商品化、折價化與誤導化
  - 品牌手冊可把「品牌一致性」連到營運資格與資金規則，提升執行者遵循動機
  - 嚴重違規章節結尾配置 enforcement overview，可提升規則權重
  - 清晰優先、一致優先、可辨識優先；創意被允許，但必須在不破壞全球品牌一致性的前提下發生
  - 將品牌規範拆成六類資料，讓不同團隊用同一種知識結構管理一致性
  - 以品牌四問與 checklist 形成設計交付前的自我審核機制
  - 集團品牌訊息可整合組織內部差異，而不是新增一個口號
  - 策略訊息需要分層 deployment，不是所有資產都同等套用
  - 把 brand message rollout 寫成應用矩陣，是大型組織可複用模式
  - 創意被允許，但必須在不破壞全球品牌一致性的前提下發生
  - 強品牌從不妥協 core，但在 customer context 中探索執行
  - 多市場品牌 guideline 可明確區分 centrally governed identity 與 locally decided activation
