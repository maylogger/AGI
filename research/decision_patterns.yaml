- id: dp-platform-before-visual-rules
  title: 先定義企業策略與語氣，再建立視覺識別工具箱
  problem:
    statement: 大型技術企業若直接寫視覺規則，視覺系統會變成單純新風格，而非品牌平台的執行工具。
    signals:
    - no_strategic_foundation
    - enterprise
    - style_over_system
    - new_identity
    - strategy_refresh
  solution:
    module: Brand Strategy
    move: 先建立 Who We Are → How We Communicate → Brand Platform，再進入 Visual System
    layer: strategy
  reason:
  - 視覺規則需有可回推的語義來源
  - 品牌不是單一標誌，而是組織如何行動與如何溝通
  - 品牌是決策系統，不是美術風格；每個視覺與文案選擇都應能回推到品牌支柱
  - 先建立判斷標準，後續視覺與語氣才有可回溯的語義來源
  - 先把一句品牌主張轉成跨媒體的行為語法，後續版面、動態與字體才有可回溯依據
  - 先寫品牌價值的視覺翻譯，再導入具體資產規則，避免規範只剩任意的角度、色彩與形式
  - 大型品牌更新應先建立「策略語意 → 系統零件」的橋接層，讓設計規則可追溯到品牌目的
  - B2B SaaS 品牌可用少數動詞建立跨產品、受眾與內容的分類基礎
  - 平台品牌要把複雜產品能力轉成可記憶的成長語言
  - 高等教育品牌應以情感與動機連結事實，而不是只堆排名、研究與成就
  - 品牌 guideline 應先建立策略與人格層，否則視覺規範難以在新媒介中自行延展
  - 公共品牌 guideline 應先定義 civic role，再定義視覺系統，否則容易變成施工專案識別
  - 大型服務品牌 guideline 應把品牌價值、服務標準與視覺更新放在同一邏輯中，避免 identity refresh 脫離營運
  - B2B/fintech guideline 可以用一句主張把功能服務升級為體驗平台
  - 品牌故事章可作為後續視覺規則的語義 lint，不只是品牌宣言
  - visual direction 應從產品任務出發，而不只是套用母品牌元素
  - B2B 品牌可透過 consumer-like human voice 抵消企業軟體冷感
  - 視覺指南開頭應解釋「為什麼一致性重要」，而非直接列規格
  - 大型機構可用「核心價值 + 品牌人格 + 資產成熟度」管理跨單位溝通
  - 企業 VI 可以用少量策略詞作為全文件的 semantic anchor
  - 投資促進品牌需要把國家精神轉為客戶成果語言
  - 品牌是決策系統，不是美術風格；每個視覺與文案選擇都應能回推到品牌策略
  - B2B 工程品牌可先把 operational strategy 轉為 visual principle，再規範設計資產
  - 複雜產業品牌可把核心作業方式轉成視覺品質語言
  - 影像型品牌 guideline 可先建立 archive narrative，再設計可授權的視覺模組
  - 用品牌歷史作為 guideline 開場，可降低後續規範看似任意的風險
  - 視覺一致性必須服務品牌定位，而不是只維持美術統一
  - 品牌定位可作為 AI 審稿的 top-level semantic check
  - 產品娛樂品牌可把「experience」而非硬體規格作為品牌溝通核心
  - experience-forward brand system：creative principles → messaging behavior → signature layout → channel
    applications
  - 當品牌進入成熟期，guideline 應明確宣告哪些舊符號被降權、哪些新語氣升級為系統方向
  - 沒有此章，logo 使用只剩機械規格
  - 品牌訊息應能整合組織內部差異，而不是新增一個口號
  - 品牌一致性是中長期 equity 的來源；創新品牌也需要紀律化的識別治理
  - 品牌手冊導言應把設計規範與組織使命連結，提升規則遵從動機
  - 設計系統的可信度來自清楚的 editorial worldview；品牌不是風格集合，而是判斷世界的方式
  - 知識型媒體品牌常先建立思想傳統，再進入視覺規則
  - 品牌規範可將 platform truth 作為所有後續模組的驗收條件
  - 有效的 identity guideline 可先定義「品牌如何看世界」，再定義「品牌看起來如何」
  - 品牌相信互動與共同參與比預製內容更有價值
  - 品牌手冊可先用少量敘事建立決策標準，再把標準交給後續模組實作
  - 品牌 principle 可作為內容、產品與視覺決策的共同評分維度
  - 先宣告 mission，再以 manifesto 建立情緒與社會角色
  - 如果 UX 不快、不清楚，品牌標誌本身無法建立信任
