- id: dp-from-to-voice-translation
  title: 技術品牌語氣指南要給「轉譯規則」，不只是列形容詞
  problem:
    statement: 科學與技術公司容易陷入術語化，受眾停在「所以呢？」而非「原來如此」。
    signals:
    - technical_jargon_risk
    - expert_audience
    - b2b
  solution:
    module: Voice and Tone
    move: 用 from/to 對照把語氣轉型具體化（術語→可親近、數據→人性利益）
    layer: language
  reason:
  - 科學溝通應讓人理解「所以呢」，而不是只展示知識量
  - 提供轉譯規則比列 tone adjectives 更可執行
  - 語氣指南應定義正向特質、負向邊界與轉譯方式，而不只是列形容詞
  - 語氣可用「時間視角」建模，而非只列形容詞，並把功能轉成生活結果
  - 公用事業品牌應避免聽起來像冷冰冰機構，把專業知識轉成鄰近可信語氣
  - tone guideline 若能列出可禁止短語與可改寫技巧，就能被 AI 初步審核
  - 安全品牌應以信心、預防、清晰與業務價值說服，而不是只放大威脅
  - 品牌文案應清楚、有用、有人味，且能把變化描述成可理解的客戶利益
  - 權威不必等於複雜，清楚也是尊重受眾
  - 用 avoid/replace pair 直接轉成 rewrite rule
  - 品牌 voice 可用可觀察語言行為描述，而不只用人格形容詞描述
  - 語氣指南應同時提供判準、禁用風格與實際改寫
  applicable_when:
    industries:
    - industrial_materials_science
    - tech_software
    - finance
