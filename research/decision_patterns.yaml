  - brand_id: kinokuniya_brand_guidelines
    chapter: ch-01-01
    excerpt: 以簡短人格詞建立 creative brief，讓後續每個視覺元素都可回扣到 open-minded、curious、adventurous；素材至少應連結閱讀、學習、交流或探索其中一種目的。
  - brand_id: Laing O’Rourke_identity guidelines_2021
    chapter: ch-01-02
