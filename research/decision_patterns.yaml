      與縮寫，禁用 'we are committed to'，使用直接 action-oriented CTA。
  - brand_id: BlackBerry_Cylance_Brand_Guidelines_2019
    chapter: ch-01
    excerpt: Messaging Stack：mission → mantra → position → pillars → value → allowed claims，把品牌聲音拆成『公司做什麼』與『使用者因此能做什麼』，避免恐懼行銷與術語堆疊。
  - brand_id: BNPP_Brand_creative_bd_2012
    chapter: ch-04-01
    excerpt: 把品牌人格轉成 editorial tone：文案應避免金融術語堆疊，每段主要訊息應包含受眾利益，語氣不得自誇、冷漠或含糊。
