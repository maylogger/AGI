  examples:
  - minimum clear space = 1x o，optimal = 2x o
  - logomark clear space 至少為 mark size 的 50%；logotype clear space 至少為 capital H 高
  - 以 logo K-height 作為 margin 單位，banner margin 通常 30px
  - clear space 為 logo lettering 中 K 高度的 3 倍，minimum size 20mm/75px
  - 以字母 I 的寬度作為 X，protected area 內不得有任何圖形元素
