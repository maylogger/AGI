    chapter: ch-01
    excerpt: 品牌材料應能至少對應到 caring/compassionate、trustworthy、resourceful、professional、strategic 中一項，且不得只呈現需求悲情而缺少可靠分配能力。
  - brand_id: Clayton_Homes_BrandGuideline_2021
    chapter: ch-01-02
    excerpt: 以 on-brand phrases 與 off-brand phrases 建立內容邊界，並用 Smart/Modern/Affordable 與 simple、authentic、optimistic、fun
      等關鍵詞作語氣檢查軸；禁用 mobile homes、trailers、cheap housing 等貶損用語。
  - brand_id: Consistent_communications_Brand_Guidelines_2018
    chapter: ch-01-02
    excerpt: 以 Diversity、Collaboration、Integrity、Ingenuity 四個價值作評估軸，品牌文案需尊重這四項、不得排除非專業受眾或弱化透明度。
  - brand_id: destination_canada_brand_booklet
    chapter: ch-04-01
    excerpt: 六個 brand behaviours（Spark change、Invite love、Unleash pride、Stay open、Be helpful、Speak from
      the heart）形成行為檢核清單；溝通應具備至少一項行為證據，不得冷漠、排外或過度制式。
  - brand_id: eftpos_Brand_Guidelines_2021
    chapter: ch-01
    excerpt: 以「Humble Australian Innovator」連結 down to earth、practical、bold、problem solver、family oriented；溝通應支持
      do good for Australia、test and learn、bold leadership，並避免過度矽谷式抽象創新語言。
  - brand_id: F1_Master_Brand_Guidelines_2017
    chapter: ch-01
    excerpt: F1 必須 intense、commanding、charismatic、audacious；文案應避免 safe/familiar/generic words，設計表現需同時含
      human/fan emotion 與 technical/racing cues，把人格詞轉成可檢查的創意準則。
  - brand_id: LucidMotors
    chapter: ch-01-02
    excerpt: 三支柱框架作為所有產出的評估矩陣：是否清楚、是否前瞻、是否有感染力；支柱應足以成為評審準則，而不是只作為內部口號。
  - brand_id: Google_for_Work_Brand_Book
    chapter: ch-01-03
    excerpt: 用 Our voice is / Our voice isn't 矩陣定義 voice 是 expert、fun、intelligent、casual、charismatic，不是
      egotistical、cheesy、pretentious、IT nerd-speak；正反語氣矩陣可作為文案審核的 rule set。
  - brand_id: Herman_Miller_Brand_Guidelines
    chapter: ch-08
    excerpt: Making Brand Decisions 用 simplify、tell a story、be human、inspire、think big、be spirited 六個
