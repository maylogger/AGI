- id: dp-contact-before-appendix
  title: 在技術資料前先給治理窗口，讓 guideline 成為可改善系統
  problem:
    statement: 規則無法涵蓋所有情境，缺乏權威決策入口時，例外用法無人裁決。
    signals:
    - exceptions_expected
    - governance
  solution:
    module: Governance
    move: 在主內容與 appendix 之間放置聯絡窗口與核准／回饋入口
    layer: governance
  reason:
  - 規則無法涵蓋所有情境，必須提供權威決策入口
  - guideline 應包含 owner 與 feedback channel，而非靜態文件
  - 完整 guideline 不只告訴人怎麼做，也要告訴人遇到不確定時找誰、問什麼、如何判斷
  - 用 governance preamble 把設計規則連到組織風險
  - guideline 需要 owner 與 feedback channel
  - 遇到未定義或抽取不完整的規範時，不應自行推論，應升級至 communication contact
  - guideline 若有審批流程，應明確列出 contact、response time 與 production impact
  - 成熟 guideline 應提供 owner/contact，否則規範無法被執行與更新
  - guideline 需要 owner 與 feedback channel，而非靜態文件
  - 可執行 guideline 必須提供例外處理路徑
  - Design knowledge base 應記錄規則，也要記錄誰有權解釋規則
  - 精簡 guideline 需要明確 escalation path
  - 每份 guideline 都應設計例外處理機制
  - 再完整的 guideline 也需要明確 owner，否則例外會變成非正式口頭判斷
  - 大型活動 IP 規範必須可更新，因 sponsor、權利與營運條件會變動
  - Knowledge Base 應紀錄版本與日期，避免舊規則被錯用
  - 簡短指南也需要 escalation path；品牌開放使用必須同時保留審核通道
  - Guideline 若涉及實體製造，必須把 approved companies 與責任窗口納入
  - 品牌治理要在開發中介入，而不是產出完成後才阻擋
  - guideline 應提供人類治理節點，而不只規則
