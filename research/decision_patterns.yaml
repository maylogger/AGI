- id: dp-monochrome-logo-by-contrast
  title: 用背景對比決定單色標誌，而非開放自由配色
  problem:
    statement: 開放彩色標誌會被任意彩色化，破壞辨識與一致性。
    signals:
    - logo_misuse_risk
    - photo_backgrounds
  solution:
    module: Visual Identity
    move: 以背景明暗與照片複雜度建立對比決策樹，限定白／深色兩種標誌
    layer: visual_core
  reason:
  - 標誌辨識與對比優先；單色策略比多色變體更能保護一致性
  - Logo 顏色規範應基於對比與背景風險，而非只列色票
  - 標誌指南應分離「資產版本」與「使用情境」，由背景與媒介決定版本
  - 背景規則應以「允許背景集合」而非「無限自由」描述，複雜背景預設視為高風險
  - 早期成長品牌需要簡潔可擴張的標誌資產，避免太多變體造成辨識分散
  - 核心識別需少而穩定；例外使用必須被明確圈定
  - logo 規範可將背景分成 light、dark、corporate colour、confused image，對每類給明確版本
  - 小型商標 guideline 的核心是減少選項與例外，而不是建立完整設計系統
  - 變體應是受控 fallback，而不是創意自由
  - logo 應先滿足辨識與對比，再考慮美觀
  - logo usage 可以借用 accessibility contrast concept 讓審核更客觀
  - 可讀性優先於單一色彩執著；背景越複雜越需要更高對比
  - 品牌彈性應以 approved variants 實現，而不是讓使用者創造新 logo
  - logo 色彩規範應明確連到輸出方式與背景品質
  - 背景複雜度是 logo version selection 的關鍵，不應只靠設計者目測
  - 對比與可讀性是 logo 變體選用的主要依據
  - 數位 logo 規範應提供 contrast fallback，而非只禁止錯誤背景
  - 再簡潔的 logo 也會因錯誤背景而不可讀；legibility 是第一判準
  - 版本選擇應由背景條件決定，而非使用者偏好
  - 用背景 luminance/黑度建立 logo 版本規則，比單純列「深色/淺色」更可檢查
  - 背景表面分類可作為任何 logo guideline 的通用檢查框架
