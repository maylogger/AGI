- id: dp-compliance-copy-as-layout-system
  title: 把法規必填資訊設計成固定版面元件，而非事後附註
  problem:
    statement: 受規範產業（金融、保險）的廣告與素材必須帶上法律、監管與揭露資訊，若交由製作者事後手動補上，容易遺漏或破壞版面，造成合規風險與視覺混亂。
    signals:
    - regulatory_compliance
    - required_disclosure
    - layout_consistency
    - mass_touchpoints
  solution:
    module: Compliance
    move: 把 necessary／compliance copy 設計成固定容器（如 signature bar）與依 division／產品分類的 required-fields 清單，讓法規資訊成為版面系統的一部分
    layer: governance
  reason:
  - 規定資訊若被設計成系統元件，就能降低遺漏與版面混亂
  - 法規文字可依 division 類型轉成 required fields，確保每種素材帶齊對應聲明
  - 規定資訊不應是最後加上的註腳，而是品牌版面的一部分
