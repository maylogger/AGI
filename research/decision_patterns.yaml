  - brand_id: Huawei_Visual_Identity_Guidelines
    chapter: ch-02-01
    excerpt: co-branding 必須取得授權並送 Brand Management System 審核，不得單獨使用 symbol、加入部門名或裝飾化。
  - brand_id: Huawei_Visual_Identity_Guidelines
    chapter: ch-08
    excerpt: 建築與接待標識不得改造 corporate logo，特殊場地需諮詢 Brand Management System，把空間例外導回品牌治理單位審核。
  - brand_id: IBM_ThinkSummit_2020
    chapter: ch-08
    excerpt: 贊助露出、內容 activation 與新增細節應通過 review and approval process，使用者依 contacts 尋求核准；贊助與內容是最容易偏離的部分，因此放在
      toolkit 末尾建立 escalation and approval module。
  - brand_id: ICBA_corporate_Brand_guidelines_2020
    chapter: ch-03-01
    excerpt: 一般 ICBA 品牌素材應使用 primary logo，secondary logo 僅在空間受限或內部 staff-facing 文件使用；變體存在是為了解決限制，不是為了任意風格化。
  - brand_id: ICBA_corporate_Brand_guidelines_2020
    chapter: ch-01
    excerpt: 所有對外 mass production/dissemination 素材需在最早 proof stage 交由行銷支援人員審核，審核至少預留兩個工作天，把品牌一致性轉成可治理的審核節點。
  - brand_id: Laing O’Rourke_identity guidelines_2021
    chapter: ch-03
    excerpt: 涉及例外或 motif 使用時應聯絡 Corporate Affairs；未授權員工不得自行使用 motif 或 Ginger，成熟企業 guideline 應把例外權限寫入規則。
  - brand_id: Laing O’Rourke_identity guidelines_2021
    chapter: ch-03-02
    excerpt: Ginger 不得由員工未經許可使用，需配合 Corporate Affairs/設計師授權；font guideline 應包含授權與供應商限制。
  - brand_id: McDelivery_brandbook_2017
    chapter: ch-03
    excerpt: logo variants 僅在 standard logo 不可能使用時使用；每種變體需 McDonald’s marketing lead in your market approval，變體是例外而非新的自由選項。
  - brand_id: Mercedes_Benz_BrandStandards_2015
    chapter: ch-01-02
    excerpt: consultation lifecycle：question → pre-approval → validity window → monitoring → eligibility
      decision；consult approval 有效期 60 天，website review 七日 turnaround。
  - brand_id: MG_investments_identity guidelines_2014
    chapter: ch-01
    excerpt: 新 artwork、design element、template、supplier 或 agency 必須經 Global Marketing Director / Design
      & Print team 核准；所有尺寸以 mm 為準、不得從螢幕或列印稿量測。
  - brand_id: MG_investments_identity guidelines_2014
    chapter: ch-09
    excerpt: 回到開頭的 approval governance 並補足語言層面一致性；新代理商需核准、新設計或模板需審批。
  - brand_id: RenasantBank_brandstandards_2020
    chapter: ch-06
    excerpt: 官方素材需向 Marketing 取得、工作檔不共享，例外需提交 Director of Marketing & Public Relations；把例外與資產修訂權收回品牌管理單位。
  - brand_id: RenasantBank_brandstandards_2020
    chapter: ch-02-03
    excerpt: department logos 只能由 Renasant Marketing request and approval 建立，且仍受本文件與個別附加規範約束；部門需求須進入審批流程而非各部門自創。
  - brand_id: sartorius_Brand_Style_Guide_2020
    chapter: ch-02
    excerpt: signet 是例外資產，需要 Corporate Branding & Design 核准、不取代標準 logo；exception framework：space constraint
