- id: dp-restraint-as-luxury-signal
  title: 用克制與內隱表達奢華，而非高頻奢華詞堆疊
  problem:
    statement: 高端品牌若靠大量「奢華」字眼與華麗裝飾堆疊來證明自己高級，反而顯得用力、廉價，稀釋了真正的高端感。
    signals:
    - premium_perception
    - restraint
    - exclusivity
    - brand_overclaiming_risk
  solution:
    module: Voice and Tone
    move: 以「X but not Y」二元語氣定義邊界，並用禁用／慎用詞清單讓奢華內隱於精準與克制
    layer: language
  reason:
  - 奢華應內隱，不靠高頻 luxury 詞堆疊
  - 精緻但不炫耀，自信但不傲慢，英式但外向，奢華但不硬賣
  - 高端品牌文案需檢查詞義準確與詞頻疲乏
  - 奢華品牌的 discount framing 本身就是品牌破壞，即使價格資訊合法，也可能因語氣與呈現方式造成商品化
  - 高端語氣可以談 opportunity、offer、experience，但不可把價值框成折扣或庫存壓力
  - 用「禁用語 + 可接受替代語」治理文案，比只說 tone 要 premium 更可執行
  applicable_when:
    industries:
    - luxury_premium
    brand_types:
    - premium_luxury
    - heritage_legacy
    conditions:
    - premium_perception
    - mature_brand
    archetypes:
    - brand_experience_guide
    - full_brand_system
  dependencies:
    requires:
    - Brand Strategy
    enables:
    - Content Design
    conflicts_with: []
  examples: []
  anti_patterns:
  - 過度使用 luxury/luxurious 作描述詞
  - 用 exquisite、covetable、iconic、unique 等高風險詞堆疊撐場面
  - 使用 discount、clearance、liquidation、blowout、overstocked 等 distress language
  - 把產品價值框成折扣或庫存壓力
