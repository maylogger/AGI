    excerpt: 使用 I amsterdam 的內容應至少能對應 creativity、innovation、entrepreneurship 之一；若素材無法連結城市價值，應避免使用 label，讓核心價值成為內容評估準則。
  - brand_id: KABOOM_Brand Book_2020
