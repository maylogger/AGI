- id: dp-asset-protection-for-legacy
  title: 把歷史品牌的核心識別當成不可妥協的資產來保護
  problem:
    statement: 歷史悠久的品牌，其 logo、色彩與材質是長期累積的資產；任何外部合作或內部輸出都可能在不經意間稀釋它。
    signals:
    - heritage
    - asset_protection
    - consistency_over_time
    - brand_dilution_risk
  solution:
    module: Visual Identity
    move: 把 symbol/wordmark 定為不可妥協資產，明訂 official file、allowed context、prohibited modification 與過渡期限
    layer: visual_core
  reason:
  - premium brand 的一致性是一種品質承諾；商標資產不得變成功能圖示或裝飾素材
  - 保護核心識別，讓所有合作與輸出不削弱品牌資產
  - 保護歷史奢華零售品牌的核心識別，讓所有合作與內部輸出不削弱品牌資產
  - 奢侈品牌的顏色是資產，不是裝飾選項
  - 高端品牌規範應明確處理光學校正與印刷材質
  - 保護高信任機構的核心識別，讓所有合作與內部輸出不削弱品牌資產
  - master artwork 是唯一正確來源，logo 的比例、顏色與元件關係固定
  - 機構規範應明確處理色彩重製與最小尺寸
  - 高辨識符號需要保護完整性與上下文，不只保護圖形本身
  - 不得讓合作夥伴視覺高於 Mercedes-Benz 品牌層級
  - 豪華品牌的地方行銷不可看起來像地方小店，必須吸收中央品牌的比例、留白與字體
  - 長壽品牌需要少量不可動搖元素來支撐大量產品變化
  - Logo prominence 必須高於產品子品牌與版面裝飾
  - 品牌 foundation 可抽象為 invariant elements
  - 國家級品牌的標誌規範不只維持美觀，也是在維護象徵尊嚴、政治語境與公共信任
  - 辨識度來自一致性；例外只能由使用情境觸發，不能由主觀喜好觸發
  applicable_when:
    industries:
    - luxury_premium
    - finance
    - media_entertainment
    - public_sector
    brand_types:
    - heritage_legacy
    - premium_luxury
    - institutional_public_trust
    conditions:
    - heritage
    - asset_protection
    archetypes:
    - brand_experience_guide
    - corporate_toolkit
    - logo_asset_guidelines
  dependencies:
    requires:
    - Visual Identity
    enables:
    - Governance
    conflicts_with: []
  examples: []
  anti_patterns:
  - 把 BMW symbol 當裝飾或功能元素
  - 在正文以 symbol 替代 BMW 名稱
  - 以螢幕或列印稿視覺匹配色彩，造成跨媒介色差
  - 允許合作方任意替換金屬色／foil 與核心色
  - 允許重畫或重組 logo 元件
  - 把 Star、word mark 或 claim 與非核准品牌鎖定
  - 讓合作夥伴或經銷商以任意字體與版面稀釋品牌
  - 讓其他元素凌駕 Sony master brand
  - 允許自由改變 lockup、間距、字標、symbol 形狀、旋轉與比例
  evidence:
  - brand_id: BMW_Clubs_2020
    chapter: ch-02-02
    excerpt: Brand Asset Protection Framework：BMW symbol 只能在 club logo 內使用，不得改 form/color、不得當裝飾/功能元素，並設
      2022-01-01 過渡期限。
  - brand_id: CalvinKlein_Logo&GraphicGuidelines_2017
    chapter: ch-01-02
    excerpt: 2017 識別定位為從 1975、1992-2016 演化而非斷裂式換標，歷史熟悉感是全球品牌 scale 的資產。
  - brand_id: CalvinKlein_Logo&GraphicGuidelines_2017
    chapter: ch-02-05
    excerpt: 所有 logo 不得改字體、改粗細、拆分元件、用 Klein font 重建 logo；應使用官方 EPS/PNG/JPEG master file，不可重畫。
  - brand_id: CDB_BrandIdentityManual
    chapter: ch-02
