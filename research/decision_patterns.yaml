- id: dp-system-toolkit-over-template
  title: 企業視覺系統給「可組合工具箱」而非僵硬模板
  problem:
    statement: 要求每個版面長得完全相同會扼殺多元內容；但完全自由又會失去一致性。
    signals:
    - many_teams
    - many_agencies
    - diverse_content
    - system_consistency
    - mass_touchpoints
  solution:
    module: Visual Language
    move: 把識別定義為可獨立或組合使用的 core elements（tools, not a rigid system），用固定決策順序取代固定模板
    layer: visual_core
  reason:
  - 彈性必須被結構化；系統不靠固定模板，而靠固定決策順序
  - 元素可獨立使用也可組合，支援多元內容又維持辨識
  - 用受控的技法集允許創意變化又維持辨識
  - 彈性必須被結構化；多規則系統要簡化成少數可延展原則
  - 彈性必須被結構化；系統不靠固定模板，而靠共同核心元素
  - 多品類文化品牌可用同一設計基礎支援多節目，而非為每節目建立子品牌
  - 品牌可辨識度來自元素之間的持續關係
  - 彈性必須被結構化；用可擴展的幾何 building blocks 兼顧 variety 與 cohesion
  - 彈性必須被結構化；圖形元素應提供家族相似性但限制同時使用量
  - 圖形庫應包含 skill rating 與禁止組合規則，支援品質治理
  - 彈性必須被結構化；產品差異應發生在受控模組內，不能破壞 master brand
  - 當產品多且變動快，guideline 需要提供 construction formula 而非逐一客製
  - 彈性必須被結構化；全球航空品牌需要 robust and flexible graphic platform
  - toolkit 章應定義元素之間的關係，因一致性通常毀在比例、位置與搭配，而非資產本身
  - 圖形元素必須源自 logo，並保持角度與圓角語彙一致
  - 品牌圖形語言可從 logo 幾何特徵萃取，再以「來源、可用色、透明度、禁用」治理
  - 品牌裝置應同時有表現力與限制，才能高辨識又不混亂
  - 視覺裝置 guideline 應把「目的動詞」與「幾何規則」一起定義
  - 彈性必須被結構化；城市品牌的可變性必須來自預先定義的元件，而不是任意自由設計
  - 彈性識別系統需要「可變範圍」與「不可變限制」同時明確
  - 彈性必須被結構化；品牌版面應靠少量比例規則創造可辨識性，而非硬鎖每個元素位置
  - 口號可被抽象為可量測的 lockup / tile system，而不是文案附屬品
  - 彈性必須被結構化；把 reference guide 當作彈性邊界，而非單一模板，是成熟版面系統模式
  - 更多空間不代表需要更多內容；Sony black 本身就是有力內容
  - 廣告 guideline 可抽象為 parametric layout system
  - 設計系統最好從核心 logo primitives 派生，而不是另加裝飾素材
  - 彈性必須被結構化；品牌指南需要定義哪些是不可變核心、哪些是可變表現空間
  - Guideline 可以用「核心嚴格、應用彈性」避免過度規範
  - 輔助圖形應有生成規則，而不是一次性插圖集合
