- id: dp-modular-manual-for-public-units
  title: 用「可辨識但不獨立」的層級框架治理多機構／多單位品牌
  problem:
    statement: 大型多機構、多單位組織，各單位都想要自己的識別，若無分層治理，品牌會裂解成互相競爭、削弱母品牌的子品牌。
    signals:
    - multi_unit_consistency
    - multi_entity
    - sub_unit_identity
    - brand_architecture_complexity
  solution:
    module: Brand Architecture
    move: 先建立「誰在說話」的判斷層，再以 umbrella → member → 子單位 → lockup → special case 的層級把組織結構視覺化
    layer: governance
  reason:
  - 局部單位可以被識別，但不能競爭或替代母品牌
  - Brand architecture 應為子品牌定義「固定母品牌元件」與「可自由設計元件」
  - 品牌整併指南需要解釋歷史原因，否則團隊會延續舊子品牌慣性
  - 大型機構應把 brand architecture 規則做成分類決策樹，而不是只列範例
  - 大型公共組織可用 endorsed brand 模式讓服務有個性但不分裂
  - 品牌社群可有地方個性，但不能犧牲母品牌價值與官方可辨識性
  - 公共品牌常需在倡議、施工、社群與營運中轉換身份，因此必須規範背書與應用層級
  - 大型系統可用「可辨識但不獨立」的 secondary line 管理內部單位
  - 任何多實體品牌系統都需要先建立「誰在說話」的判斷層，再談 logo 放置
  - 子品牌應有差異，但差異必須透過主系統控制，而不是另起爐灶
  - 子品牌系統可用「共享母構件 + 專屬色彩 + 固定應用模板」達成治理
  - 企業品牌可用有限例外管理 portfolio complexity
  - 以 approved lockup library 管理子業務，而不是建立自由子品牌系統
  - 附屬單位可以被識別，但不能凌駕或稀釋母品牌
  - 多社群品牌需要共同母系統與差異化子系統同時存在
  - unity, not uniformity；多元需要透過可治理的變體表達
  - 多層活動品牌應用 lockup taxonomy 管理主從關係
  - 大型會議的子活動可以用同一 lockup grammar 建立可辨識家族
  - 不同品牌層級應有不同的母品牌可見度與獨立性
  - guideline 應定義母品牌、內部品牌、子品牌各自的識別繼承規則
  - 子業務不得自行發明與核心品牌無關的識別
  - 多業務品牌應把「共享哪些元素」「差異化哪些元素」寫成可檢查矩陣
  - 組織架構可以透過受控延展表達，而不是讓每個 division 自行設計
  - 多部門品牌應建立命名槽位、位置與比例規則，以避免品牌碎片化
  - 品牌資產應反映組織結構，而不是只反映視覺偏好
  - 多身份品牌應在 guideline 中建立 logo selection decision tree
  - 文化機構 guideline 應把「總管理機構規則」寫在開頭，避免地方品牌與母體規範衝突
  - 母機構 charte 與子品牌 palette 可透過「字體遵母、色彩取子」方式共存
  - 品牌架構應讓差異可被看見，但不能削弱 master brand
  - 分支或顧問團隊需要可見性，但不得高於主品牌
  - 企業品牌延伸應設計「允許的可變欄位」而非開放式客製
  - 品牌家族需要一致的識別語法，但不同產品可保留名稱與媒介差異
  - 多品牌系統應把 logo 家族依用途分類，而不是把所有資產平鋪
  - 多品牌大學可用 lockup governance 控制學院與研究單位擴散
  - 品牌資產擴張必須回補 masterbrand，而不是抽離或稀釋它
  - 子品牌應服務導航與內容辨識，而非建立與 masterbrand 競爭的新品牌
  - division endorsement 必須可見、可辨識，不能只當法律附註
  - endorsement tagline 是 brand architecture 與 legal governance 的交會點
