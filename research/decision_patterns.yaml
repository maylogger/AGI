- id: dp-media-split-typography
  title: 依媒介分流字體系統（print / digital / body）
  problem:
    statement: 同一字體在印刷與數位、標題與內文的需求不同，混用會犧牲可讀性或授權合規。
    signals:
    - print_and_digital
    - readability
    - licensing
  solution:
    module: Typography System
    move: 區分 print font、digital font 與 secondary/body font，並各自規範字級與行距
    layer: visual_core
  reason:
  - 不同媒介的可讀性與授權條件不同
  - 字體規範應搭配用途說明，而非只列字體名稱
  - 文書 guideline 應依「可由一般員工操作」設計，而非只依設計部門工具
  - typeface policy 應依 production environment 分級
  - 品牌字體需要有可取得的替代方案，否則規範無法在組織內落地
  - Office 場景需提供可替代字體以維持一致
  - typography guideline 應把 font choice 轉成 content role mapping
  - 企業字體系統不是單一品牌字體，而是依媒介、內容量與語言建立 fallback architecture
  - Typography guideline 應把「語系」納入字體治理，尤其是全球 B2B 品牌
  - 字體治理可依「品牌資產、廣告溝通、日常 email」拆分
  - 金融 guideline 應把排版規則與法規披露連接
  - typography guideline 應明確定義媒介 fallback，而非只指定美術字體
