- id: dp-clearspace-from-logo-geometry
  title: 用標誌自身幾何定義留白，讓 spacing 隨縮放成立
  problem:
    statement: 用固定像素定義 clear space，在不同尺寸與媒介會失效。
    signals:
    - scaling_inconsistency
    - multi_media
  solution:
    module: Visual Identity
    move: 以標誌幾何（logo height）作為相對留白與尺寸基準
    layer: visual_core
  reason:
  - 版面一致性來自比例關係，不只是絕對尺寸
  - 留白以標誌自身元素為單位，可隨縮放維持比例
  - 政府品牌可用「歷史符號 + 現代量測系統」同時維持合法性與執行效率
  - 以一個核心變數 x 管理整套 logo 尺寸，是可納入 design token / rule engine 的高價值模式
  - 留白是識別權重與可讀性的保護機制，需隨標誌縮放
  - 相對單位可建立 scalable spacing token，不被固定像素綁死
  - 以相對單位而非固定尺寸定義 clear space，能適用於不同 logo 尺寸
  - logo 的空間關係與元件本身同等重要
  - 對數值抽取不可靠的文件，保留比例規則比猜測數字更安全
  - 用 logo 內部元素作為量尺，可讓 clear space、diamond、grid 都有同一基準
  - logo guideline 應區分 artwork variant 的 optical purpose，避免只寫單一最小尺寸
  - 空間本身是品牌資產，logo 尺寸應搭配版面空間而非跟版面成正比放大
  - 相對單位可建立 scalable spacing token，使 print/digital 共用規則
  - 用品牌字母局部作為測量單位，是常見且可複用的 clear-space pattern
  - 可變的是應用媒介，不可變的是 logo 形狀、比例、顏色與辨識位置
  - 定位彈性應搭配明確的不可變條件，才能讓品牌不僵化也不失控
  - clear space 可以選擇最容易被視覺辨認的內部元素作為尺度
  - icon 規格需要可縮放的比例系統，而不只是固定像素
  - 用 X-based spacing 讓 icon 在不同尺寸下仍能被一致再製
  - clear space 應與 logo 自身比例相連，而不是固定任意數值
  - 使用 logo 自身元素定義安全區，可讓規則自然縮放
  - clear space 若綁定標誌本身幾何，可跨尺寸自動化檢查
  - 可讀性可透過比例公式治理，而不是靠設計者目測
  - 用 logo 作為尺寸 token，可讓版面、claim 與 signet 共用同一套量測邏輯
  - 清除空間應與品牌資產內在比例相連，而非固定任意距離
  - 可縮放的 clearspace 規則比固定像素更適用於多尺寸場景
  - 用內部元素作比例尺，可讀性、階層與比例一致比局部創意更重要
  - 使用品牌內建比例作為 spacing token，可避免跨尺寸重新定義
  - 比例型 clearspace 易於跨尺寸自動計算
  - 最小尺寸、clear space 與檔案版本是 logo 系統的三個基本治理點
  - clear space 應隨 logo 等比縮放，而非固定絕對值
  - clear space token 最好取自品牌符號，使規則具可視化記憶點
  applicable_when:
