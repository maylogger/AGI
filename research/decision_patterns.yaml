  examples:
  - from technical jargon → to personal and accessible
  - from facts and figures → to human stories with benefits
  anti_patterns:
  - 只列 tone adjectives 卻沒有轉譯方法
  - 只列品牌成就而不連到顧客生活
  - 使用 jargon、acronym 或 'we are committed to' 等空話
  - 把 AI/ML 同句重複堆疊
  - 文案堆疊金融術語
  - 語氣自誇、冷漠或含糊
  evidence:
  - brand_id: 3M_Visual_Identity_Guidelines_2015
    chapter: ch-01-03
    excerpt: Voice Transformation Framework：smart→accessible、facts→benefits、so what→ah-ha；用 from/to 對照把語氣轉型具體化。
  - brand_id: AMD_branding_guidelines_2020
    chapter: ch-01-02
    excerpt: 語氣應 forthright、clear、confident，從技術能力轉譯為使用者利益，不可只列產品功能；自信來自證據與清楚度，而非誇張修辭。
  - brand_id: AXA_Design_principles_2017
    chapter: ch-06
    excerpt: 語氣可用 Bigger Picture / Now / Progression 的時間視角建模，而非只列形容詞；文案應以顧客為受益者，把功能轉成生活結果，不可只列 AXA achievements。
