- id: dp-personality-words-as-evaluation-criteria
  title: 把人格詞做成創意評估準則
  problem:
    statement: 抽象企業價值無法指導產出，設計與文案缺乏共同判斷語彙。
    signals:
    - abstract_values
    - needs_evaluation_criteria
    - inconsistent_outputs
  solution:
    module: Brand Strategy
    move: 用人格詞集（Curious/Sharing/Free Thinking/Caring/Optimistic）當每個產出的檢查軸
    layer: strategy
  reason:
  - 人格詞應能成為產出評估標準，而不是僅作品牌牆口號
  - 技術品牌不應冷硬；科學可以是好奇、慷慨且樂觀的
  - 可複用為 brand voice QA rubric，用正向特質與負向偏差共同審核
  - voice attribute matrix：desired quality 對應 prohibited drift
  - AI 品牌人格應明確限制人性化程度，避免 false anthropomorphism
  - 內容 guideline 可將抽象品牌語氣轉成 checkbox 與 brief 欄位，支援生成前檢查
  - 好的人格系統需要能排除錯誤風格，而不是只列出理想形容詞
  - 品牌訊息 guideline 可用少量關鍵詞與排除規則建立 LLM 可評分的語氣模型
  - 服務品牌的 guideline 可把價值清單設計成 creative reality-check
  - 非營利品牌需要同時表達 compassion 與 operational credibility
  - 三支柱可作為所有產出的評估矩陣：是否清楚、是否前瞻、是否有感染力
  - 品牌支柱應足以成為評審準則，而不是只作內部口號
  - mission/value 可被轉譯為 accessibility、tone 和 partnership governance 的檢查規則
  - 將 values 寫成動詞短句，可讓審稿者檢查行為是否出現
  - 品牌行為要能指導組織成員，而不只是外部廣告調性
  - 品牌價值可寫成內部工作方式，而不只是對外形容詞
  - 正反語氣矩陣可作為 AI 文案 reviewer 的 rule set
  - guideline 可把「好不好」轉成創意評估清單
  - 每個範例標註使用了哪些 guideposts，讓評估可被學習
  - 任何識別應用需能合理支持品牌屬性，否則應退回檢查
  - 品牌價值若要可執行，需附上語義括號與證據來源
  - 文化型品牌可用 purpose 作為內容篩選器，避免把文化只當裝飾
  - guiding principles 可作為跨章節 lint rules
  - 設計若使資訊更複雜、不可讀或缺少整體關係，即違反原則
  - 每個語氣原則搭配 avoid criteria，是可 AI 化的文案治理模式
  - 不要直接說 bold、inviting、fun、premium，而要讓語氣表現出來
  - 品牌 guideline 應把人格特質寫成後續 voice 與 visual 的判準
  - 人格章節可成為後續文案、攝影與版面的感性校準器
  - 品牌 principle 可作為內容、產品與視覺決策的共同評分維度
  - 用少量動詞式原則作為 SDK 與 UI 規格的上層判準
  - 金融 UX 可把安全感拆成速度、清楚、品牌提示與預測性
