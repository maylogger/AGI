  - 把品牌只當成單一標誌而非可組合的識別零件
  - 把單一 logo 使用視為完整 identity
  - 為每個藝術形式另建與核心無關的獨立視覺
  - 讓 pattern 與前景 copy 競爭，傷害可讀性
  - 單件設計同時使用過多 graphic element 造成過度裝飾
  - 對每個產品逐一客製，產生孤島
