- id: dp-approval-gate-for-exceptions
  title: 例外不是漏洞，用審核閘門把差異收進可治理的模組
  problem:
    statement: 規則無法窮舉所有情境，現實組織總會有例外；若放任各單位自行決定，例外會逐步擴張成破壞系統的破口。
    signals:
    - exception_handling
    - multi_unit_consistency
    - governance
    - scaling_risk
  solution:
    module: Governance
    move: 例外章節須明確寫出「為何例外／何時可用／不可擴張到哪裡」，並交由品牌管理單位審核
    layer: governance
  reason:
  - 例外應回到品牌團隊，而不是由使用者自行決定
  - guideline 不是靜態真理，而是可被維護的治理文件
  - 例外應回到品牌團隊，而不是由地方社群自行解釋
  - 嚴格 guideline 必須搭配明確支援通道，否則地方社群會自行解釋
  - 例外章節應寫出「為何例外」「何時可用」「不可擴張到哪裡」
  - 品牌一致性不是取消差異，而是把差異收進可治理的模組
  - 品牌治理文件應同時包含設計規格與組織審批路徑，否則規範無法被執行
  - 任何大型活動 guideline 都應包含外部夥伴品牌露出的審核規則
  - 變體存在是為了解決限制，不是為了任意風格化
  - 品牌規範需要審核節點，否則指南只會停留在參考文件
  - 成熟企業 guideline 應把例外權限寫入規則，而不是假設所有使用者都能判斷
  - font/asset guideline 應包含授權與供應商限制，而不只是視覺偏好
  - 變體是例外，不是新的自由選項
  - 變體章節應明確標示「何時不能用標準版」而非只展示可用資產
  - 規範必須搭配治理通道，否則例外與新媒介會快速破壞一致性
  - 任何高風險品牌 guideline 都應定義「誰能核准」「核准多久有效」「哪些問題不在服務範圍」
  - guideline 開頭應同時建立品牌理由、使用範圍與 approval authority，否則後續規格缺乏治理力
  - 品牌不只由設計師執行，所有寫作者、供應商與代理商都需要一致準則
  - guideline 應包含 escalation path 與 content rules，不只提供設計規格
  - 越簡化的品牌符號越需要更高審批門檻；把簡化資產視為 exception 而非 alternative 可降低品牌漂移
  - 活動或 campaign 可有 word mark，但不得脫離主品牌
  - 例外章節應寫出「何時可用」「不可擴張到哪裡」並交由審核
  - 全球品牌訊息需要明確的 authority、timebox 與 localization exception
  - Design knowledge base 應保存 guideline 的法律階層與生命週期
  - 生活風格品牌需要彈性，但彈性必須被核准與最低身份規則約束
  applicable_when:
