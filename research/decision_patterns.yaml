- id: dp-accessible-contrast-pairs
  title: 把可近用性前置成核准對比配色，而非設計者自行判斷
  problem:
    statement: 公共資訊面向全體市民與輔助科技，若放任設計者自由配色，容易產生不符合無障礙標準、身心障礙者無法閱讀的組合。
    signals:
    - accessibility
    - public_trust
    - inclusive_audience
    - regulatory_compliance
  solution:
    module: Accessibility
    move: 把色彩與可及性合併，提供大／小文字的核准對比配色矩陣（allowed pairings）
    layer: visual_core
  reason:
  - 用 approved contrast pairs 降低設計者自行判斷錯誤
  - 色彩章可同時提供品牌情緒、數值 token 與可及性文字使用矩陣
  - 公共機構不應把可近用性視為加分項，而是最低標準
  - 在公共空間 guideline 中，color chapter 應明確包含 contrast，因它直接影響可近性與法規風險
  - accessibility 是品牌可信度的一部分，不是事後檢查
  - 用 poor/good/excellent contrast 對照降低設計者自行判斷錯誤
  - 機構不應把可近用性視為加分項，而是最低標準
  - 鮮明色彩不能犧牲對比與可用性
  - 可用性優先於裝飾性，色彩限制優先於創意擴張
  - 把色票寫成封閉集合，方便自動檢查
  - 可近用性可以被寫成 design token 與 contrast pair governance
  - 成熟色彩 guideline 應包含 tint ladder 與 contrast suitability，而不只是 palette
  - 品牌信任感來自使用者能找到、讀懂、快速載入並無障礙使用內容
  - 色彩不只表現品牌，也要服務 accessibility 與數位狀態
  - 可近用性應被寫成數值標準與觸發條件，而非附加建議
