  - brand_id: LucidMotors
    chapter: ch-01-03
    excerpt: Story Framework 解決同一品牌在不同接觸點該說多少、說多深的問題；Attract/Engage/Connect 從情緒與大概念，到利益說服，再到具體功能與決策資訊。
  - brand_id: klarna_visual_identity_guidelines_2019
    chapter: ch-01
    excerpt: Social coherence model：Disrupt=brand awareness、Attract=product awareness、Engage=product understanding、Join=product
      sign-up；讓不同渠道依溝通目的調整品牌強度，而非平均使用所有資產。
  - brand_id: klarna_visual_identity_guidelines_2019
    chapter: ch-01-02
    excerpt: 越接近轉換越需要 clarity，越遠離轉換越能使用情緒與怪奇感；Join 階段不得使用 emotional stills，Engage 以 feature illustrations
      為主。
