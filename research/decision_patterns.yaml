  - brand_id: AMD_branding_guidelines_2020
    chapter: ch-01-09
    excerpt: Governance Loop：使用規則 → 遇到例外 → 聯絡品牌團隊 → 核准或更新；例外應回到品牌團隊，而不是由使用者自行解釋。
  - brand_id: BMW_Clubs_2020
