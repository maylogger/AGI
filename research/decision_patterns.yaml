  - 識別工具章應同時處理核心標誌與延伸語言，避免只保護 logo 而忽略實際接觸點
  - logo 選擇規則應由 audience context 與 legal/official context 驅動
  - 商標 guideline 應把 asset use case 明確分層，避免單一 logo 被迫承擔所有任務
  - 越具象徵性、越接近品牌核心的符號，越需要嚴格控制
  - 品牌識別不必同權限；可依風險分層管理
