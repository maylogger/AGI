- id: dp-bold-contrast-for-challenger
  title: 用單一高彩度主色建立 equity，並以可用／禁用配色維持張力
  problem:
    statement: 挑戰者品牌需要在飽和市場中快速被認出並表達鮮明個性，溫和保守的配色會被淹沒。
    signals:
    - differentiation
    - breakthrough_attention
    - personality_expression
  solution:
    module: Color System
    move: 以單一高彩度品牌主色建立辨識 equity，並明確列出「可用組合／禁用組合」與比例上限維持張力與一致
    layer: visual_core
  reason:
  - 以 signature 主色作品牌 equity，secondary palette 只能輔助而非取代
  - 色彩比例上限是比「use sparingly」更可執行的治理方式
  - 高飽和 accent colors 用於 charts、buttons、產品差異，不應濫用
  - 以 Blurple 作品牌 equity，產品狀態色負責語義，user-content 色負責多彩活力
  - 色彩規範可明確列出「可用組合」與「禁用組合」，便於審稿與可讀性檢查
  - 品牌主色不一定大量使用，反而可透過少量高對比建立權威
  - 色彩比例規範可把「少用主色」轉成實際審核標準
  - 品牌色比節慶色更重要；不應為 tactical themes 犧牲辨識
  - 色彩 guideline 可包含「拒絕節慶色」規則，保護 brand distinctiveness
  - 高辨識色彩讓品牌在多媒介中快速被認出
  - 以單一強識別裝置統一多種廣告版面，比逐張設計更一致
  - green bar 不應被改色、過度裝飾或破壞內容可讀性
  - 高能量色彩需要透過限制數量與背景對比維持焦點
  - 色彩規範同時處理「可用」與「過量使用」問題
  - 可近用性應直接寫入品牌色規則，而不是交給設計者事後判斷
  - 核心色彩建立辨識，次要色彩提供速度感、玩心與活動彈性
  - 少量核准搭配比大量理論色彩更能維持品牌一致性
  - secondary color 不得取代 Twitch Purple 的核心識別角色
