- id: dp-responsible-framing-for-regulated-category
  title: 用「禁止聯想清單＋責任框架」治理受規範類別的合作夥伴文案
  problem:
    statement: 金融、健康等受規範或高風險類別的品牌，常透過大量第三方（商家、夥伴）對外溝通；若只給正面賣點而不框限風險，文案容易變成誤導、刺激消費或違反法規。
    signals:
    - regulatory_compliance
    - third_party_usage
    - content_safety
    - misleading_risk
  solution:
    module: Content Design
    move: 同頁提供「可說／不可說」與禁止聯想清單，並要求賣點與條款（disclaimer）並陳、保留資格與限制資訊
    layer: language
  reason:
  - 描述服務利益時必須同時保留責任與限制，避免誤導
  - 用 forbidden association list 管理受規範類別的品牌風險
  - 高風險服務的 guideline 應先建立價值與顧客心理模型，再開放 partner 使用轉換型文案
  - 用 forbidden term/association list 管理高敏感類別的品牌風險
  - AI 產品廣告需同時檢查語句、聲音時序、使用者姿態與禁止概念
  - 描述能力時必須保留精確與可佐證性，避免誤導
  - cybersecurity 詞彙很容易擴大或混用，fear 不應作為購買誘因
  applicable_when:
    industries:
    - finance
    - tech_software
    brand_types:
    - platform_ecosystem
    - challenger
    conditions:
    - regulatory_compliance
    - third_party_usage
    - content_safety
    archetypes:
    - brand_experience_guide
    - corporate_toolkit
  dependencies:
    requires:
    - Brand Strategy
    - Messaging
    enables:
    - Compliance
    - Content Design
    conflicts_with: []
  examples: []
  anti_patterns:
  - 只給正向賣點不附條款（disclaimer）
  - 用高壓促銷或誤導折扣語氣包裝受規範服務
  - 只給正向賣點不附限制條件
  - 放任 partner 自由描述高敏感功能
  - 用 superlatives 卻無第三方 citation
  - 用恐懼放大作為購買誘因
  evidence:
  - brand_id: Afterpay_Merchant_Guidelines_US_2020
    chapter: ch-03-01
    excerpt: 同頁提供『How to talk』與『How not to talk』形成明確語義邊界，用 forbidden association list 管理金融服務品牌風險；不得關聯
      gambling、paylending、overspending、unmanageable debt。
  - brand_id: Afterpay_Merchant_Guidelines_US_2020
    chapter: ch-01
    excerpt: 高風險服務的 guideline 應先建立價值與顧客心理模型，再開放 partner 使用轉換型文案；不得把 Afterpay 描述成 credit card、loan shortcut
      或鼓勵 overspending。
  - brand_id: Amazon_Echo_Alexa_Guidelines_External
    chapter: ch-03-06
    excerpt: 以 do / don't 清單管理 Alexa 呈現：不得稱 always listening、platform、robot；utterance 須測試 3 次且 wake word
      置於開頭，並設兒童內容限制，避免誤導與隱私想像。
  - brand_id: BlackBerry_Cylance_Brand_Guidelines_2019
    chapter: ch-04-01
    excerpt: Semantic Precision Framework：superlatives 需第三方 citation，不確定 tactic 時用 threat，fear 不作為購買誘因，並規範
      malware/threat/attack、AI/ML 的使用情境。
