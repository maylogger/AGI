  - 放任第三方自行判斷法律與背書風險
  - 只說「請遵守」卻不提供審核單位與表單
  evidence:
  - brand_id: accoya_brand_guidelines_2015
    chapter: ch-01-01
    excerpt: 技術材料品牌的 guideline 應先定義法律保護與宣稱邊界；先列保護範圍與檢查權，並保留 Accsys Technologies 檢查材料與採取行動的權利。
  - brand_id: accoya_brand_guidelines_2015
    chapter: ch-06-04
    excerpt: Made With ingredient mark 僅能在 Accsys Technologies 書面核准後使用，將授權與資產請求集中到 Marketing Team，避免第三方自行使用造成品牌與法律誤解。
  - brand_id: Amazon_Brand_Usage_Guidelines
    chapter: ch-01
    excerpt: 平台品牌的 partner guideline 應先定義審核權限，再給予執行細節；所有創意材料須事前提交 Amazon 核准，未獲 written approval 不應使用 Amazon
      branding elements。
  - brand_id: Amazon_Brand_Usage_Guidelines
    chapter: ch-02-04
    excerpt: 品牌詞庫應包含 prohibited、requires approval、allowed-with-context 三種狀態；平台品牌 guideline 應管理『近似語』而不只管理精確商標。
  - brand_id: Amazon_Echo_Alexa_Guidelines_External
    chapter: ch-01
    excerpt: Collateral type → Risk category → Submit to correct Amazon contact → Allow up to 10 business
      days；TV、radio、packaging、POS、promotion、hardware logo、kids use case、deviation 都需送審，外部行銷不是純創意問題而是 approval
      workflow。
  - brand_id: Amazon_Echo_Alexa_Guidelines_External
    chapter: ch-02-01
    excerpt: 產品命名是商標與使用者理解的一部分，不得用縮寫（不得說 Dot / Show，應說 Echo Dot / Echo Show），命名規則應列出常見縮寫錯誤。
  - brand_id: American_Express_Guidelines_2018
    chapter: ch-04-01
    excerpt: Touchpoint approval matrix：media type → required review stage；ATL 非 TV 需在 brief、concept/creative、final
      execution 三階段送審，所有 marketing materials 必須送 American Express representative。
  - brand_id: American_Express_Guidelines_2018
    chapter: ch-04-02
    excerpt: 最終版製作前須送審、市面素材超過一年需重審；即使未明文違規但可能傷害品牌，仍可要求修正。
  - brand_id: Apple_ID_Guidelines_Channel_2016
    chapter: ch-02
    excerpt: Apple channel signature 代表合約關係，Apple logo 不可單獨出現在通路溝通中；Apple 身分永遠是 secondary endorsement，不可取代經銷商身分。
  - brand_id: Apple_ID_Guidelines_Channel_2016
    chapter: ch-02-02
    excerpt: Touchpoint permission matrix：allowed、text-only、prohibited、approval required、size/placement
      limited，依媒體調整同一資產的權限，而不是在單一 logo rule 中硬塞例外。
  - brand_id: Berkeley_Brand_Manual_accessible_2019
    chapter: ch-09-02
    excerpt: Brand Protection 把 film/TV、advertising、press release、merchandise、partnership 導向不同單位；商標使用需提交
      Trademark Use Request，誤用需 Misuse Report，商品需 licensed vendors。
  - brand_id: Dubai_BRAND_GUIDELINES_2021
    chapter: ch-10
    excerpt: Marks 不得商業使用、商品化、廣告使用、貶損或暗示 endorsement，使用需加 attribution，並保留 DTCM inspection / cease and
      desist 權利；合作 endorsement 需先滿足 flag bearer / MOU 等資格。
  - brand_id: Dubai_BRAND_GUIDELINES_2021
    chapter: ch-09
    excerpt: partner endorsement 需通過 eligibility → permitted use → collateral placement → risk review；endorsement
      不得對 Brand Dubai equity 造成重大負面風險。
  - brand_id: eftpos_Brand_Guidelines_2021
    chapter: ch-04-01
    excerpt: 所有 card designs 與 brandmark 使用必須先取得 eftpos approval、經 Service Now Member Portal 提交 finished
      scale colour sample；contactless mark 為 EMVCo sublicence，使用須含 attribution 並遵守 EMVCo guidelines。
  - brand_id: Facebook_Brand_Assets_Guide_2019
    chapter: ch-01
    excerpt: 平台品牌 guideline 應優先處理 trademark confusion 與 endorsement risk，再處理美學一致；採『approved source + allowed
      contexts + prohibited modifications + permission gate』框架。
  - brand_id: Facebook_Brand_Assets_Guide_2019
    chapter: ch-01-02
    excerpt: 把高風險使用情境導入審核流程，避免未授權曝光造成法律或品牌誤解；request 必須附最終版本、描述、script 與非英語 translation。
  - brand_id: facebook_brandassetsguide_2016
    chapter: ch-02-02
    excerpt: 明確禁止在 clothing/hats/mugs 等 merchandise 使用 Facebook trademarks/logos/IP；TV/film 使用需透過 facebookbrand.com/requests
      申請，且 request 需包含最終呈現與腳本或 synopsis，把商品化與媒體劇情使用視為不同風險類別。
  - brand_id: facebook_brandassetsguide_2016
    chapter: ch-02-01
    excerpt: 只能使用 Brand Resource Center 官方資產；不得使用模仿 Facebook 的商標/域名/logo、不得將 Facebook 與第三方名稱或 generic
      terms 結合成新標誌。
  - brand_id: HP_CoBranding_Guidelines_2020
    chapter: ch-07
    excerpt: Terms and Resources 用強制 disclaimer、禁止項目與拒絕權把法律風險轉成內容生產規則：暴力、武器、歧視或性不當活動可被拒絕共同品牌或資助；HP 修飾語需大寫、product-descriptive
      communications 需加 warranty disclaimer。
  - brand_id: HP_CoBranding_Guidelines_2020
    chapter: ch-05
    excerpt: Partner-led 情境若 partner guideline 不允許 lockup，需洽 Brand Central；品牌 guideline 應承認外部規範的優先性並設置升級詢問機制。
  - brand_id: ILoveNY_brand_guidelines_2008
    chapter: ch-03-01
    excerpt: 任何形式、任何地方使用 I LOVE NEW YORK logo 均需 I LOVE NEW YORK office 核准；不存在 blanket policy；seasonal
      logos 只能用於核准專案、只能用 black/red 並使用提供的 scalable art。
  - brand_id: Michelin_DISTRIBUTOR_GUIDE_2019
    chapter: ch-01
    excerpt: 先界定第三方經銷商能做什麼、不能做什麼，防止 MICHELIN 品牌被誤用成經銷商品牌背書或官方通路；只開放 logo、封鎖 brand style 與 mascot，並由 licensee
      與 Michelin Lifestyle 驗證。
  - brand_id: Michelin_DISTRIBUTOR_GUIDE_2019
    chapter: ch-03
    excerpt: 數位通路中 MICHELIN content 必須 secondary、只允許 dedicated 產品頁、不得在主要 domain 或 URL 使用 Michelin，越接近完整體驗的媒介越需要避免品牌主體被誤認。
  - brand_id: Microsoft_Bing_Logo_icon_2020
    chapter: ch-01
    excerpt: 若使用 logo、名稱或暗示 Microsoft Bing 贊助、背書、相容性，即需確認 license；authorization flow：existing agreement
      → general Microsoft guidelines → business owner license → brand team contact。
  - brand_id: Microsoft_Bing_Logo_icon_2020
    chapter: ch-02
    excerpt: 若使用 Results from Microsoft Bing 或類似語句，需與實際資料來源/相容關係一致，不可用元素暗示超出事實的合作關係。
  - brand_id: SAO_PAULO_BRANDBOOK_2011
    chapter: ch-05
    excerpt: 使用 São Paulo brand 前需寄信至 marcasp@spturis.com 取得 authorization；第三方需事先授權，並依情境調整 foreground/background
      權重。
  - brand_id: SAO_PAULO_BRANDBOOK_2011
    chapter: ch-08
    excerpt: guidebook images 僅供 illustration purposes；不得未經 Strategic Actions and Communication Department
      事先明確授權而重製。
  - brand_id: Slack-Brand-Guidelines
    chapter: ch-03-02
    excerpt: 把 API integration 的 affiliation ambiguity 寫入 brand guideline；third-party risk framework：visual
      imitation → asset framing → API ambiguity → disclaimer visibility → merchandise ban。
  - brand_id: Slack-Brand-Guidelines
    chapter: ch-03
    excerpt: 治理不是限制創意，而是防止使用者混淆與錯誤背書；以 trademark notice、trade dress 與 API affiliation disclaimer 管理風險。
  - brand_id: Tokyo_2020_NOC_Olympic_emblem_2018
    chapter: ch-01
    excerpt: rights-first guideline：user role → purpose → allowed assets → association limits → approval/access
      path；NOC 使用限非商業目的，不得用於 licensed/replica merchandise。
  - brand_id: Tokyo_2020_NOC_Olympic_emblem_2018
    chapter: ch-05
    excerpt: printed materials 不得用於 commercial or promotional purposes；website 上 emblem 必須與 commercial
      contents 明確分離，僅 Worldwide Olympic Partners 可作商業例外。
  - brand_id: Tripadvisor_partners_2020
    chapter: ch-01
    excerpt: 建立合作夥伴使用 Tripadvisor 品牌與內容的授權邊界；任何含 branding/content 的行銷材料必須先送 Tripadvisor 審核，缺少 approval
      metadata 不可發布。
  - brand_id: Tripadvisor_partners_2020
    chapter: ch-04
    excerpt: logos 與 ratings bubbles 由 Tripadvisor URL 提供、不得本地存放，活動需 tracking 並完成最終內容核准；第三方品牌使用應可更新、可撤換、可追蹤。
  - brand_id: twitter_brand_guidelines_2020
    chapter: ch-05
    excerpt: 不得把 Twitter marks 納入公司、產品、服務、網站、application 名稱；除 hashtag/handle lockup 或 social icons 外不得製作販售帶
      Twitter name/logo 的商品。
  - brand_id: twitter_brand_guidelines_2020
    chapter: ch-06
    excerpt: 商標使用是有限、可撤銷、必須嚴格遵守的授權；含 marks 的 materials 必須顯示 trademark statement，不得暗示 sponsorship/endorsement。
  - brand_id: Volvo_2021_compressed
    chapter: ch-01-02
    excerpt: 9 條 golden rules：不得自造 Volvo logotype；供應商不得未經書面同意在行銷中提及 Volvo；merchandise 與 signage 必須用官方/核准來源。
  - brand_id: ZOOM_2022
    chapter: ch-01
    excerpt: 合作品牌治理需要把行銷便利與法律/商標風險放在同一份操作文件中；若不符合規定需 rectification，嚴重時可撤銷 Zoom trademark 使用權。
  - brand_id: ZOOM_2022
    chapter: ch-10
    excerpt: Zoom Marks 需 license 或 express written permission；任何 featuring Zoom Mark 的溝通應包含 proper trademark
      attribution，並符合 guideline 與 partner agreement license terms。
