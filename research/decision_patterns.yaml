    excerpt: Sublogo architecture：masterbrand + descriptor、programme title with/without ARTE；母品牌歸屬必須清晰，但節目品牌需有空間表現多樣性，為子品牌定義固定母品牌元件與可自由設計元件。
  - brand_id: BCHydro_brand_guidelines_2019
    chapter: ch-01
    excerpt: 重新整合 Power Smart 與 BC Hydro，power smart 應作為公司行為／目的而非獨立計畫，品牌素材必須連回 BC Hydro，不得形成第二個獨立 Power
      Smart 品牌。
  - brand_id: Berkeley_Brand_Manual_accessible_2019
    chapter: ch-08
    excerpt: Institutional Brand Architecture：master brand → primary/secondary sub-brand → collaborations，用
      decision flow chart 分類單位；所有 unit lockups 需 Office of Communications & Public Affairs approval。
  - brand_id: Bern_Stadt_2021
    chapter: ch-05
    excerpt: Umsetzungen Dachmarke：Dienststelle 在城市 umbrella brand 下用部門色、圖像、字體玩法建立辨識，但 sender 保持市府；產品與服務改變，sender
      不變。
  - brand_id: BMW_Clubs_2020
    chapter: ch-02-01
    excerpt: 以全球 logo 系統讓 official BMW Clubs 可被辨識為 sender，同時保留 club signet 差異；母品牌固定 + club signet 可差異，解決全球社群的一致與個性衝突。
  - brand_id: Brickline_Greenway_Brand_Guidlines_2020
    chapter: ch-06
    excerpt: governance-to-application framework：endorsement hierarchy → lockup rules → templates → spatial
      translation；GRG lockup 需核准比例，應用物需保留 Brickline Greenway 主體識別。
  - brand_id: CalvinKlein_Logo&GraphicGuidelines_2017
    chapter: ch-01-03
    excerpt: 用 logo architecture chart 把 Master Brand、業務線與品類對應到 logo 層級；任一應用需先標記 business line，logo architecture
      是品牌治理的 decision table。
  - brand_id: CalvinKlein_Logo&GraphicGuidelines_2017
    chapter: ch-02-03
    excerpt: 同一品類中不同 tier（premium/mainline/off-price）不能共用模糊標誌；tier 是 logo 選擇的屬性，應成為資料欄位。
  - brand_id: Clayton_Homes_BrandGuideline_2021
    chapter: ch-01-03
    excerpt: Clayton family of brands 都應支撐 quality home 與 rewarding 體驗；多品牌可以保留差異，但必須共享顧客體驗與信任主張，architecture
      章節是 identity governance 的索引層。
  - brand_id: Dubai_BRAND_GUIDELINES_2021
    chapter: ch-02
    excerpt: 在 umbrella architecture 下管理 Department of Tourism、Dubai Calendar、City of Dubai、Dubai Business
      Events、Government 等 brandmark；brandmark taxonomy 需同時描述誰可用與用在哪種情境。
  - brand_id: European_Committee_of_the_Regions_visual_identity_EN_2019
    chapter: ch-04-01
    excerpt: 為六個 commission（CIVEX、ENVE、COTER、NAT、ECON、SEDEC）指定專屬 HEX 與 diamond-based layout，用 masterbrand
      anchor + commission colour + scaled diamond 維持差異又保留 CoR 主識別連結。
  - brand_id: First_Bank_Brand_Guidelines_2021
    chapter: ch-02-02
    excerpt: Mortgage Services、Wealth Management、Private Banking 以 endorsed identity、controlled differentiation、master
      brand priority 使用核准 lockup；非核准業務不得自行建立 lockup，以有限例外管理 portfolio complexity。
  - brand_id: FirstBank_Corporate_Identity_Guidelines
    chapter: ch-03
    excerpt: Product and Service Brand Architecture 以 endorsed flexibility 管理既有與未來產品命名：未來名稱採 DESCRIPTOR
      followed by FIRST、FIRST 用 corporate identity font、產品 logo 採 70/30 藍金比例；品牌架構不只定義理想狀態，也要治理歷史例外與未來命名。
  - brand_id: FirstBank_Corporate_Identity_Guidelines
    chapter: ch-02
    excerpt: SSA market 以例外表管理跨國市場的命名、語言、象徵物與社群 avatar，避免市場擴張破壞主品牌，而不是讓在地團隊自行詮釋。
  - brand_id: Heathrow_Brand_guidelines_2018
    chapter: ch-02
    excerpt: Service Lock-ups 讓多服務、多部門、多 tier 的機場組織在同一品牌架構下被辨識：服務可被區分，但不能脫離 Heathrow 母品牌；品牌內部可建立視覺子模式，而非建立子品牌。
  - brand_id: HKUST_BRAND_GUIDELINES_2022
    chapter: ch-04-01
    excerpt: 附屬單位標誌需納入大學身份並遵守字體、間距與審核流程；附屬單位可以被識別，但不能凌駕或稀釋母品牌，用母品牌左側、附屬識別右側、共享 X-based spacing 管理多品牌關係。
  - brand_id: IBM_Be_Equal_2020
    chapter: ch-02-01
    excerpt: Be Equal logo、logotype 與 Community IDs 三層識別共用 IBM Eye-Bee-M 母系統，社群可有專屬變體但需明確界定組合規則；用既有設計語言生成子品牌，避免另起爐灶。
  - brand_id: IBM_Be_Equal_2020
    chapter: ch-01-02
    excerpt: 先定義 Women、LGBT+、DiversABLE、Veterans 等社群模型，再給每個社群專屬視覺變體；社群資產不得以未列入的自創標語取代 approved system。
  - brand_id: IBM_ThinkSummit_2020
    chapter: ch-02-02
    excerpt: 建立 Think、Think Summit、Think Leadership 與 PartnerWorld 的層級關係，用 lockup family 管理全球活動 portfolio；命名層級必須能被視覺層級準確反映，子活動以同一
      lockup grammar 建立可辨識家族。
  - brand_id: IBM_ThinkSummit_2020
    chapter: ch-02
    excerpt: 把母品牌 IBM、Think 字標、活動名稱與 PartnerWorld 等關係拆成可核准的 lockup；品牌一致性來自可控組合，而不是禁止所有變體。
  - brand_id: Klepierre_Charte_graphique_2013
    chapter: ch-07
    excerpt: marques internes 使用 symbol gradient 且不附 Klépierre typography；marques filles 使用完整 logo（symbol
      + typo + colours）；不同品牌層級應有不同的母品牌可見度與獨立性。
  - brand_id: MG_investments_identity guidelines_2014
    chapter: ch-01-02
    excerpt: masterbrand-led architecture：shared core → business-specific adaptations → approval control；子業務不得自行發明與核心品牌無關的識別。
  - brand_id: MG_investments_identity guidelines_2014
    chapter: ch-07
    excerpt: 子品牌不應另起爐灶，而應透過受控變體反映受眾與產品差異；Institutional materials 使用核准 stationery 與 monotone photography，joint
      materials 不得破壞 M&G 層級。
  - brand_id: middlecap_design_manual_2019
    chapter: ch-05
    excerpt: division logo 由基本標誌加上下方 division name 組成，不建立獨立子品牌語言；不得改變主標誌比例，多部門品牌應建立命名槽位、位置與比例規則以避免品牌碎片化。
  - brand_id: mojaloop_Brand_Guidelines_2020
    chapter: ch-01-01
    excerpt: Foundation logo 指涉實體組織，Project logo 指涉開源專案；不得用 Project logo 替代 Foundation legal identity，品牌資產應反映組織結構。
  - brand_id: mojaloop_Brand_Guidelines_2020
    chapter: ch-01
    excerpt: 品牌若有多個治理主體，guideline 應先定義哪個 logo 代表哪個 legal/operational entity，再處理 type/color/photography。
  - brand_id: Musee_zadkine
    chapter: ch-01
    excerpt: 建立 Musée Zadkine 的基礎識別語言，同時明確指出所有延展需服從巴黎市政府的總體規則；文化機構 guideline 應把總管理機構規則寫在開頭，避免地方品牌與母體規範衝突。
  - brand_id: Musee_zadkine
    chapter: ch-04-01
    excerpt: 參觀摺頁與宣傳摺頁需依巴黎市政府 charte 並使用 VistaSans；母機構 charte 與子品牌 palette 可透過字體遵母、色彩取子方式共存。
  - brand_id: NIU_Brand_Identity_2022
    chapter: ch-04
    excerpt: 大學品牌需同時允許單位多樣性與機構整體一致性；提供分散式組織管理 sub-brand、logo 與媒體素材的可重用模式。
  - brand_id: NZ_Transport_Agency_brand_guidelines_2019
    chapter: ch-01
    excerpt: 公共機構品牌需要一致、可追溯、可審核，且在合作關係中清楚表達責任歸屬；可複用為政府與大型公共服務品牌的 modular brand manual：核心識別、共同品牌、應用模板與特殊關係分層管理。
  - brand_id: NZ_Transport_Agency_brand_guidelines_2019
    chapter: ch-06
    excerpt: 使用情境式決策框架：先判斷主導者／合作關係／媒介，再選擇核准的 logo、模板與版面。
  - brand_id: Oxford_SU_Guidelines_v2a
    chapter: ch-01-04
    excerpt: 把核心 logo 擴展到組織、子品牌、夥伴與 pattern 的治理，讓子品牌可被識別，但須在不破壞品牌延展完整性的前提下使用。
  - brand_id: PUCP_Manual
    chapter: ch-05
    excerpt: 用 Nivel 1-4、色彩指派、字體權重與 cerramientos 管理大型教育機構的多單位品牌架構。
  - brand_id: Quaint_Oak_Bank_Brand_Guidelines_2013
    chapter: ch-03
    excerpt: 管理多業務線品牌關係，讓各 division 能獨立運作但不脫離母品牌信任；分支可具差異，但信任背書必須一致，並以可測量 endorsement 規則避免子品牌失聯。
  - brand_id: Slack-Brand-Guidelines
    chapter: ch-02-03
    excerpt: 品牌架構應讓差異可被看見，但不能削弱 master brand；以 master brand → offering/partner/department/team lockups
      控制多種品牌關係。
  - brand_id: Stifel_brand_guidelines_2019
    chapter: ch-01-02
    excerpt: sub-brand containment：department name、group name、individual name 都從屬於 corporate logo；group
      name 不得比 Stifel logo 更 prominent，未列明名稱需特別許可。
  - brand_id: The_Economist_Group_2017
    chapter: ch-03-02
    excerpt: portfolio identity system：sub-brand logos grouped by editorial、media business、intelligence
      unit、apps/social icons；group logo clear space 與 core logo 一致。
  - brand_id: ulster_university_Brandbook
    chapter: ch-03-01
    excerpt: 標誌處理 corporate、creative、portrait、faculty、sub-brand、co-branding 等場景；不得使用未核准 sub-brand lockup，多品牌大學用
      lockup governance 控制學院與研究單位擴散。
  - brand_id: USAToday_Online_Brand_guidelines_2014
    chapter: ch-02
    excerpt: 所有帶 USA TODAY 名稱的品牌識別都必須遵循 identity system；masterbrand equity flows from and contributes
      to the Masterbrand。
  - brand_id: USAToday_Online_Brand_guidelines_2014
    chapter: ch-04
    excerpt: 子品牌以顏色與 label 加到 USA TODAY logotype，不自成獨立識別，應服務導航與內容辨識而非與 masterbrand 競爭。
  - brand_id: WM_Brand_Guidelines
    chapter: ch-07
    excerpt: A WarnerMedia Company 是特製 artwork，用來表達 WarnerMedia 與 divisions/companies 的關係；endorsement
      必須可見、可辨識，不得 relegated to mouse type 或埋入法律資訊。
  - brand_id: WouldBankGroup_Branding_Visual_Identity_Guidelines_2016
    chapter: ch-03
    excerpt: 局部單位可以被識別，但不能競爭或替代母品牌；大型系統可用『可辨識但不獨立』的 secondary line 管理內部單位。
  - brand_id: WouldBankGroup_Branding_Visual_Identity_Guidelines_2016
    chapter: ch-01
    excerpt: 任何多實體品牌系統都需要先建立『誰在說話』的判斷層，再談 logo 放置。
