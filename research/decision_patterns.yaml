    chapter: ch-04
    excerpt: 以 shared measurement units 與 six-column grid 建立跨格式結構；文化品牌的彈性不是無規則，而是建立可跨內容承載的 grid infrastructure。
  - brand_id: Barbican_Centre_brand_guidelines_2017
    chapter: ch-07
    excerpt: diversity within system：Theatre、Art、Film、Music 等藝術形式可不同，但底層識別不可斷裂，分支差異主要來自內容、圖像與版面節奏，而非另起品牌。
  - brand_id: BC_BrandGuidelines_2020
