- id: dp-cobranding-grid-governance
  title: 用 grid 與固定模距治理聯名 lockup
  problem:
    statement: 聯名情境若沒有空間規則，夥伴標誌的相對大小與距離會失控，混淆主從關係。
    signals:
    - cobranding
    - partner_governance
    - multi_brand
  solution:
    module: Brand Architecture
    move: 以 grid、固定 module 距離與分隔線定義 master brand 與 partner brand 的 lockup
    layer: strategy
  reason:
  - 聯名需先界定空間與主從，才能維持品牌資產權重
  - 認證標章 guideline 應把「誰有資格使用」放在視覺規格前
  - 合作品牌指南應把「關係模型」先定義清楚，再給視覺配置
  - 視覺關係必須反映法律與價值對齊程度
  - 共同品牌指南需同時寫 visual ratio、legal responsibility、approval flow
  - logo 系統應把 partner lock-up 的尺寸條件納入規則，而不只是提供圖片
  - variation 規則需含 priority、context 與 file-name mapping
  - co-branding 是 legal/governance 問題，不只是排版問題
  - partner logo 不得壓過 owner logo
  - 公共資金與合作關係需要透明、可追蹤、彼此承認
  - partner visibility 與 grant visibility 因權力關係不同需分開治理
  - 支付網路品牌的權益常在 co-branding 中流失，需要 parity 規則
  - 多種出版物可共享一個 graphic line，只需為情境建立條件分支
  - 白框 partner logo 是常見聯名治理模式，避免合作標誌破壞主識別
  - co-branding guideline 應提供 flexible container 與 optical balancing rules，而非只給靜態範例
  - logo guideline 應把「可用資產」與「使用情境」合併成可審核矩陣
  - 大型品牌組合需要場景矩陣，不只需要 logo no-nos
  - 合作關係必須被視覺化為清楚的從屬或等距關係
  - logo 配置不是裝飾，而是關係聲明；位置、大小與 proximity 都會改變受眾對合作權重的理解
  - co-branding layout 可用位置、尺寸與不可插入區域明確治理
  - co-branding 需要等量清楚，而不是品牌混合
  - co-branding guideline 可用單一內部尺度同時管理距離、clear space 與 keyline
  - 合作視覺必須反映真實關係，不可因設計平衡造成授權或背書誤解
  - 共同品牌章節應獨立處理產品 lockup，而不是只放 partner logo spacing
  - 聯名不應犧牲任一方識別，也不應暗示錯誤層級
  - co-branding guideline 應定義關係語義（equal relationship），再對應到視覺規則
  - 多標誌關係需要幾何秩序，否則公共機構版面容易失控
  - co-branding rule 應給出方向、順序、分隔與最大高度四類資料
  - 合作不等於平分版面；主品牌需要清楚且一致的視覺階層
  - 聯名是平等合作，背書是降低顯著性；兩者不能用同一套 logo 排序規則
  - wordmark 可提升 Olympic identity，但不可被商業品牌借位
  - 合作露出需要平衡雙方辨識，而不是把 logo 任意拼貼
  - Co-brand 模板可用 typographic metrics 取代任意像素距離，提高跨尺寸穩定性
  - joint lock-up 不是融合品牌，而是兩個來源用分隔符保持邊界
  applicable_when:
    industries:
    - finance
    - tech_software
    - public_sector
    - education
    - nonprofit_social
    - media_entertainment
    - consumer_retail_hospitality
    brand_types:
    - platform_ecosystem
    - institutional_public_trust
    - mission_driven
    conditions:
    - cobranding
    - partner_governance
    archetypes:
    - multi_brand_architecture
    - brand_experience_guide
    - campaign_touchpoint
  dependencies:
    requires:
    - Brand Architecture
    - Visual Identity
    enables:
    - Governance
    - Legal and Trademark
    conflicts_with: []
  examples: []
  anti_patterns:
  - joint lock-up 使用 plus、x、equal 等關係符號而非分隔線
  evidence:
  - brand_id: 2022_Special_Olympics_USA_Games_Brand_Guidelines_2020
    chapter: ch-03-06
    excerpt: co-branding guideline 需明確定義主從關係、距離、分隔、色彩與贊助等級文字：event logo + 黑色垂直分隔線 + partner logo，兩側保留
      1X spacing。
  - brand_id: accoya_brand_guidelines_2015
    chapter: ch-03-05
    excerpt: 聯名需要彈性，但品牌層級不可失衡：partner brand 在自己的 allocated space，不得干擾 Accoya Green Tab，且 joint branded
      logo 不得大於 Accoya。
  - brand_id: Afterpay_Merchant_Guidelines_US_2020
    chapter: ch-02-02
