  - brand_id: SAO_PAULO_BRANDBOOK_2011
    chapter: ch-04
    excerpt: six-element visual system + controlled variation；應用可使用一個或多個六大視覺元素，但元素需來自本書與 electronic originals，不得任意改變透視、顏色、字體比例或清楚度。
  - brand_id: sartorius_Brand_Style_Guide_2020
    chapter: ch-03
    excerpt: grid-to-asset framework：format division → logo size → claim tile → content area；以 1/4、1/3、1/2、full
      format 建立 flexible grid，品牌版面靠少量比例規則創造可辨識性。
  - brand_id: SONY
    chapter: ch-03
    excerpt: ad execution framework：format → frame formula（h = 0.022 x format height）→ content zone →
      copy/legal；把 reference guide 當作彈性邊界而非單一模板。
  - brand_id: TikTok_For_Business_Brand_Guidelines
    chapter: ch-03-04
    excerpt: 工具箱不是自由裝飾庫，每個元素都有來源、用途、尺寸與可近用條件；品牌圖形元件可像 UI component 一樣定義 props（fill/stroke、color、roundness、size、placement）。
  - brand_id: TikTok_For_Business_Brand_Guidelines
    chapter: ch-03
    excerpt: 設計系統最好從核心 logo primitives 派生，而不是另加裝飾素材；logo-derived visual language：circle → bubble / pattern
      / emphasis / rounded phone shape。
  - brand_id: ZAG_brand_guidelines
    chapter: ch-01
    excerpt: Core/flexible framework：core identity elements must be systematic；communication executions
      may vary within logic；用『核心嚴格、應用彈性』避免過度規範。
