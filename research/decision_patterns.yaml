- id: dp-color-set-over-single-pickers
  title: 用「色組」而非單色清單管理豐富色彩的自由度
  problem:
    statement: 多彩品牌若只給單色清單，配色會失控，跨媒介色差難以驗證。
    signals:
    - rich_palette
    - color_governance
    - multi_media
  solution:
    module: Color System
    move: 定義相鄰三色 color sets，每個應用只用一組，並提供 source files 與 token appendix
    layer: visual_core
  reason:
  - 多彩系統需要約束；色彩組合應可預先測試並提供 source files
  - 把「策略章」與「色值 appendix」分離，利於生產與機器讀取
  - 多彩系統需要約束；色彩組合應可預先定義並標註用途
  - Design tokens 可不只記 hex，也記可否搭配 logo、主要／延伸用途與印刷限制
  - 交織性可被轉譯為「多色但受限」的色彩演算法
  - 多彩系統需要約束；色彩組合應可預先測試
  - 把品牌色與產品 UI 色分層，是 SaaS 品牌常見成熟模式
  applicable_when:
    industries:
    - industrial_materials_science
    - media_entertainment
    - nonprofit_social
    - tech_software
    brand_types: []
    conditions:
    - rich_palette
    archetypes:
    - full_brand_system
    - brand_experience_guide
  dependencies:
    requires:
    - Color System
    enables:
    - Design Tokens
    conflicts_with: []
  examples: []
  anti_patterns:
  - 讓設計者從單色任意組合
  - 用軟體自動轉換色彩而非使用核准色值
  - 任意新增非品牌色
  evidence:
  - brand_id: 3M_Visual_Identity_Guidelines_2015
    chapter: ch-02-03
    excerpt: Adjacent Color Set Framework：18 sets、one set per application、approved RGB/CMYK gradients；不得用軟體自動轉換色彩。
  - brand_id: 3M_Visual_Identity_Guidelines_2015
    chapter: ch-05
    excerpt: Color Appendix 作為 token database，逐組列出色值與漸層、媒介可用性，並要求不要修改或重建檔案。
  - brand_id: arte_2008_compressed
    chapter: ch-05-01
    excerpt: Gradient token framework：以 Tequila Sunrise、Purple、Azure、Emerald 等命名漸層（name、start/end CMYK、logo
      association permission）建立系統，Fuchsia 與 Orange Juice 通常不與 ARTE logo 結合。
  - brand_id: IBM_Be_Equal_2020
    chapter: ch-02-02
    excerpt: 豐富可以被規範，多彩不等於無限制：不得兩色來自同色系、不得兩色同色值、logo/logotype 僅能放在 60 或 40 色值上，把 intersectionality 轉譯成多色但受限的色彩演算法。
  - brand_id: SAS_brand_creative_guide_2021
    chapter: ch-04
    excerpt: 色彩組合需屬 warm/cool/neutral 系統，並以 proportion 規範比例；把 campaign mood、accessibility 與 product UI
      三層分離。
