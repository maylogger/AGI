  - brand_id: WouldBankGroup_Branding_Visual_Identity_Guidelines_2016
    chapter: ch-03-03
    excerpt: 例外章節應寫出『為何例外』『何時可用』『不可擴張到哪裡』；special cases 需 Brand Management approval。
  - brand_id: WouldBankGroup_Branding_Visual_Identity_Guidelines_2016
